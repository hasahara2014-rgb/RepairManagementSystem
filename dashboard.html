/* ─────────────────────────────────────────────────────────────
   4.  LOCAL STATE  (in-memory + localStorage)
   ───────────────────────────────────────────────────────────── */
function _normalizeJob(j) {
  if (!j) return null;

  // ── Normalize Status ──
  if (j.Status) j.Status = String(j.Status).replace(/ /g,'_').toUpperCase();
  if (!j.Priority) j.Priority = 'HIGH';

  // ── Map Sheet v3.3 field names → frontend field names ──
  // Sheet ใช้ Actual_Close แทน Close_Date
  if (!j.Close_Date && j.Actual_Close)   j.Close_Date   = j.Actual_Close;
  // Sheet ใช้ Create_Date ใน col T
  if (!j.Create_Date && j['Create_Date']) j.Create_Date = j['Create_Date'];
  // Legacy field name aliases
  if (!j.JOB_No && j['Job No'])                 j.JOB_No       = j['Job No'];
  if (!j.Equipment_ID && j['Equipment ID'])      j.Equipment_ID = j['Equipment ID'];
  if (!j.Damage_Code && j['Damage Code'])        j.Damage_Code  = j['Damage Code'];
  if (!j.Work_Order && j['Work Order'])          j.Work_Order   = j['Work Order'];
  if (!j.Vendor_ID && j['Vendor ID'])            j.Vendor_ID    = j['Vendor ID'];

  // ── Merge กับ SAMPLE_JOBS_RAW เพื่อเติม field ที่ขาด ──
  if (j.JOB_No && typeof SAMPLE_JOBS_RAW !== 'undefined') {
    var sample = SAMPLE_JOBS_RAW.find(function(s){ return s.JOB_No === j.JOB_No; });
    if (sample) {
      if (!j.Work_Order)          j.Work_Order          = sample.Work_Order          || '';
      if (!j.Refurbishment_Order) j.Refurbishment_Order = sample.Refurbishment_Order || '';
      if (!j.Receive_No)          j.Receive_No          = sample.Receive_No          || '';
      if (!j.Equipment_ID)        j.Equipment_ID        = sample.Equipment_ID        || '';
      if (!j.Damage_Code)         j.Damage_Code         = sample.Damage_Code         || '';
      if (!j.Vendor_ID)           j.Vendor_ID           = sample.Vendor_ID           || 'V001';
      if (!j.Create_Date)         j.Create_Date         = sample.Create_Date         || '';
      if (!j.Close_Date)          j.Close_Date          = sample.Close_Date          || '';
      if (!j.Material_ID)         j.Material_ID         = sample.Material_ID         || '10010041';
      if (!j.Priority)            j.Priority            = sample.Priority            || 'HIGH';
      if (!j.Repair_Action)       j.Repair_Action       = sample.Repair_Action       || '';
    }
  }
  return j;
}

// ── Clear corrupted localStorage cache ──────────────────────────
function clearJobCache() {
  try { localStorage.removeItem('rms_v3_jobs'); } catch(e) {}
  _localJobs = SAMPLE_JOBS_RAW.map(function(j){ return Object.assign({}, j); });
  UI.toast('ล้าง cache งานซ่อมแล้ว กำลังโหลดใหม่...', 'success');
  setTimeout(function(){ window.location.reload(); }, 1200);
}

function _loadJobs() {
  try {
    const raw = localStorage.getItem('rms_v3_jobs');
    if (raw) {
      const parsed = JSON.parse(raw);
      return parsed
        .map(_normalizeJob)
        .filter(function(j) { return j && j.JOB_No && j.JOB_No.trim() !== ''; });
    }
  } catch(e) { console.warn('_loadJobs error:', e); }
  return SAMPLE_JOBS_RAW.map(function(j){ return Object.assign({}, j); });
}

function _saveJobs() {
  try { localStorage.setItem('rms_v3_jobs', JSON.stringify(_localJobs)); } catch(e) {}
}

function _loadParts() {
  try {
    const raw = localStorage.getItem('rms_v3_parts');
    if (raw) {
      const saved = JSON.parse(raw);
      return SAMPLE_PARTS.map(sp => {
        const lp = saved.find(s => s.Part_Code === sp.Part_Code || s.Part_ID === sp.Part_ID);
        return lp ? Object.assign({}, sp, { Current_Stock: parseFloat(lp.Current_Stock ?? sp.Current_Stock), Cost: parseFloat(lp.Cost ?? sp.Cost) }) : Object.assign({}, sp);
      });
    }
  } catch(e) {}
  return SAMPLE_PARTS.map(p => Object.assign({}, p));
}

function _saveParts() {
  try { localStorage.setItem('rms_v3_parts', JSON.stringify(_localParts)); } catch(e) {}
}

var _localJobs  = _loadJobs();
var _localParts = _loadParts();

/* ─────────────────────────────────────────────────────────────
   5.  AUTH
   ───────────────────────────────────────────────────────────── */
const Auth = {
  getUser() {
    try {
      const s = sessionStorage.getItem(SESSION_KEY) || localStorage.getItem(SESSION_KEY);
      return s ? JSON.parse(s) : null;
    } catch(e) { return null; }
  },
  isLoggedIn() {
    const u = this.getUser();
    return u && (Date.now() - (u.loginTime || 0) < 8 * 3600 * 1000);
  },
  isAdmin() {
    const u = this.getUser();
    return u && ['SUPER_ADMIN', 'ADMIN'].includes(u.role);
  },
  isManager() {
    const u = this.getUser();
    return u && ['SUPER_ADMIN', 'ADMIN', 'MANAGER'].includes(u.role);
  },
  hasPermission(perm) {
    const u = this.getUser();
    return u && Array.isArray(u.permissions) && u.permissions.includes(perm);
  },
  guardPage() {
    // ถ้าหน้าไม่ใช่ login แล้วยังไม่ login → redirect
    if (!this.isLoggedIn() && !location.pathname.includes('login')) {
      window.location.href = 'login.html';
      return false;
    }
    return true;
  },
};

/* ─────────────────────────────────────────────────────────────
   6.  GAS HELPER
   ───────────────────────────────────────────────────────────── */
async function callGAS(action, payload) {
  try {
    const user  = Auth.getUser();
    const token = user ? (user.token || '') : '';
    const params = new URLSearchParams({
      action,
      token,
      payload: encodeURIComponent(JSON.stringify(payload || {})),
    });
    const res  = await fetch(RMS.GAS_URL + '?' + params, { redirect: 'follow' });
    return await res.json();
  } catch(e) {
    console.warn('callGAS error:', action, e.message);
    return { success: false, error: e.message };
  }
}

/* ─────────────────────────────────────────────────────────────
   7.  DATASTORE  (local-first, GAS fallback)
   ───────────────────────────────────────────────────────────── */
const DataStore = {

  /* ── JOB NO GENERATOR ── */
  async generateJobNo() {
    const y = new Date().getFullYear();
    const prefix = 'JOB-' + y + '-';
    const existing = _localJobs.filter(j => j.JOB_No && j.JOB_No.startsWith(prefix));
    const nums = existing.map(j => parseInt(j.JOB_No.replace(prefix, ''), 10)).filter(n => !isNaN(n));
    const next = nums.length ? Math.max(...nums) + 1 : 1;
    return prefix + String(next).padStart(3, '0');
  },

  async generateReceiveNo() {
    const d = new Date();
    const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
    return 'RCV-' + y + m + day + '-' + String(Math.floor(Math.random()*900)+100);
  },

  /* ── GET JOBS ── */
  async getJobs(filter) {
    filter = filter || {};
    // refresh from localStorage
    _localJobs = _loadJobs();

    if (RMS.USE_GAS) {
      try {
        const res = await callGAS('getJobs', { filter });
        if (res && res.success && res.data) {
          // Merge GAS data with SAMPLE_JOBS_RAW to fill missing fields
          var gasJobs = res.data.map(function(gasJob) {
            var normalized = _normalizeJob(gasJob);
            if (!normalized || !normalized.JOB_No) return null;
            // Find matching sample job to fill in missing fields
            var sample = SAMPLE_JOBS_RAW.find(function(s){ return s.JOB_No === normalized.JOB_No; });
            if (sample) {
              return Object.assign({}, sample, normalized);
            }
            return normalized;
          }).filter(function(j) { return j && j.JOB_No && j.JOB_No.trim() !== ''; });
          
          // Merge: GAS jobs take priority, add SAMPLE_JOBS not in GAS
          var gasJobNos = new Set(gasJobs.map(function(j){ return j.JOB_No; }));
          var sampleOnly = SAMPLE_JOBS_RAW.filter(function(s){ return !gasJobNos.has(s.JOB_No); });
          _localJobs = [...gasJobs, ...sampleOnly];
          _saveJobs();
        }
      } catch(e) {}
    }

    // Filter out invalid/incomplete jobs
    let jobs = [..._localJobs].filter(function(j) {
      return j && j.JOB_No && j.JOB_No.trim() !== '';
    });
    if (filter.status && filter.status !== 'ALL') {
      if (filter.status === 'REPEAT') {
        const cnt = {};
        _localJobs.forEach(j => { if (j.Equipment_ID) cnt[j.Equipment_ID] = (cnt[j.Equipment_ID]||0) + 1; });
        jobs = jobs.filter(j => cnt[j.Equipment_ID] > 1);
      } else {
        jobs = jobs.filter(j => (j.Status||'') === filter.status);
      }
    }
    if (filter.priority) jobs = jobs.filter(j => j.Priority === filter.priority);
    if (filter.vendor)   jobs = jobs.filter(j => j.Vendor_ID === filter.vendor);
    if (filter.branch)   jobs = jobs.filter(j => j.Branch_ID === filter.branch);
    if (filter.search) {
      const q = filter.search.toLowerCase();
      jobs = jobs.filter(j =>
        (j.JOB_No||'').toLowerCase().includes(q) ||
        (j.Equipment_ID||'').toLowerCase().includes(q) ||
        (j.Work_Order||'').toLowerCase().includes(q) ||
        (j.Damage_Code||'').toLowerCase().includes(q)
      );
    }
    return jobs;
  },  // returns Array directly

  async getJobById(jobNo) {
    _localJobs = _loadJobs();
    return _localJobs.find(j => j.JOB_No === jobNo) || null;
  },

  /* ── CREATE JOB ── */
  async createJob(data) {
    const job = Object.assign({ Created_By: (Auth.getUser()||{}).username || 'admin' }, data);
    _localJobs.unshift(job);
    _saveJobs();

    if (RMS.USE_GAS) {
      try {
        const res = await callGAS('createJob', { data: job });
        if (res && res.success) return { success: true, data: job };
        return { success: true, data: job, gasWarn: res && res.error };
      } catch(e) { return { success: true, data: job, gasWarn: e.message }; }
    }
    return { success: true, data: job };
  },

  /* ── UPDATE JOB ── */
  async updateJob(jobNo, data) {
    const idx = _localJobs.findIndex(j => j.JOB_No === jobNo);
    if (idx < 0) return { success: false, error: 'ไม่พบ Job' };
    _localJobs[idx] = Object.assign({}, _localJobs[idx], data);
    _saveJobs();

    if (RMS.USE_GAS) {
      try { await callGAS('updateJob', { jobNo, data }); } catch(e) {}
    }
    return { success: true, data: _localJobs[idx] };
  },

  /* ── DELETE JOB ── */
  async deleteJob(jobNo) {
    const before = _localJobs.length;
    _localJobs = _localJobs.filter(j => j.JOB_No !== jobNo);
    if (_localJobs.length === before) return { success: false, error: 'ไม่พบ Job' };
    _saveJobs();

    if (RMS.USE_GAS) {
      try { await callGAS('deleteJob', { jobNo }); } catch(e) {}
    }
    return { success: true };
  },

  /* ── UPDATE STATUS ── */
  async updateStatus(jobNo, status, remark) {
    // ✅ ใช้ updateJobStatus (lightweight) แทน updateJob เต็ม
    // เพื่อป้องกัน undefined fields overwrite ใน Google Sheets
    if (RMS.USE_GAS) {
      const res = await callGAS('updateJobStatus', {
        jobNo:  jobNo,
        status: status,
        remark: remark || ''
      });
      if (res && res.success) {
        // อัปเดต local state ด้วย
        const idx = _localJobs.findIndex(j => j.JOB_No === jobNo);
        if (idx >= 0) {
          _localJobs[idx].Status     = status;
          _localJobs[idx].Updated_At = new Date().toISOString().slice(0,10);
          if (status === 'CLOSED') _localJobs[idx].Close_Date = new Date().toISOString().slice(0,10);
          _saveJobs();
        }
        return res;
      }
      // GAS failed → fallback to local only
    }
    // Local update only (offline/demo mode)
    const idx = _localJobs.findIndex(j => j.JOB_No === jobNo);
    if (idx >= 0) {
      _localJobs[idx].Status     = status;
      _localJobs[idx].Updated_At = new Date().toISOString().slice(0,10);
      if (status === 'CLOSED') _localJobs[idx].Close_Date = new Date().toISOString().slice(0,10);
      _saveJobs();
    }
    return { success: true };
  },

  /* ── GET DASHBOARD ── */
  async getDashboard() {
    _localJobs  = _loadJobs();
    _localParts = _loadParts();

    const jobs = [..._localJobs];
    const cnt  = {};
    jobs.forEach(j => { const s = (j.Status||'').replace(/ /g,'_'); cnt[s] = (cnt[s]||0) + 1; });

    // Trend
    const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    const tData  = Array(12).fill(0);
    const y = new Date().getFullYear();
    jobs.forEach(j => { if(j.Create_Date){ const d=new Date(j.Create_Date); if(d.getFullYear()===y) tData[d.getMonth()]++; } });

    // งานซ่อมจริง = ทั้งหมด - ซ่อมซ้ำ
    const eqCount = {};
    jobs.forEach(j => { if(j.Equipment_ID) eqCount[j.Equipment_ID] = (eqCount[j.Equipment_ID]||0)+1; });
    const repeatJobs = jobs.filter(j => eqCount[j.Equipment_ID] > 1);
    const realJobs   = jobs.length - repeatJobs.length; // งานซ่อมจริง (ไม่ซ้ำ)
    const uniqueRepeatEq = Object.values(eqCount).filter(c => c > 1).length;

    // MTTR (เก็บไว้สำหรับ reports.html)
    const closed = jobs.filter(j => j.Status==='CLOSED' && j.Create_Date && j.Close_Date);
    const mttr   = closed.length ? parseFloat((closed.reduce((s,j) => s+(new Date(j.Close_Date)-new Date(j.Create_Date))/86400000, 0)/closed.length).toFixed(1)) : 0;

    // Priority
    const byP = { CRITICAL:0, HIGH:0, MEDIUM:0, LOW:0 };
    jobs.forEach(j => { if(j.Priority && byP[j.Priority]!==undefined) byP[j.Priority]++; });

    // Low stock
    const lowStock = _localParts.filter(p => parseFloat(p.Current_Stock||0) <= parseFloat(p.Min_Stock||0));

    return {
      success: true,
      stats: {
        total:           jobs.length,
        CLOSED:          cnt.CLOSED          || 0,
        IN_PROGRESS:     cnt.SEND_REPAIR     || 0,
        RETURNED:        cnt.RETURNED        || 0,
        WAIT_APPROVAL:   cnt.WAIT_APPROVAL   || 0,
        WAIT_SPARE_PART: cnt.WAIT_SPARE_PART || 0,
        SEND_REPAIR:     cnt.SEND_REPAIR     || 0,
        OPEN:            cnt.OPEN            || 0,
        realJobs:        realJobs,             // งานซ่อมจริง (ไม่ซ้ำ)
        repeatJobs:      repeatJobs.length,    // ซ่อมซ้ำ
        uniqueRepeatEq:  uniqueRepeatEq,       // จำนวนอุปกรณ์ที่ซ่อมซ้ำ
      },
      mttr,
      realJobs,
      repeatCount:    repeatJobs.length,
      uniqueRepeatEq: uniqueRepeatEq,
      pendingApprovals: cnt.WAIT_APPROVAL || 0,
      monthlyTrend: { labels: months, data: tData },
      vendorKPIs: SAMPLE_VENDORS.map(v => ({
        name:   v.Vendor_Name,
        total:  jobs.filter(j => j.Vendor_ID === v.Vendor_ID).length,
        closed: jobs.filter(j => j.Vendor_ID === v.Vendor_ID && j.Status === 'CLOSED').length,
      })),
      byPriority:  byP,
      recentJobs:  jobs.slice().sort((a,b) => (b.Create_Date||'').localeCompare(a.Create_Date||'')).slice(0,10),
      lowStock,
    };
  },

  /* ── PARTS ── */
  async issuePart({ partId, partCode, qty, jobNo, remark }) {
    _localParts = _loadParts();
    const idx = _localParts.findIndex(p => p.Part_ID === partId || p.Part_Code === (partCode || partId));
    if (idx < 0) return { success: false, error: 'ไม่พบ Part' };
    const cur = parseFloat(_localParts[idx].Current_Stock || 0);
    if (cur < qty) return { success: false, error: 'สต๊อกไม่พอ (เหลือ ' + cur + ')' };
    _localParts[idx].Current_Stock = cur - qty;
    _saveParts();

    // log
    try {
      const log = JSON.parse(localStorage.getItem('rms_iss_log') || '[]');
      log.unshift({ date: new Date().toISOString().slice(0,10), partId, qty, jobNo: jobNo||'', remark: remark||'', by: (Auth.getUser()||{}).username||'admin' });
      localStorage.setItem('rms_iss_log', JSON.stringify(log.slice(0,200)));
    } catch(e) {}

    if (RMS.USE_GAS) { try { await callGAS('issuePart', { partId, qty, jobNo, remark }); } catch(e) {} }
    return { success: true, newStock: _localParts[idx].Current_Stock };
  },

  async receivePart({ partId, qty, unitCost }) {
    _localParts = _loadParts();
    const idx = _localParts.findIndex(p => p.Part_ID === partId || p.Part_Code === partId);
    if (idx < 0) return { success: false, error: 'ไม่พบ Part' };
    _localParts[idx].Current_Stock = parseFloat(_localParts[idx].Current_Stock||0) + qty;
    if (unitCost) _localParts[idx].Cost = parseFloat(unitCost);
    _saveParts();

    try {
      const log = JSON.parse(localStorage.getItem('rms_rcv_log') || '[]');
      log.unshift({ date: new Date().toISOString().slice(0,10), partId, qty, unitCost: unitCost||0, by: (Auth.getUser()||{}).username||'admin' });
      localStorage.setItem('rms_rcv_log', JSON.stringify(log.slice(0,200)));
    } catch(e) {}

    if (RMS.USE_GAS) { try { await callGAS('receivePart', { partId, qty, unitCost }); } catch(e) {} }
    return { success: true, newStock: _localParts[idx].Current_Stock };
  },
};

  },

  statusBadge(s) {

      RETURNED:        { bg:'rgba(15,76,129,.1)',   color:'#0F4C81', label:'RETURNED'          },
      WAIT_APPROVAL:   { bg:'rgba(217,119,6,.1)',   color:'#b45309', label:'WAIT APPROVAL'     },
      WAIT_APPROVE:    { bg:'rgba(217,119,6,.1)',   color:'#b45309', label:'WAIT APPROVE'      },
      WAIT_SPARE_PART: { bg:'rgba(124,58,237,.1)',  color:'#6d28d9', label:'WAIT SPARE PART'   },

    return `<span style="display:inline-block;padding:3px 10px;border-radius:20px;font-size:.62rem;font-weight:700;letter-spacing:.2px;background:${c.bg};color:${c.color}">${c.label}</span>`;
  },

  toast(msg, type, duration) {
    duration = duration || 3200;
    const ICONS   = { success:'fa-check-circle', danger:'fa-times-circle', warning:'fa-exclamation-triangle', info:'fa-info-circle' };
    const COLORS  = { success:'#16a34a', danger:'#dc2626', warning:'#d97706', info:'#0284c7' };
    const icon    = ICONS[type]  || ICONS.info;
    const color   = COLORS[type] || COLORS.info;

    let tc = document.getElementById('rmsToastContainer');
    if (!tc) {
      tc = document.createElement('div');
      tc.id = 'rmsToastContainer';
      tc.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;';
      document.body.appendChild(tc);
    }

    // inject keyframes once
    if (!document.getElementById('_rmsKF')) {
      const s = document.createElement('style');
      s.id = '_rmsKF';
      s.textContent = '@keyframes _rmsIn{from{opacity:0;transform:translateX(18px) scale(.96)}to{opacity:1;transform:none}}@keyframes _rmsOut{from{opacity:1;transform:none}to{opacity:0;transform:translateX(18px) scale(.96)}}';
      document.head.appendChild(s);
    }

    const t = document.createElement('div');
    t.style.cssText = `background:#1e293b;color:#f1f5f9;padding:11px 16px;border-radius:9px;font-size:.8rem;font-weight:500;box-shadow:0 16px 40px rgba(0,0,0,.22);display:flex;align-items:center;gap:10px;animation:_rmsIn .22s cubic-bezier(0.16,1,0.3,1) forwards;pointer-events:all;max-width:320px;border-left:3px solid ${color};font-family:'Inter','Noto Sans Thai',sans-serif;line-height:1.4;`;
    t.innerHTML = `<i class="fas ${icon}" style="color:${color};font-size:.8rem;flex-shrink:0"></i><span>${msg}</span>`;
    tc.appendChild(t);

    setTimeout(() => {
      t.style.animation = '_rmsOut .18s ease forwards';
      setTimeout(() => { try { t.remove(); } catch(e) {} }, 200);
    }, duration);
  },

  confirm(msg, onConfirm) {
    const ex = document.getElementById('_rmsConfirm');
    if (ex) ex.remove();

    if (!document.getElementById('_rmsCF')) {
      const s = document.createElement('style');
      s.id = '_rmsCF';
      s.textContent = '@keyframes _rmsCFIn{from{opacity:0}to{opacity:1}}@keyframes _rmsCFBoxIn{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:none}}';
      document.head.appendChild(s);
    }

    const ov = document.createElement('div');
    ov.id = '_rmsConfirm';
    ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:10999;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px);animation:_rmsCFIn .15s ease both;';
    ov.innerHTML = `
      <div style="background:#fff;border-radius:16px;padding:26px 24px;max-width:360px;width:100%;box-shadow:0 20px 56px rgba(0,0,0,.2);animation:_rmsCFBoxIn .18s cubic-bezier(0.16,1,0.3,1) both;font-family:'Inter','Noto Sans Thai',sans-serif;">
        <div style="width:44px;height:44px;border-radius:50%;background:rgba(217,119,6,.1);display:flex;align-items:center;justify-content:center;margin:0 auto 14px">
          <i class="fas fa-exclamation-triangle" style="color:#d97706;font-size:1rem"></i>
        </div>
        <p style="text-align:center;font-size:.84rem;color:#334155;font-weight:500;margin-bottom:20px;line-height:1.5">${msg}</p>
        <div style="display:flex;gap:8px">
          <button id="_rmsCC" style="flex:1;padding:8px;border:1.5px solid #e2e8f0;border-radius:7px;background:#f8fafc;color:#64748b;font-size:.8rem;font-weight:600;cursor:pointer;font-family:inherit;transition:background .12s" onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background='#f8fafc'">ยกเลิก</button>
          <button id="_rmsCO" style="flex:1;padding:8px;border:none;border-radius:7px;background:linear-gradient(135deg,#0F4C81,#1a5f9e);color:#fff;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .12s" onmouseover="this.style.opacity='.88'" onmouseout="this.style.opacity='1'">ยืนยัน</button>
        </div>
      </div>`;
    document.body.appendChild(ov);

    document.getElementById('_rmsCC').onclick = () => ov.remove();
    document.getElementById('_rmsCO').onclick = () => { ov.remove(); if (onConfirm) onConfirm(); };
    ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
  },
};

(function autoGuard() {
  const page = location.pathname.split('/').pop() || '';
  const open = ['login.html', 'index.html', ''];
  if (open.includes(page)) return;

  function check() {
    if (!Auth.isLoggedIn()) {
      window.location.href = 'login.html';
      return;
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', check);
  } else {
    check();
  }
})();

/* ── BADGE COUNTERS ─────────────────────────────────────────── */
function _getBadgeCounts() {
  try {
    const waitApprove = (typeof _localJobs !== 'undefined' ? _localJobs : [])
      .filter(j => ['WAIT_APPROVAL','WAIT_APPROVE'].includes((j.Status||'').replace(/ /g,'_')))
      .length;
    const inProgress = (typeof _localJobs !== 'undefined' ? _localJobs : [])
      .filter(j => (j.Status||'') === 'SEND_REPAIR')
      .length;
    return { approve: waitApprove || 0, jobs: inProgress || 0 };
  } catch(e) { return {}; }
}

/* ── BUILD SIDEBAR HTML ─────────────────────────────────────── */
function _buildSidebar() {
  const cur  = location.pathname.split('/').pop() || 'dashboard.html';
  const user = (typeof Auth !== 'undefined') ? Auth.getUser() : null;
  const badges = _getBadgeCounts();
  const isAdmin   = user && ['SUPER_ADMIN','ADMIN'].includes(user.role);
  const isManager = user && ['SUPER_ADMIN','ADMIN','MANAGER'].includes(user.role);
  const initials  = user ? (user.name||user.username||'U').slice(0,2).toUpperCase() : 'U';
  const roleName  = user ? (user.role||'USER') : 'USER';
  const displayName = user ? (user.name||user.username||'User') : 'User';

  let navHTML = '';
  NAV_CONFIG.forEach(item => {
    if (item.section !== undefined) {
      if (item.adminOnly && !isAdmin) return;
      navHTML += `<div class="nav-section-label">${item.section}</div>`;
      return;
    }
    if (item.adminOnly   && !isAdmin)   return;
    if (item.managerOnly && !isManager) return;

    const active  = cur === item.href ? 'active' : '';
    const badgeCnt = item.badgeKey && badges[item.badgeKey] ? badges[item.badgeKey] : 0;
    const badgeHTML = badgeCnt ? `<span class="nav-badge">${badgeCnt}</span>` : '';

    navHTML += `
      <a href="${item.href}" class="nav-item ${active}">
        <span class="nav-icon"><i class="fas ${item.icon}"></i></span>
        <span>${item.label}</span>
        ${badgeHTML}
      </a>`;
  });

  return `
  <aside class="rms-sidebar" id="rmsSidebar">
    <!-- Brand -->
    <div class="sidebar-brand">
      <div class="brand-icon"><i class="fas fa-tools"></i></div>
      <div class="brand-text">
        <div class="brand-name">EWS Enterprise</div>
        <div class="brand-ver">v3.0 · CMMS</div>
      </div>
    </div>

    <!-- Nav -->
    <nav class="sidebar-nav">${navHTML}</nav>

    <!-- Footer -->
    <div class="sidebar-footer">
      <div class="sidebar-user" style="padding:10px 12px 0;border-bottom:none;border-top:none;margin-bottom:8px">
        <div class="user-avatar">${initials}</div>
        <div class="user-info">
          <div class="user-name">${displayName}</div>
          <div class="user-role">${roleName}</div>
        </div>
      </div>
      <button onclick="doLogout()" style="width:100%;display:flex;align-items:center;justify-content:center;gap:7px;padding:8px 12px;border-radius:7px;border:1px solid rgba(220,38,38,0.25);background:rgba(220,38,38,0.08);color:rgba(248,113,113,0.9);font-size:.72rem;font-weight:600;cursor:pointer;font-family:inherit;letter-spacing:.2px;transition:all .15s ease" onmouseover="this.style.background='rgba(220,38,38,0.15)'" onmouseout="this.style.background='rgba(220,38,38,0.08)'">
        <i class="fas fa-sign-out-alt" style="font-size:.7rem"></i>ออกจากระบบ
      </button>
    </div>
  </aside>`;
}

/* ── MAIN RENDER FUNCTION ───────────────────────────────────── */
function renderPageShell(title, content, actions) {
  var _lo=document.getElementById('rms-loader');if(_lo)_lo.remove();
  const wrapper = document.getElementById('app');
  if (!wrapper) return;

  // สร้าง sidebar และ main-content ใหม่ทั้งหมด
  wrapper.innerHTML =
    _buildSidebar() +
    '<div class="main-content" id="mainContent"></div>';

  const main = document.getElementById('mainContent');
  if (!main) return;

  main.innerHTML = _buildTopbar(title, actions || '') +
    '<div class="page-content">' + (content || '') + '</div>';

  // Toast container
  if (!document.getElementById('rmsToastContainer')) {
    const tc = document.createElement('div');
    tc.id = 'rmsToastContainer';
    tc.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;';
    document.body.appendChild(tc);
  }
}

/* ── SIDEBAR TOGGLE ─────────────────────────────────────────── */
function toggleSidebar() {
  const sidebar = document.getElementById('rmsSidebar');
  const main    = document.getElementById('mainContent');
  const topbar  = document.getElementById('rmsTopbar');
  if (!sidebar) return;

  const collapsed = sidebar.classList.toggle('collapsed');
  const w = collapsed ? 'var(--sidebar-collapsed)' : 'var(--sidebar-width)';
  sidebar.style.width = w;
  if (main)   main.style.marginLeft = w;
  if (topbar) topbar.style.left = w;
}

}

async function _load() {
  _panels();
  var dL = _localData();
  if (dL) { _kpis(dL); _charts(dL); }
  if (typeof RMS !== 'undefined' && RMS.USE_GAS) {
    try { var g = await DataStore.getDashboard(); if (g && g.success) { _kpis(g); _charts(g); } }
    catch(e) { console.warn('GAS:', e.message); }
  }
  var t = new Date(), el = document.getElementById('dbTs');
  if (el) el.textContent = 'Live · อัปเดต ' + t.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
}

/* ── Helpers ── */
function _jbs() {
  var j = _localJobs.filter(function(x){return x&&x.JOB_No&&x.JOB_No.trim();});
  if (!j.length && typeof SAMPLE_JOBS_RAW !== 'undefined')
    j = SAMPLE_JOBS_RAW.map(function(x){return Object.assign({},x);});
  return j;
}
function _ns(s) { return (s||'').trim().replace(/ /g,'_').toUpperCase(); }
function _rgba(hex, a) {
  if (!hex||!hex.startsWith('#')) return 'rgba(0,0,0,'+a+')';
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}

function _localData() {
  var js=_jbs(), cnt={};
  js.forEach(function(j){ var s=_ns(j.Status); cnt[s]=(cnt[s]||0)+1; });
  /* monthly */
  var a12=Array(12).fill(0), c12=Array(12).fill(0), yr=new Date().getFullYear();
  js.forEach(function(j){
    if(j.Create_Date){var d=new Date(j.Create_Date);if(!isNaN(d)&&d.getFullYear()===yr)a12[d.getMonth()]++;}
    if(j.Close_Date||j.Actual_Close){var cl=new Date(j.Close_Date||j.Actual_Close);if(!isNaN(cl)&&cl.getFullYear()===yr)c12[cl.getMonth()]++;}
  });
  /* MTTR */
  var diffs=[];
  js.forEach(function(j){
    if(j.Status==='CLOSED'&&j.Create_Date&&(j.Close_Date||j.Actual_Close)){
      try{var diff=(new Date(j.Close_Date||j.Actual_Close)-new Date(j.Create_Date))/86400000; if(diff>=0)diffs.push(diff);}catch(e){}
    }
  });
  var mttr=diffs.length?+(diffs.reduce(function(s,v){return s+v;},0)/diffs.length).toFixed(1):0;
  /* damage */
  var dmg={};
  js.forEach(function(j){if(j.Damage_Code)dmg[j.Damage_Code]=(dmg[j.Damage_Code]||0)+1;});
  var topDmg=Object.entries(dmg).sort(function(a,b){return b[1]-a[1];}).slice(0,8);
  /* equip */
  var eqC={};
  js.forEach(function(j){if(j.Equipment_ID)eqC[j.Equipment_ID]=(eqC[j.Equipment_ID]||0)+1;});
  var MN=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  var nm=new Date().getMonth(), lbl=[], open6=[], close6=[];
  for(var i=5;i>=0;i--){var m=(nm-i+12)%12;lbl.push(MN[m]);open6.push(a12[m]);close6.push(c12[m]);}
  return {
    success:true, mttr:mttr,
    stats:{total:js.length,CLOSED:cnt.CLOSED||0,IN_PROGRESS:cnt.SEND_REPAIR||0,
      SEND_REPAIR:cnt.SEND_REPAIR||0,WAIT_PARTS:(cnt.WAIT_PARTS||0)+(cnt.WAIT_SPARE_PART||0),
      REWORK:cnt.REWORK||0,RETURNED:cnt.RETURNED||0,WAIT_APPROVAL:cnt.WAIT_APPROVAL||0},
    monthlyTrend:{labels:lbl,open:open6,close:close6},
    topDmg:topDmg, eqCount:eqC,
  };
}

/* ═══════════════════════════════════════════════════════
   RENDER KPIs
═══════════════════════════════════════════════════════ */
function _kpis(d) {
  var s=d.stats||{}, js=_jbs(), sc={}, eqC={}, eqS={};
  js.forEach(function(j){var st=_ns(j.Status);sc[st]=(sc[st]||0)+1;});
  js.forEach(function(j){if(j.Equipment_ID)eqC[j.Equipment_ID]=(eqC[j.Equipment_ID]||0)+1;});
  js.forEach(function(j){
    if(!j.Equipment_ID)return;
    var st=_ns(j.Status);if(!eqS[st])eqS[st]={};eqS[st][j.Equipment_ID]=1;
  });
  function uEq(k){return Object.keys(eqS[k]||{}).length;}
  function jv(k){return s[k]!==undefined?s[k]:(sc[k]||0);}

  var Jt=(s.total!==undefined&&s.total>0)?s.total:js.length;
  var Jc=jv('CLOSED'), Ji=jv('SEND_REPAIR');
  var Jr=js.filter(function(j){return eqC[j.Equipment_ID]>1;}).length;
  var Et=Object.keys(eqC).length, Ec=uEq('CLOSED'), Ei=uEq('SEND_REPAIR');
  var Er=Object.values(eqC).filter(function(c){return c>1;}).length;
  var Wsr=jv('SEND_REPAIR'), Wwp=jv('WAIT_PARTS')+(sc.WAIT_SPARE_PART||0);
  var Wrw=jv('REWORK'), Wrt=jv('RETURNED');

  var r1=document.getElementById('kR1');
  if(r1) r1.innerHTML=[
    /* Total: stacked layers = work orders stack */
    _kc('#0F4C81','fa-layer-group',  'งานทั้งหมด',    Jt,  'Total Work Orders',           'jobs.html'),
    /* Closed: circle-check = done/verified */
    _kc('#16A34A','fa-circle-check', 'ปิดงานแล้ว',   Jc,  'Closed — งานสำเร็จ',          'jobs.html?status=CLOSED'),
    /* InProgress: gear spinning = active work */
    _kc('#3B82F6','fa-gear',         'กำลังดำเนินการ',Ji,  'In Progress — กำลังซ่อม',     'jobs.html?status=SEND_REPAIR'),
    /* Repeat: arrows-rotate = recurring loop */
    _kc('#DC2626','fa-arrows-rotate','ซ่อมซ้ำ',       Jr,  'Repeat — '+Jr+' JOBs / '+Object.values(eqC).filter(function(c){return c>1;}).length+' Equip',
      'jobs.html?status=REPEAT', true),
  ].join('');

  var r2=document.getElementById('kR2');
  if(r2) r2.innerHTML=[
    /* Total equip: cpu/chip = equipment */
    _kc('#0F4C81','fa-microchip',    'อุปกรณ์ทั้งหมด',Et, 'Unique Equipment IDs',         'jobs.html'),
    /* Closed equip: shield-check = protected/done */
    _kc('#16A34A','fa-shield-check', 'ปิดงานแล้ว',   Ec, 'Equip ที่มี JOB ปิดแล้ว',      'jobs.html?status=CLOSED'),
    /* InProgress equip: wrench = being repaired */
    _kc('#3B82F6','fa-wrench',       'กำลังดำเนินการ',Ei, 'Equip ที่ยังซ่อมอยู่',         'jobs.html?status=SEND_REPAIR'),
    /* Repeat equip: triangle-exclamation = alert */
    _kc('#DC2626','fa-triangle-exclamation','ซ่อมซ้ำ', Er, 'Equipment ที่มี > 1 JOB',     'jobs.html?status=REPEAT', true),
  ].join('');

  var r3=document.getElementById('kR3');
  if(r3) r3.innerHTML=[
    /* Send repair: truck = shipping out */
    _kc('#0284C7','fa-truck-fast',   'ส่งซ่อม',       Wsr, 'Send Repair — ส่งออกซ่อม',   'jobs.html?status=SEND_REPAIR'),
    /* Wait parts: cube = spare part box */
    _kc('#F59E0B','fa-cube',         'รอ Spare Part', Wwp, 'Wait Parts — รอชิ้นส่วน',     'jobs.html?status=WAIT_PARTS'),
    /* Rework: screwdriver-wrench = redo work */
    _kc('#7C3AED','fa-screwdriver-wrench','Rework',   Wrw, 'Rework — งานส่งซ่อมใหม่',     'jobs.html?status=REWORK'),
    /* Returned: arrow-turn-left = sent back */
    _kc('#D97706','fa-arrow-turn-up','ส่งกลับ',       Wrt, 'Returned — ส่งคืนเครื่อง',   'jobs.html?status=RETURNED'),
  ].join('');
}

function _kc(color, icon, label, val, desc, href, danger) {
  var n    = Number(val);
  var isDgr = danger === true && n > 0;
  var zero  = n === 0;
  var vClr  = zero ? '#CBD5E1' : color;
  var icoBg = color.startsWith('var') ? 'rgba(15,76,129,.12)' : _rgba(color, zero?.05:.12);
  var icoClr= zero ? '#94A3B8' : color;
  /* icon: wrap + sub-detail icon */
  var iconHTML = (
    '<div class="kc-icon" style="background:'+icoBg+';color:'+icoClr+'">' +
      '<i class="fas '+icon+'" style="font-size:.9rem;filter:drop-shadow(0 1px 1px rgba(0,0,0,.08))"></i>' +
    '</div>'
  );
  /* badge */
  var badge = isDgr
    ? '<span class="kc-trend" style="background:'+_rgba(color,.1)+';color:'+color+'">' +
        '<i class="fas fa-circle" style="font-size:.35rem"></i>ต้องดูแล</span>'
    : '';
  /* value — format with comma if ≥1000 */
  var displayVal = isNaN(n) ? '—' : (n >= 1000 ? n.toLocaleString() : val);
  return (
    '<div class="col-xl-3 col-md-6 col-6">' +
    '<a href="'+href+'" class="kc'+(isDgr?' kc-warn':'')+'" style="text-decoration:none">' +
      '<div class="kc-accent" style="background:'+(zero?'#F1F5F9':color)+'"></div>' +
      '<div class="kc-body">' +
        '<div class="kc-row1">' +
          iconHTML + badge +
        '</div>' +
        '<div class="kc-val'+(zero?' dim':'')+'" style="color:'+vClr+'">'+displayVal+'</div>' +
        '<div class="kc-lbl">'+label+'</div>' +
        '<div class="kc-desc">'+desc+'</div>' +
      '</div>' +
    '</a></div>'
  );
}
/* ═══════════════════════════════════════════════════════
   CHARTS
═══════════════════════════════════════════════════════ */
function _mc(id, type, labels, datasets, opts) {
  var ctx=document.getElementById(id); if(!ctx)return;
  if(_C[id]){try{_C[id].destroy();}catch(e){}}
  var o={responsive:true,maintainAspectRatio:false,animation:{duration:500},plugins:{legend:{display:false}}};
  if(type==='line'||type==='bar'){
    o.scales={
      x:{grid:{display:false},ticks:{color:'#94A3B8',font:{size:10,family:'Inter'},maxRotation:0}},
      y:{grid:{color:'rgba(0,0,0,.04)',drawBorder:false},ticks:{color:'#94A3B8',font:{size:10,family:'Inter'}},beginAtZero:true,border:{display:false}},
    };
    if(opts&&opts.stacked){o.scales.x.stacked=true;o.scales.y.stacked=true;}
    if(opts&&opts.indexAxis)o.indexAxis=opts.indexAxis;
    if(opts&&opts.y_suggestedMax)o.scales.y.suggestedMax=opts.y_suggestedMax;
  }
  if(type==='doughnut')o.cutout='68%';
  if(opts&&opts.legend)o.plugins.legend={display:true,position:'bottom',labels:{boxWidth:10,font:{size:10,family:'Inter'},color:'#64748B',padding:12}};
  if(opts&&opts.tip)o.plugins.tooltip=opts.tip;
  _C[id]=new Chart(ctx,{type:type,data:{labels:labels,datasets:datasets},options:o});
}

function _charts(d) {
  var js=_jbs(), tr=d.monthlyTrend||{labels:[],open:[],close:[]};

  /* 1. Trend line */
  _mc('cTrend','line',tr.labels,[{
    label:'เปิดงาน',data:tr.open,
    borderColor:'#1B9AAA',backgroundColor:'rgba(27,154,170,.08)',
    fill:true,tension:.4,borderWidth:2.5,
    pointBackgroundColor:'#1B9AAA',pointBorderColor:'#fff',pointBorderWidth:2.5,
    pointRadius:4.5,pointHoverRadius:7,
  }],{tip:{callbacks:{title:function(i){return i[0]?i[0].label:'';},label:function(i){return ' '+i.parsed.y+' งาน';}}}});
  var tot=document.getElementById('trendTotal');
  if(tot){var sm=tr.open.reduce(function(a,b){return a+b;},0);tot.textContent=sm+' งาน 6 เดือน';}

  /* 2. Status donut */
  var sc={};
  js.forEach(function(j){var s=_ns(j.Status);sc[s]=(sc[s]||0)+1;});
  var sl=[
    {l:'Closed',      v:sc.CLOSED||0,                              c:'#16A34A'},
    {l:'Send Repair', v:sc.SEND_REPAIR||0,                        c:'#0284C7'},
    {l:'In Progress', v:sc.SEND_REPAIR||0,                        c:'#3B82F6'},
    {l:'Wait Parts',  v:(sc.WAIT_PARTS||0)+(sc.WAIT_SPARE_PART||0),c:'#F59E0B'},
    {l:'Rework',      v:sc.REWORK||0,                             c:'#7C3AED'},
    {l:'Returned',    v:sc.RETURNED||0,                           c:'#D97706'},
  ].filter(function(s){return s.v>0;});
  if(!sl.length)sl=[{l:'ไม่มีข้อมูล',v:1,c:'#E2E8F0'}];
  _mc('cStatus','doughnut',sl.map(function(s){return s.l;}),
    [{data:sl.map(function(s){return s.v;}),backgroundColor:sl.map(function(s){return s.c;}),borderWidth:3,borderColor:'#fff',hoverOffset:6}],{});
  var dTot=document.getElementById('donutTotal'); if(dTot)dTot.textContent=js.length;
  var leg=document.getElementById('cStatusLeg');
  if(leg)leg.innerHTML=sl.map(function(s){return '<div class="legend-item"><span class="legend-dot" style="background:'+s.c+'"></span><span class="legend-name">'+s.l+'</span><span class="legend-val">'+s.v+'</span></div>';}).join('');

  /* 3. Performance metrics */
  var closed=js.filter(function(j){return j.Status==='CLOSED';}).length;
  var total=js.length;
  var closeRate=total>0?Math.round(closed/total*100):0;
  var eqC={};
  js.forEach(function(j){if(j.Equipment_ID)eqC[j.Equipment_ID]=(eqC[j.Equipment_ID]||0)+1;});
  var repEq=Object.values(eqC).filter(function(c){return c>1;}).length;
  var repJobs=js.filter(function(j){return eqC[j.Equipment_ID]>1;}).length;
  var realJobs=total-repJobs;
  var perf=document.getElementById('perfMetrics');
  if(perf)perf.innerHTML=(
    '<div class="metric-row">' +
      _metricItem((d.mttr||0)+'d','MTTR เฉลี่ย') +
      _metricItem(closeRate+'%','Close Rate') +
    '</div>' +
    '<div class="metric-row">' +
      _metricItem(realJobs,'งานซ่อมจริง') +
      _metricItem(repEq+' เครื่อง','Repeat Equip') +
    '</div>' +
    '<div class="metric-row">' +
      _metricItem(total,'Total JOBs') +
      _metricItem(closed,'Closed') +
    '</div>'
  );

  /* 4. Top damage codes horizontal bar */
  var topD=d.topDmg||(function(){var dm={};js.forEach(function(j){if(j.Damage_Code)dm[j.Damage_Code]=(dm[j.Damage_Code]||0)+1;});return Object.entries(dm).sort(function(a,b){return b[1]-a[1];}).slice(0,8);})();
  if(topD.length)_mc('cDmg','bar',
    topD.map(function(x){return x[0].length>22?x[0].slice(0,21)+'…':x[0];}),
    [{label:'ครั้ง',data:topD.map(function(x){return x[1];}),
      backgroundColor:topD.map(function(_,i){return ['rgba(220,38,38,.7)','rgba(220,38,38,.6)','rgba(220,38,38,.5)','rgba(220,38,38,.4)','rgba(220,38,38,.35)','rgba(220,38,38,.3)','rgba(220,38,38,.25)','rgba(220,38,38,.2)'][i]||'rgba(220,38,38,.2)';}),
      borderRadius:5,barThickness:14}],
    {indexAxis:'y',tip:{callbacks:{label:function(i){return ' '+i.parsed.x+' ครั้ง';}}}});

  /* 5. Repeat equipment spark bars */
  var repData=Object.entries(d.eqCount||eqC).filter(function(x){return x[1]>1;}).sort(function(a,b){return b[1]-a[1];}).slice(0,8);
  var maxRep=repData.length?repData[0][1]:1;
  var rb=document.getElementById('repeatBars');
  var rs=document.getElementById('repeatStat');
  if(rs)rs.textContent=repData.length+' เครื่อง';
  if(rb)rb.innerHTML=repData.map(function(item){
    var eq=item[0],n=item[1],pct=Math.round(n/maxRep*100);
    var col=n>=3?'#DC2626':n>=2?'#D97706':'#1B9AAA';
    var openJ=js.filter(function(j){return j.Equipment_ID===eq&&_ns(j.Status)!=='CLOSED';}).length;
    return '<div class="spark-row">' +
      '<span class="spark-eq">'+eq+'</span>' +
      '<div class="spark-bar-wrap"><div class="spark-bar-fill" style="width:'+pct+'%;background:'+col+'"></div></div>' +
      '<span class="spark-cnt" style="color:'+col+'">'+n+'</span>' +
      '<span class="spark-tag" style="background:'+_rgba(col,.1)+';color:'+col+'">'+(openJ>0?openJ+' ค้าง':'ปิดแล้ว')+'</span>' +
    '</div>';
  }).join('');

  /* 6. Open vs Close grouped bar */
  _mc('cOvC','bar',tr.labels,
    [{label:'เปิดงาน',data:tr.open,backgroundColor:'rgba(15,76,129,.6)',borderRadius:4,borderSkipped:false},
     {label:'ปิดงาน', data:tr.close,backgroundColor:'rgba(22,163,74,.6)',borderRadius:4,borderSkipped:false}],
    {legend:true});

  /* 7. Damage progress bars (proportion) */
  var dmTotal=topD.reduce(function(a,b){return a+b[1];},0)||1;
  var colors=['#DC2626','#D97706','#3B82F6','#0284C7','#16A34A','#7C3AED','#F59E0B','#1B9AAA'];
  var dp=document.getElementById('dmgProgress');
  if(dp)dp.innerHTML=topD.map(function(x,i){
    var pct=Math.round(x[1]/dmTotal*100);
    var c=colors[i%colors.length];
    return '<div class="prog-row">' +
      '<span class="prog-label" title="'+x[0]+'">'+x[0]+'</span>' +
      '<div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%;background:'+c+'"></div></div>' +
      '<span class="prog-num">'+x[1]+'</span>' +
    '</div>';
  }).join('');

  /* 8. Closure rate polar / doughnut gauge */
  _mc('cRate','doughnut',['ปิดแล้ว','ยังค้าง'],
    [{data:[closed,total-closed],backgroundColor:['#16A34A','#F1F5F9'],borderWidth:0,hoverOffset:0}],
    {});
  var rm=document.getElementById('rateMetrics');
  if(rm)rm.innerHTML=(
    _metricItem(closeRate+'%','Close Rate') +
    _metricItem(d.mttr||0+'d','MTTR') +
    _metricItem(realJobs,'Real JOBs')
  );

  /* 9. Vendor */
  var vnd=typeof SAMPLE_VENDORS!=='undefined'?SAMPLE_VENDORS:[];
  if(vnd.length)_mc('cVdr','bar',
    vnd.map(function(v){return (v.Vendor_Name||'').replace('บริษัท ','').slice(0,14);}),
    [{label:'ทั้งหมด',data:vnd.map(function(v){return js.filter(function(j){return j.Vendor_ID===v.Vendor_ID;}).length;}),backgroundColor:'rgba(15,76,129,.55)',borderRadius:4},
     {label:'ปิดแล้ว',data:vnd.map(function(v){return js.filter(function(j){return j.Vendor_ID===v.Vendor_ID&&j.Status==='CLOSED';}).length;}),backgroundColor:'rgba(22,163,74,.65)',borderRadius:4}],
    {legend:true,stacked:false});
}

function _metricItem(val,lbl) {
  return '<div class="metric-item"><div class="metric-val">'+val+'</div><div class="metric-lbl">'+lbl+'</div></div>';
}

/* ═══════════════════════════════════════════════════════
   PANELS
═══════════════════════════════════════════════════════ */
function _panels() { _act(); _rpt(); _lst(); }

function _act() {
  var el=document.getElementById('actTbl'),ct=document.getElementById('actCnt');
  if(!el)return;
  var list=_jbs().filter(function(j){return _ns(j.Status)!=='CLOSED';})
    .sort(function(a,b){return (b.Create_Date||'').localeCompare(a.Create_Date||'');});
  if(ct)ct.textContent=list.length;
  if(!list.length){el.innerHTML='<div class="db-empty"><i class="fas fa-check-circle" style="color:#16A34A"></i><p>ไม่มีงานค้าง — ทุกอย่างเรียบร้อย</p></div>';return;}
  el.innerHTML='<div class="table-responsive"><table class="table table-hover mb-0 align-middle">' +
    '<thead><tr><th class="th-j">JOB No</th><th class="th-j">Equipment</th><th class="th-j">อาการ</th><th class="th-j">Status</th><th class="th-j">วันที่รับ</th></tr></thead><tbody id="tBd">' +
    list.map(function(j){
      return '<tr data-jno="'+j.JOB_No+'" class="tr-j">' +
        '<td class="td-j"><span class="jno">'+j.JOB_No+'</span><span class="jwo">WO: '+(j.Work_Order||'—')+'</span></td>' +
        '<td class="td-j"><span class="eq-c">'+(j.Equipment_ID||'—')+'</span></td>' +
        '<td class="td-j td-dmg" title="'+(j.Damage_Code||'')+'">'+(j.Damage_Code||'—')+'</td>' +
        '<td class="td-j">'+UI.statusBadge(j.Status)+'</td>' +
        '<td class="td-j td-dt">'+(j.Create_Date||'—')+'</td></tr>';
    }).join('')+'</tbody></table></div>';
  var tb=document.querySelector('#tBd');
  if(tb)tb.addEventListener('click',function(e){var r=e.target.closest('tr[data-jno]');if(r)window.location.href='jobs.html?view='+r.dataset.jno;});
}

function _rpt() {
  var el=document.getElementById('rptPanel'); if(!el)return;
  var eqC={};
  _localJobs.forEach(function(j){if(j.Equipment_ID&&j.JOB_No)eqC[j.Equipment_ID]=(eqC[j.Equipment_ID]||0)+1;});
  var list=Object.entries(eqC).filter(function(x){return x[1]>1;}).sort(function(a,b){return b[1]-a[1];}).slice(0,8);
  if(!list.length){el.innerHTML='<div class="db-empty"><i class="fas fa-check-circle" style="color:#16A34A"></i><p>ไม่มีอุปกรณ์ซ่อมซ้ำ</p></div>';return;}
  el.innerHTML=list.map(function(it){
    var eq=it[0],n=it[1];
    var eqJs=_localJobs.filter(function(j){return j.Equipment_ID===eq&&j.JOB_No;});
    var open=eqJs.filter(function(j){return _ns(j.Status)!=='CLOSED';});
    return '<div class="rp-item"><div class="d-flex justify-content-between align-items-center mb-2">' +
      '<span class="rp-eqid">'+eq+'</span>' +
      '<span class="rp-n">'+n+' ครั้ง'+(open.length?'<span class="rp-pill">'+open.length+' ค้าง</span>':'')+'</span>' +
      '</div><div>'+eqJs.map(function(j){
        var o=open.indexOf(j)>=0;
        return '<span class="rp-jno'+(o?' op':'')+'" data-jno="'+j.JOB_No+'">'+j.JOB_No+'</span>';
      }).join('')+'</div></div>';
  }).join('');
  el.addEventListener('click',function(e){var s=e.target.closest('[data-jno]');if(s)window.location.href='jobs.html?view='+s.dataset.jno;});
}

function _lst() {
  var el=document.getElementById('lstk'); if(!el)return;
  var low=_localParts.filter(function(p){return parseFloat(p.Current_Stock||0)<=parseFloat(p.Min_Stock||0);});
  if(!low.length){el.innerHTML='<div class="db-empty" style="padding:20px"><i class="fas fa-check-circle" style="color:#16A34A"></i><p>สต๊อกปกติ</p></div>';return;}
  el.innerHTML=low.slice(0,5).map(function(p){
    var cur=parseFloat(p.Current_Stock||0),mn=parseFloat(p.Min_Stock||0),mx=parseFloat(p.Max_Stock||50);
    var pct=Math.min(100,Math.round(cur/Math.max(mx,1)*100));
    var c=cur<=0?'#DC2626':cur<=mn?'#F59E0B':'#16A34A';
    return '<div class="ls-row"><div style="flex:1;min-width:0"><div class="ls-nm">'+(p.Part_Name||p.Part_Code||'—')+'</div>' +
      '<div class="ls-bar"><div class="ls-fill" style="width:'+pct+'%;background:'+c+'"></div></div></div>' +
      '<div class="ls-n" style="color:'+c+'">'+cur+'<span class="ls-u">/'+mn+' '+(p.Unit||'PC')+'</span></div></div>';
  }).join('');
}
</script>

</body>
