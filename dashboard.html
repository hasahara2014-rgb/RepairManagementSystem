<!DOCTYPE html>
<html lang="th">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Enterprise Dashboard — EWS Enterprise</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
:root{--primary:#0F4C81;--primary-dark:#0a3560;--primary-light:#1a5f9e;--secondary:#1B9AAA;--secondary-dark:#147a87;--accent:#00D4FF;--success:#16A34A;--warning:#D97706;--danger:#DC2626;--critical:#991B1B;--info:#0284C7;--purple:#7C3AED;--gray-50:#F8FAFC;--gray-100:#F1F5F9;--gray-200:#E2E8F0;--gray-300:#CBD5E1;--gray-400:#94A3B8;--gray-500:#64748B;--gray-600:#475569;--gray-700:#334155;--gray-800:#1E293B;--gray-900:#0F172A;--sidebar-bg:#0a1f3d;--sidebar-width:252px;--sidebar-collapsed:64px;--surface:#FFFFFF;--bg-page:#F0F4F8;--shadow-xs:0 1px 2px rgba(0,0,0,.05);--shadow-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);--shadow-md:0 4px 6px rgba(0,0,0,.06),0 2px 4px rgba(0,0,0,.04);--shadow-lg:0 10px 24px rgba(0,0,0,.08),0 4px 8px rgba(0,0,0,.04);--radius-xs:4px;--radius-sm:6px;--radius-md:10px;--radius-lg:14px;--radius-xl:20px;--ease:cubic-bezier(.16,1,.3,1);--transition:.18s var(--ease);--font-sans:'Inter','Noto Sans Thai','Sarabun','Segoe UI',system-ui,sans-serif;--z-sidebar:900;--z-header:800;--z-modal:1050;--z-toast:1100;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:14px;scroll-behavior:smooth;}
body{font-family:var(--font-sans);background:var(--bg-page);color:var(--gray-800);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
.rms-wrapper{display:flex;min-height:100vh;}
/* ── SIDEBAR ── */
.rms-sidebar{width:var(--sidebar-width);background:#0d1b2e;position:fixed;top:0;left:0;bottom:0;z-index:var(--z-sidebar);display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,.05);overflow:hidden;}
.sidebar-brand{display:flex;align-items:center;gap:11px;padding:18px 16px 16px;border-bottom:1px solid rgba(255,255,255,.06);min-height:64px;flex-shrink:0;}
.brand-icon{width:34px;height:34px;background:linear-gradient(135deg,#1a5f9e,#1B9AAA);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 12px rgba(27,154,170,.35);}
.brand-icon i{font-size:14px;color:#fff;}
.brand-name{font-size:.82rem;font-weight:700;color:#fff;letter-spacing:-.1px;line-height:1.2;}
.brand-ver{font-size:.625rem;font-weight:500;color:rgba(255,255,255,.32);letter-spacing:.7px;text-transform:uppercase;margin-top:1px;}
.sidebar-user{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;background:rgba(255,255,255,.02);}
.user-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#1B9AAA,#0F4C81);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.68rem;flex-shrink:0;}
.user-name{font-size:.775rem;font-weight:600;color:rgba(255,255,255,.92);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
.user-role{font-size:.6rem;font-weight:500;color:rgba(255,255,255,.32);text-transform:uppercase;letter-spacing:.7px;}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 10px 4px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent;}
.sidebar-nav::-webkit-scrollbar{width:3px;}
.sidebar-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px;}
.nav-section-label{font-size:.575rem;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:rgba(255,255,255,.22);padding:14px 10px 5px;user-select:none;}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;color:rgba(255,255,255,.62);text-decoration:none;font-size:.8rem;font-weight:500;line-height:1;transition:background .15s ease,color .15s ease;cursor:pointer;white-space:nowrap;position:relative;margin-bottom:1px;}
.nav-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.92);}
.nav-item.active{background:rgba(27,154,170,.18);color:#fff;font-weight:700;}
.nav-item.active::before{content:'';position:absolute;left:0;top:18%;bottom:18%;width:2.5px;background:#1B9AAA;border-radius:0 2px 2px 0;}
.nav-icon{width:16px;text-align:center;font-size:.78rem;flex-shrink:0;color:rgba(255,255,255,.35);line-height:1;}
.nav-item:hover .nav-icon{color:rgba(255,255,255,.7);}
.nav-item.active .nav-icon{color:#1B9AAA;}
.nav-badge{margin-left:auto;background:#DC2626;color:#fff;font-size:.575rem;font-weight:700;padding:1px 5px;border-radius:20px;min-width:16px;text-align:center;line-height:1.6;}
.sidebar-footer{padding:10px 10px 12px;border-top:1px solid rgba(255,255,255,.06);flex-shrink:0;}
/* ── TOPBAR ── */
.rms-topbar{position:fixed;top:0;left:var(--sidebar-width);right:0;height:54px;background:#fff;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;padding:0 22px;z-index:var(--z-header);gap:14px;box-shadow:0 1px 0 rgba(0,0,0,.06);}
.page-title{font-size:.9rem;font-weight:700;color:var(--gray-800);line-height:1.25;letter-spacing:-.1px;}
.page-subtitle{font-size:.675rem;color:var(--gray-400);margin-top:1px;}
.topbar-actions{display:flex;align-items:center;gap:10px;margin-left:auto;flex-shrink:0;}
.topbar-icon-btn{width:34px;height:34px;border-radius:var(--radius-sm);border:1px solid var(--gray-200);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray-500);font-size:.85rem;transition:all var(--transition);}
.topbar-icon-btn:hover{background:var(--gray-100);color:var(--primary);}
.main-content{margin-left:var(--sidebar-width);padding-top:54px;min-height:100vh;flex:1;}
/* ── DASHBOARD LAYOUT ── */
.db-page{padding:20px 24px 40px;min-height:calc(100vh - 54px);}
/* ── MODULE TABS ── */
.mod-tabs{display:flex;gap:4px;flex-wrap:wrap;background:#fff;border-radius:12px;padding:6px;border:1px solid var(--gray-200);box-shadow:var(--shadow-xs);margin-bottom:20px;}
.mod-tab{display:flex;align-items:center;gap:7px;padding:8px 16px;border-radius:8px;font-size:.775rem;font-weight:600;color:var(--gray-500);cursor:pointer;border:none;background:transparent;transition:all .15s ease;white-space:nowrap;}
.mod-tab:hover{background:var(--gray-100);color:var(--gray-700);}
.mod-tab.active{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(15,76,129,.3);}
.mod-tab i{font-size:.75rem;}
/* ── KPI CARDS ── */
.kpi-grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));margin-bottom:20px;}
.kpi-card{background:#fff;border-radius:12px;padding:16px 18px;border:1px solid var(--gray-100);box-shadow:var(--shadow-sm);position:relative;overflow:hidden;transition:transform .15s,box-shadow .15s;}
.kpi-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.kpi-card.kc-primary::before{background:var(--primary);}
.kpi-card.kc-secondary::before{background:var(--secondary);}
.kpi-card.kc-success::before{background:var(--success);}
.kpi-card.kc-warning::before{background:var(--warning);}
.kpi-card.kc-danger::before{background:var(--danger);}
.kpi-card.kc-purple::before{background:var(--purple);}
.kpi-card.kc-info::before{background:var(--info);}
.kpi-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:.9rem;margin-bottom:12px;}
.kpi-icon.primary{background:rgba(15,76,129,.1);color:var(--primary);}
.kpi-icon.secondary{background:rgba(27,154,170,.1);color:var(--secondary);}
.kpi-icon.success{background:rgba(22,163,74,.1);color:var(--success);}
.kpi-icon.warning{background:rgba(217,119,6,.1);color:var(--warning);}
.kpi-icon.danger{background:rgba(220,38,38,.1);color:var(--danger);}
.kpi-icon.purple{background:rgba(124,58,237,.1);color:var(--purple);}
.kpi-icon.info{background:rgba(2,132,199,.1);color:var(--info);}
.kpi-value{font-size:1.8rem;font-weight:800;color:var(--gray-900);line-height:1;letter-spacing:-1px;font-variant-numeric:tabular-nums;margin-bottom:4px;}
.kpi-label{font-size:.7rem;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.5px;line-height:1.3;}
.kpi-sub{font-size:.68rem;color:var(--gray-400);margin-top:3px;}
/* ── CHART CARDS ── */
.chart-card{background:#fff;border-radius:12px;padding:20px;border:1px solid var(--gray-100);box-shadow:var(--shadow-sm);}
.chart-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:8px;}
.chart-title{font-size:.8rem;font-weight:700;color:var(--gray-700);}
.chart-sub{font-size:.68rem;color:var(--gray-400);margin-top:2px;}
/* ── TABLE CARDS ── */
.tbl-card{background:#fff;border-radius:12px;border:1px solid var(--gray-100);box-shadow:var(--shadow-sm);overflow:hidden;}
.tbl-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--gray-100);}
.tbl-title{font-size:.8rem;font-weight:700;color:var(--gray-700);}
.tbl-cnt{font-size:.68rem;color:var(--gray-400);font-weight:400;margin-left:8px;}
table.etbl{width:100%;border-collapse:collapse;}
table.etbl thead th{font-size:.65rem;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.5px;padding:9px 14px;border-bottom:2px solid var(--gray-100);background:var(--gray-50);white-space:nowrap;}
table.etbl tbody td{padding:9px 14px;font-size:.8rem;color:var(--gray-700);border-bottom:1px solid var(--gray-50);vertical-align:middle;}
table.etbl tbody tr:last-child td{border-bottom:none;}
table.etbl tbody tr:hover td{background:var(--gray-50);}
/* ── BADGES ── */
.badge-status{display:inline-block;padding:3px 9px;border-radius:20px;font-size:.62rem;font-weight:700;letter-spacing:.2px;}
.bs-CLOSED{background:rgba(22,163,74,.1);color:#15803d;}
.bs-SEND_REPAIR{background:rgba(27,154,170,.1);color:#0e7490;}
.bs-RETURNED{background:rgba(15,76,129,.1);color:#0F4C81;}
.bs-WAIT_APPROVAL{background:rgba(217,119,6,.1);color:#b45309;}
.bs-WAIT_SPARE_PART{background:rgba(124,58,237,.1);color:#6d28d9;}
.bs-OPEN{background:rgba(100,116,139,.1);color:#475569;}
/* ── SECTION HEADER ── */
.sec-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.sec-head-label{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--gray-500);}
.sec-head-line{flex:1;height:1px;background:var(--gray-100);}
/* ── PROGRESS ── */
.prog-bar{height:6px;border-radius:3px;background:var(--gray-100);overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;transition:width .6s var(--ease);}
/* ── METRIC ROW ── */
.metric-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--gray-50);}
.metric-row:last-child{border-bottom:none;}
.metric-name{flex:1;font-size:.8rem;color:var(--gray-700);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.metric-val{font-size:.8rem;font-weight:700;color:var(--gray-800);min-width:40px;text-align:right;}
/* ── STATUS FLOW ── */
.flow-box{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.flow-item{display:flex;flex-direction:column;align-items:center;background:#fff;border-radius:10px;border:1px solid var(--gray-200);padding:12px 16px;min-width:90px;text-align:center;gap:4px;}
.flow-num{font-size:1.5rem;font-weight:800;color:var(--gray-900);line-height:1;}
.flow-label{font-size:.62rem;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.4px;}
.flow-arrow{color:var(--gray-300);font-size:.8rem;}
/* ── TOAST ── */
#rmsToastContainer{position:fixed;bottom:24px;right:24px;z-index:var(--z-toast);display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.rms-toast{background:var(--gray-900);color:#fff;padding:12px 18px;border-radius:var(--radius-md);font-size:.82rem;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.15);display:flex;align-items:center;gap:10px;pointer-events:all;max-width:340px;border-left:3px solid var(--secondary);animation:toastIn .25s var(--ease);}
.rms-toast.success{border-left-color:var(--success);}
.rms-toast.danger{border-left-color:var(--danger);}
.rms-toast.out{animation:toastOut .2s var(--ease) forwards;}
@keyframes toastIn{from{opacity:0;transform:translateX(24px);}to{opacity:1;transform:none;}}
@keyframes toastOut{from{opacity:1;}to{opacity:0;transform:translateX(24px);}}
/* ── MODULE PANEL ── */
.mod-panel{display:none;}
.mod-panel.active{display:block;animation:fadeUp .25s var(--ease);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
/* ── GAUGE ── */
.gauge-wrap{position:relative;width:140px;height:80px;margin:0 auto;}
/* ── LOADING STATE ── */
.skel{background:linear-gradient(90deg,#F1F5F9 25%,#E2E8F0 50%,#F1F5F9 75%);background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite;border-radius:8px;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
/* ── LIVE INDICATOR ── */
.db-live{display:flex;align-items:center;gap:7px;font-size:.8rem;color:var(--gray-500);}
.live-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;animation:pulse 2.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 2px rgba(34,197,94,.15);}50%{box-shadow:0 0 0 5px rgba(34,197,94,.04);}}
/* ── REFRESH BTN ── */
.btn-refresh{display:inline-flex;align-items:center;gap:6px;background:#F8FAFC;border:1px solid var(--gray-200);color:var(--gray-600);border-radius:8px;padding:7px 14px;font-size:.775rem;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s;}
.btn-refresh:hover{background:#fff;border-color:var(--primary);color:var(--primary);box-shadow:0 0 0 3px rgba(15,76,129,.08);}
.btn-refresh.loading i{animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
/* ── RESPONSIVE ── */
@media(max-width:992px){:root{--sidebar-width:var(--sidebar-collapsed);}.brand-text,.nav-item span,.nav-section-label,.sidebar-user .user-info,.nav-badge{display:none!important;}.nav-item{justify-content:center;padding:10px;}.nav-icon{width:auto;font-size:1rem;}.db-page{padding:14px 14px 40px;}}
@media(max-width:768px){.kpi-grid{grid-template-columns:repeat(2,1fr);}.mod-tabs{overflow-x:auto;flex-wrap:nowrap;}.mod-tab span{display:none;}}
::-webkit-scrollbar{width:6px;height:6px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:3px;}
</style>

<style id="ds-v4">
/* ═══════════════════════════════════════════════════════════════
   EWS Enterprise Design System v4.0 — World-Class Override
   SAP Fiori / Fluent Design inspired
   ═══════════════════════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap');

:root{
  --font-sans:'Inter','Sarabun','Noto Sans Thai',system-ui,sans-serif;
  /* Refined Primary — Fiori Blue */
  --primary:#1264A3;--primary-dark:#0C4F84;--primary-light:#1976C8;
  --primary-50:#EBF4FC;--primary-100:#C9E2F7;
  /* Secondary — Deep Teal */
  --secondary:#0E8A8A;--secondary-dark:#0A6B6B;--secondary-light:#11ACAC;
  /* Semantic */
  --success:#107C10;--success-bg:#DFF6DD;
  --warning:#C45911;--warning-bg:#FFF4CE;
  --danger:#A4262C;--danger-bg:#FDE7E9;
  --info:#0078D4;--info-bg:#E8F4FE;
  --purple:#7B52C3;--purple-bg:#F4EEF9;
  /* Neutral — Slate Gray (cooler) */
  --gray-50:#F9FAFB;--gray-100:#F3F4F6;--gray-200:#E5E7EB;
  --gray-300:#D1D5DB;--gray-400:#9CA3AF;--gray-500:#6B7280;
  --gray-600:#4B5563;--gray-700:#374151;--gray-800:#1F2937;--gray-900:#111827;
  /* Sidebar */
  --sidebar-width:252px;--sidebar-collapsed:64px;
  /* Surfaces */
  --surface:#FFFFFF;--bg-page:#EEF2F7;
  /* Shadows — Refined */
  --shadow-xs:0 1px 2px rgba(0,0,0,0.04);
  --shadow-sm:0 1px 3px rgba(0,0,0,0.07),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 12px rgba(0,0,0,0.08),0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg:0 12px 28px rgba(0,0,0,0.10),0 4px 8px rgba(0,0,0,0.04);
  --shadow-xl:0 24px 56px rgba(0,0,0,0.12),0 8px 16px rgba(0,0,0,0.06);
  /* Card */
  --card-shadow:var(--shadow-sm);
  --card-radius:12px;
  --card-border:1px solid var(--gray-200);
}

/* ── GLOBAL ── */
body{font-family:var(--font-sans);background:var(--bg-page);-webkit-font-smoothing:antialiased;color:var(--gray-800);}

/* ── SIDEBAR v4 ── */
.rms-sidebar{background:#0B1927;}
.sidebar-brand{background:linear-gradient(180deg,rgba(18,100,163,.12) 0%,transparent 100%);border-bottom:1px solid rgba(255,255,255,.07);}
.brand-icon{background:linear-gradient(135deg,#1264A3,#0E8A8A);border-radius:10px;box-shadow:0 4px 12px rgba(18,100,163,.4);}
.brand-name{font-size:.84rem;font-weight:700;letter-spacing:-.1px;}
.brand-ver{font-size:.6rem;letter-spacing:.8px;color:rgba(255,255,255,.3);}
.nav-item{border-radius:8px;font-size:.795rem;padding:8px 11px;transition:background .12s,color .12s;}
.nav-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.95);}
.nav-item.active{background:rgba(14,138,138,.18);color:#fff;}
.nav-item.active::before{background:#0E8A8A;width:3px;border-radius:0 3px 3px 0;}
.nav-item.active .nav-icon{color:#0E8A8A;}
.nav-section-label{font-size:.555rem;letter-spacing:1.6px;color:rgba(255,255,255,.2);padding:16px 11px 5px;}
.nav-badge{font-size:.58rem;padding:1px 6px;border-radius:20px;}
.user-avatar{width:32px;height:32px;border-radius:8px;font-size:.72rem;box-shadow:0 2px 6px rgba(0,0,0,.2);}
.user-name{font-size:.79rem;font-weight:600;}
.user-role{font-size:.61rem;letter-spacing:.6px;}

/* ── TOPBAR v4 ── */
.rms-topbar{border-bottom:1px solid var(--gray-200);border-top:3px solid var(--primary);box-shadow:0 2px 8px rgba(0,0,0,.05);background:#fff;}
.page-title{font-size:.92rem;font-weight:700;color:var(--gray-900);letter-spacing:-.1px;}
.page-subtitle{font-size:.68rem;color:var(--gray-400);font-weight:400;}
.topbar-icon-btn{border-radius:8px;width:34px;height:34px;border:1px solid var(--gray-200);transition:all .15s;}
.topbar-icon-btn:hover{background:var(--primary-50);border-color:var(--primary-100);color:var(--primary);}

/* ── PAGE CONTENT ── */
.main-content{background:var(--bg-page);}
.page-content{padding:22px 24px 40px;max-width:1760px;}

/* ── STAT CARDS v4 ── */
.stat-card{
  background:#fff;border-radius:12px;
  border:1px solid var(--gray-200);border-left:4px solid transparent;
  padding:16px 18px;display:flex;align-items:center;gap:14px;
  box-shadow:var(--shadow-xs);
  transition:transform .15s ease,box-shadow .15s ease,border-color .15s;
  height:100%;
}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
.stat-card:has(.stat-icon.primary)  {border-left-color:var(--primary);}
.stat-card:has(.stat-icon.secondary){border-left-color:var(--secondary);}
.stat-card:has(.stat-icon.success)  {border-left-color:var(--success);}
.stat-card:has(.stat-icon.warning)  {border-left-color:var(--warning);}
.stat-card:has(.stat-icon.danger)   {border-left-color:var(--danger);}
.stat-card:has(.stat-icon.purple)   {border-left-color:var(--purple);}
.stat-card:has(.stat-icon.info)     {border-left-color:var(--info);}
.stat-icon{width:44px;height:44px;border-radius:10px;font-size:.95rem;}
.stat-icon.primary  {background:var(--primary-50);color:var(--primary);}
.stat-icon.secondary{background:rgba(14,138,138,.08);color:var(--secondary);}
.stat-icon.success  {background:var(--success-bg);color:var(--success);}
.stat-icon.warning  {background:var(--warning-bg);color:var(--warning);}
.stat-icon.danger   {background:var(--danger-bg);color:var(--danger);}
.stat-icon.purple   {background:var(--purple-bg);color:var(--purple);}
.stat-icon.info     {background:var(--info-bg);color:var(--info);}
.stat-value{font-size:1.75rem;font-weight:800;color:var(--gray-900);line-height:1;letter-spacing:-1px;font-variant-numeric:tabular-nums;}
.stat-label{font-size:.735rem;font-weight:600;color:var(--gray-700);line-height:1.3;margin-top:3px;}
.stat-sub{font-size:.685rem;color:var(--gray-400);margin-top:2px;}
.stat-delta{font-size:.72rem;font-weight:600;margin-top:4px;display:flex;align-items:center;gap:3px;}
.stat-delta.up{color:var(--success);}
.stat-delta.down{color:var(--danger);}

/* ── SECTION HEADER ── */
.page-section-title{
  font-size:.72rem;font-weight:700;color:var(--gray-500);
  text-transform:uppercase;letter-spacing:.8px;
  margin-bottom:12px;margin-top:4px;
  display:flex;align-items:center;gap:10px;
}
.page-section-title::after{content:'';flex:1;height:1px;background:var(--gray-200);}
.page-section-title i{font-size:.7rem;color:var(--primary);}

/* ── CHART CARDS v4 ── */
.chart-card{
  background:#fff;border-radius:12px;
  border:var(--card-border);padding:20px 22px;
  box-shadow:var(--shadow-xs);
}
.chart-title{font-size:.8rem;font-weight:700;color:var(--gray-800);}
.chart-sub{font-size:.67rem;color:var(--gray-400);margin-bottom:14px;margin-top:2px;}

/* ── TABLE CARDS v4 ── */
.table-card{background:#fff;border-radius:12px;border:var(--card-border);box-shadow:var(--shadow-xs);overflow:hidden;}
.table-header{display:flex;align-items:center;justify-content:space-between;padding:15px 20px;border-bottom:1px solid var(--gray-100);gap:12px;flex-wrap:wrap;}
.table-title{font-size:.8rem;font-weight:700;color:var(--gray-800);display:flex;align-items:center;gap:8px;}
.table thead th{
  background:var(--gray-50);color:var(--gray-500);
  font-size:.65rem;font-weight:700;letter-spacing:.65px;
  text-transform:uppercase;padding:11px 16px;
  border-bottom:2px solid var(--gray-200);white-space:nowrap;
}
.table tbody td{
  padding:11px 16px;font-size:.815rem;color:var(--gray-700);
  border-bottom:1px solid var(--gray-50);vertical-align:middle;
}
.table tbody tr:last-child td{border-bottom:none;}
.table-hover tbody tr:hover td,.table-hover tbody tr:hover{background:var(--gray-50)!important;}

/* ── FILTER CARD v4 ── */
.filter-card{
  background:#fff;border-radius:12px;border:var(--card-border);
  padding:16px 20px;box-shadow:var(--shadow-xs);
}
.filter-label{font-size:.64rem;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:5px;}

/* ── FORM v4 ── */
.form-card{background:#fff;border-radius:12px;border:var(--card-border);padding:22px 24px;box-shadow:var(--shadow-xs);}
.form-label{font-size:.73rem;font-weight:600;color:var(--gray-600);margin-bottom:5px;}
.form-control,.form-select{
  font-size:.82rem;border:1.5px solid var(--gray-200);border-radius:8px;
  padding:8px 12px;color:var(--gray-800);background:var(--gray-50);
  transition:border-color .15s,box-shadow .15s,background .15s;
  font-family:var(--font-sans);
}
.form-control:focus,.form-select:focus{
  border-color:var(--primary);background:#fff;outline:none;
  box-shadow:0 0 0 3px rgba(18,100,163,.1);
}
.form-control::placeholder{color:var(--gray-400);}
.form-section-title{
  font-size:.63rem;font-weight:700;color:var(--gray-500);text-transform:uppercase;
  letter-spacing:.8px;margin-bottom:14px;padding-bottom:10px;
  border-bottom:1px solid var(--gray-100);display:flex;align-items:center;gap:8px;
}
.required-star{color:var(--danger);}

/* ── INPUT GROUP ── */
.input-group-text{background:var(--gray-50);border:1.5px solid var(--gray-200);color:var(--gray-400);font-size:.82rem;}
.input-group .form-control{border-left:none;}
.input-group:focus-within{box-shadow:0 0 0 3px rgba(18,100,163,.1);border-radius:8px;}
.input-group:focus-within .input-group-text,.input-group:focus-within .form-control{border-color:var(--primary);box-shadow:none;}

/* ── BUTTONS v4 ── */
.btn-primary-rms{
  background:var(--primary);border:none;color:#fff;
  font-weight:600;font-size:.79rem;padding:8px 16px;
  border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;
  transition:all .15s;box-shadow:0 1px 3px rgba(18,100,163,.25);
  font-family:var(--font-sans);letter-spacing:.1px;
}
.btn-primary-rms:hover{background:var(--primary-dark);box-shadow:0 4px 12px rgba(18,100,163,.35);transform:translateY(-1px);color:#fff;}
.btn-primary-rms:active{transform:none;box-shadow:none;}
.btn-outline-rms{
  background:transparent;border:1.5px solid var(--gray-300);color:var(--gray-600);
  font-weight:600;font-size:.79rem;padding:7px 15px;border-radius:8px;
  cursor:pointer;display:inline-flex;align-items:center;gap:7px;
  transition:all .15s;font-family:var(--font-sans);
}
.btn-outline-rms:hover{background:var(--gray-50);border-color:var(--primary);color:var(--primary);}

/* ── STATUS FILTER BUTTONS ── */
.status-btn{
  border:1.5px solid var(--gray-200);background:var(--gray-50);color:var(--gray-500);
  font-size:.71rem;font-weight:600;padding:5px 13px;border-radius:20px;
  cursor:pointer;transition:all .15s;white-space:nowrap;font-family:var(--font-sans);
}
.status-btn:hover{background:var(--gray-100);border-color:var(--gray-300);color:var(--gray-700);}
.status-btn.active{background:var(--c,var(--primary));border-color:var(--c,var(--primary));color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.12);}

/* ── BADGE SYSTEM v4 ── */
.badge-priority,.badge-status{
  font-size:.61rem;font-weight:700;padding:3px 9px;
  border-radius:20px;letter-spacing:.2px;
  text-transform:uppercase;display:inline-block;line-height:1.5;
}
.badge-CRITICAL{background:rgba(153,27,27,.09);color:#991B1B;border:1px solid rgba(153,27,27,.18);}
.badge-HIGH    {background:rgba(180,83,9,.09);color:#B45309;border:1px solid rgba(180,83,9,.18);}
.badge-MEDIUM  {background:rgba(146,64,14,.09);color:#92400E;border:1px solid rgba(146,64,14,.18);}
.badge-LOW     {background:rgba(16,124,16,.09);color:#15803d;border:1px solid rgba(16,124,16,.18);}
.badge-CLOSED        {background:rgba(16,124,16,.09);color:#15803d;}
.badge-SEND_REPAIR   {background:rgba(14,138,138,.09);color:#0e7490;}
.badge-RETURNED      {background:rgba(18,100,163,.09);color:#1264A3;}
.badge-WAIT_APPROVAL {background:rgba(196,89,17,.09);color:#C45911;}
.badge-WAIT_SPARE_PART{background:rgba(123,82,195,.09);color:#7B52C3;}
.badge-REJECTED      {background:rgba(164,38,44,.09);color:#A4262C;}
.badge-APPROVED      {background:rgba(16,124,16,.09);color:#15803d;}
.badge-OPEN          {background:rgba(107,114,128,.09);color:#6B7280;}
.badge-IN_PROGRESS   {background:rgba(0,120,212,.09);color:#0078D4;}

/* ── ACTION BUTTONS ── */
.btn-action{
  width:30px;height:30px;border-radius:7px;
  border:1px solid var(--gray-200);background:var(--gray-50);
  display:inline-flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:.75rem;color:var(--gray-500);transition:all .15s;
}
.btn-action:hover{background:var(--gray-100);border-color:var(--gray-300);color:var(--gray-700);}
.btn-action.btn-view{color:var(--primary);border-color:rgba(18,100,163,.2);background:var(--primary-50);}

.btn-action.btn-edit{color:var(--secondary);border-color:rgba(14,138,138,.2);background:rgba(14,138,138,.06);}

.btn-action.btn-delete{color:var(--danger);border-color:rgba(164,38,44,.2);background:var(--danger-bg);}

.modal-content{border:none;border-radius:16px;box-shadow:var(--shadow-xl);overflow:hidden;}
.modal-header-rms{
  background:linear-gradient(135deg,var(--primary) 0%,var(--primary-light) 100%);

}
.modal-header-rms .modal-title{font-size:.95rem;font-weight:700;color:#fff;}
.modal-body{padding:24px;}
.modal-footer{background:var(--gray-50);border-top:1px solid var(--gray-100);padding:14px 20px;gap:8px;}

/* ── TOAST v4 ── */
.rms-toast{
  background:#1C2B3A;color:#fff;padding:12px 18px;border-radius:10px;
  font-size:.82rem;font-weight:500;box-shadow:var(--shadow-xl);
  display:flex;align-items:center;gap:10px;max-width:340px;
  border-left:3px solid var(--secondary);pointer-events:all;
}
.rms-toast.success{border-left-color:var(--success);}
.rms-toast.danger{border-left-color:var(--danger);}
.rms-toast.warning{border-left-color:var(--warning);}
.rms-toast.info{border-left-color:var(--info);}

.nav-tabs{border-bottom:2px solid var(--gray-200);}
.nav-tabs .nav-link{
  font-size:.8rem;font-weight:600;color:var(--gray-500);
  border:none;border-bottom:2px solid transparent;
  margin-bottom:-2px;padding:9px 16px;transition:all .15s;
}
.nav-tabs .nav-link:hover{color:var(--primary);}
.nav-tabs .nav-link.active{color:var(--primary);border-bottom-color:var(--primary);}

.job-no-link{font-weight:700;color:var(--primary);text-decoration:none;font-family:var(--font-mono,'JetBrains Mono',monospace);font-size:.79rem;}
.job-no-link:hover{color:var(--secondary);}
.rms-progress{height:6px;border-radius:3px;background:var(--gray-100);overflow:hidden;}
.rms-progress-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--primary),var(--secondary));transition:width .6s ease;}
.low-stock-badge{background:var(--danger-bg);color:var(--danger);font-size:.7rem;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-block;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;color:var(--gray-400);text-align:center;gap:10px;}
.empty-state i{font-size:2.5rem;opacity:.35;}
.empty-state p{font-size:.85rem;font-weight:500;margin:0;}
.skeleton{background:linear-gradient(90deg,var(--gray-100) 25%,var(--gray-200) 50%,var(--gray-100) 75%);background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite;border-radius:8px;}

.alert{font-size:.82rem;border-radius:10px;border:none;padding:12px 16px;}
.alert-info{background:var(--info-bg);color:#005A9E;}
.alert-success{background:var(--success-bg);color:#057005;}
.alert-warning{background:var(--warning-bg);color:#8A3A00;}
.alert-danger{background:var(--danger-bg);color:#750B1C;}

/* ── CONFIRM DIALOG ── */
#rmsConfirm .confirm-box{background:#fff;border-radius:16px;padding:28px;max-width:380px;width:100%;box-shadow:var(--shadow-xl);}
#rmsConfirm .confirm-icon{width:50px;height:50px;border-radius:50%;background:var(--warning-bg);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
#rmsConfirm .confirm-icon i{color:var(--warning);font-size:1.3rem;}
#rmsConfirm h6{text-align:center;font-size:.92rem;font-weight:700;margin-bottom:6px;color:var(--gray-900);}
#rmsConfirm p{text-align:center;font-size:.82rem;color:var(--gray-500);margin-bottom:20px;}

/* ── RESPONSIVE ── */
@media(max-width:992px){
  :root{--sidebar-width:var(--sidebar-collapsed);}
  .rms-sidebar{width:var(--sidebar-collapsed);}
  .brand-text,.nav-item span,.nav-section-label,.sidebar-user .user-info,.nav-badge{display:none!important;}
  .nav-item{justify-content:center;padding:10px;}
  .nav-icon{width:auto;font-size:1rem;}
  .page-content{padding:14px;}
}
@media(max-width:576px){
  .stat-card{padding:14px 16px;}
  .stat-value{font-size:1.5rem;}
  .filter-card,.table-header{padding:12px 14px;}
  .page-content{padding:10px;}
  .topbar-actions .topbar-icon-btn:not(:last-child):not(:nth-last-child(2)){display:none;}
}
@media print{
  .rms-sidebar,.rms-topbar{display:none!important;}
  .main-content{margin:0!important;padding:0!important;}
  .table-card,.chart-card{box-shadow:none;border:1px solid #ddd;}

.stat-sub{font-size:.68rem;color:var(--gray-400);line-height:1.4;}

const Auth = {
  getUser() {
    try {
      const s = JSON.parse(sessionStorage.getItem(SESSION_KEY) || localStorage.getItem(SESSION_KEY) || 'null');
      if (!s || !s.username || !s.loginTime) return null;
      if (Date.now() - s.loginTime > 8 * 3600 * 1000) { Auth.logout(); return null; }
      return s;
    } catch(e) { return null; }
  },
  logout() {
    sessionStorage.removeItem(SESSION_KEY);
    localStorage.removeItem(SESSION_KEY);
    location.href = 'login.html';
  }
};

/* ── GAS CALL ── */
async function callGAS(action, params) {
  const p = new URLSearchParams({ action, ...Object.fromEntries(Object.entries(params || {}).map(([k,v]) => [k, typeof v === 'object' ? JSON.stringify(v) : v])) });
  const res = await fetch(RMS.GAS_URL + '?' + p, { redirect: 'follow', cache: 'no-store' });
  const text = await res.text();
  return JSON.parse(text);
}

/* ── LOCAL STORAGE HELPERS ── */
function loadJobsLocal() {
  try { return JSON.parse(localStorage.getItem('rms_jobs') || '[]'); } catch(e) { return []; }
}
function normalizeJob(j) {
  if (!j) return null;
  if (j.Status) j.Status = String(j.Status).replace(/ /g,'_').toUpperCase();
  if (!j.Priority) j.Priority = 'HIGH';
  if (!j.Close_Date && j.Actual_Close) j.Close_Date = j.Actual_Close;
  return j;
}

/* ── DATASTORE ── */
const DataStore = {
  async getJobs() {
    let jobs = loadJobsLocal();
    if (!jobs.length) jobs = [...SAMPLE_JOBS];
    if (RMS.USE_GAS) {
      try {
        const res = await callGAS('getJobs', { filter: {} });
        if (res && res.success && res.data && res.data.length) {
          const gasJobs = res.data.map(normalizeJob).filter(j => j && j.JOB_No);
          const gasNos = new Set(gasJobs.map(j => j.JOB_No));
          const sampleOnly = SAMPLE_JOBS.filter(s => !gasNos.has(s.JOB_No));
          jobs = [...gasJobs, ...sampleOnly];
        }
      } catch(e) {}
    }
    return jobs.filter(j => j && j.JOB_No);
  },
  getParts() { return [...SAMPLE_PARTS]; },
  getVendors() { return [...SAMPLE_VENDORS]; }
};

/* ══════════════════════════════════════════════════════════
   DASHBOARD ENGINE
══════════════════════════════════════════════════════════ */
let _jobs = [], _parts = [], _vendors = [], _kpi = {}, _charts = {}, _activeModule = 'executive';

function calcKPIs(jobs, parts) {
  const now = new Date();
  const closed = jobs.filter(j => j.Status === 'CLOSED');
  const sendRepair = jobs.filter(j => j.Status === 'SEND_REPAIR');
  const returned = jobs.filter(j => j.Status === 'RETURNED');
  const open = jobs.filter(j => !['CLOSED','RETURNED'].includes(j.Status));

  // MTTR
  const closedWithDates = closed.filter(j => j.Create_Date && j.Close_Date);
  const mttr = closedWithDates.length
    ? (closedWithDates.reduce((s,j) => s + (new Date(j.Close_Date) - new Date(j.Create_Date))/86400000, 0) / closedWithDates.length)
    : 0;

  // Repeat equipment
  const eqCnt = {};
  jobs.forEach(j => { if(j.Equipment_ID) eqCnt[j.Equipment_ID] = (eqCnt[j.Equipment_ID]||0)+1; });
  const repeatEqIds = Object.keys(eqCnt).filter(id => eqCnt[id] > 1);
  const repeatJobs = jobs.filter(j => repeatEqIds.includes(j.Equipment_ID));

  // Monthly trend (last 6 months)
  const monthCnt = {};
  jobs.forEach(j => {
    if (!j.Create_Date) return;
    const d = new Date(j.Create_Date);
    const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    monthCnt[key] = (monthCnt[key]||0) + 1;
  });
  const months = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    const thLabel = d.toLocaleDateString('th-TH', { month:'short', year:'2-digit' });
    months.push({ key, label: thLabel, count: monthCnt[key]||0 });
  }

  // Damage code frequency (Pareto)
  const damageCnt = {};
  jobs.forEach(j => {
    const d = (j.Damage_Code||'').trim() || 'ไม่ระบุ';
    damageCnt[d] = (damageCnt[d]||0) + 1;
  });
  const paretoRaw = Object.entries(damageCnt).sort((a,b) => b[1]-a[1]).slice(0,8);
  const paretoTotal = paretoRaw.reduce((s,[,c]) => s+c, 0);
  let cum = 0;
  const pareto = paretoRaw.map(([name,cnt]) => {
    cum += cnt;
    return { name, cnt, pct: Math.round(cum/paretoTotal*100) };
  });

  // Vendor performance
  const vendorPerf = SAMPLE_VENDORS.map(v => {
    const vJobs = jobs.filter(j => j.Vendor_ID === v.Vendor_ID);
    const vClosed = vJobs.filter(j => j.Status === 'CLOSED');
    const vOpen = vJobs.filter(j => j.Status === 'SEND_REPAIR');
    return { ...v, total: vJobs.length, closed: vClosed.length, open: vOpen.length, rate: vJobs.length ? Math.round(vClosed.length/vJobs.length*100) : 0 };
  });

  // Top repeat equipment
  const repeatTable = repeatEqIds.map(id => ({
    id, count: eqCnt[id],
    damages: [...new Set(jobs.filter(j=>j.Equipment_ID===id).map(j=>(j.Damage_Code||'').trim()).filter(Boolean))].slice(0,2).join(', ')
  })).sort((a,b) => b.count-a.count).slice(0,10);

  // Inventory KPIs
  const invValue = parts.reduce((s,p) => s + (p.Current_Stock||0)*(p.Cost||0), 0);
  const lowStock = parts.filter(p => (p.Current_Stock||0) <= (p.Min_Stock||0));
  const critStock = parts.filter(p => (p.Current_Stock||0) === 0);

  // Repair actions (for refurbishment view)
  const actionCnt = {};
  jobs.forEach(j => {
    const a = (j.Repair_Action||'').trim() || 'ไม่ระบุ';
    actionCnt[a] = (actionCnt[a]||0)+1;
  });
  const actionList = Object.entries(actionCnt).sort((a,b)=>b[1]-a[1]).slice(0,6);

  // By status counts
  const statusCnt = {};
  jobs.forEach(j => { const s = j.Status||'OPEN'; statusCnt[s] = (statusCnt[s]||0)+1; });

  // WO age distribution
  const ageGroups = { '0-7 วัน':0, '8-14 วัน':0, '15-30 วัน':0, '31+ วัน':0 };
  open.forEach(j => {
    if (!j.Create_Date) return;
    const age = (now - new Date(j.Create_Date)) / 86400000;
    if (age <= 7) ageGroups['0-7 วัน']++;
    else if (age <= 14) ageGroups['8-14 วัน']++;
    else if (age <= 30) ageGroups['15-30 วัน']++;
    else ageGroups['31+ วัน']++;
  });

  return {
    total: jobs.length,
    closed: closed.length,
    sendRepair: sendRepair.length,
    returned: returned.length,
    open: open.length,
    uniqueEq: Object.keys(eqCnt).length,
    repeatEq: repeatEqIds.length,
    repeatJobs: repeatJobs.length,
    mttr: mttr.toFixed(1),
    closeRate: UI.pct(closed.length, jobs.length),
    months, pareto, vendorPerf, repeatTable, actionList, statusCnt, ageGroups,
    invValue, lowStock, critStock,
  };
}

  <div style="display:flex;align-items:flex-end;justify-content:center;gap:20px;padding:20px 0;flex-wrap:wrap">
    ${funnel.map((f,i) => {
      const h = Math.max(40, Math.round(f.count/total*160));
      return `<div style="display:flex;flex-direction:column;align-items:center;gap:8px">
        <div style="font-size:1.4rem;font-weight:800;color:${f.color}">${f.count}</div>
        <div style="width:${Math.max(60,100-i*10)}px;height:${h}px;background:${f.color};border-radius:8px 8px 0 0;opacity:${1-i*0.1};display:flex;align-items:center;justify-content:center;transition:height .6s">
          <i class="fas ${f.icon}" style="color:rgba(255,255,255,.8);font-size:1.2rem"></i>
        </div>
        <div style="font-size:.68rem;font-weight:700;color:var(--gray-500);text-transform:uppercase;text-align:center;max-width:80px">${f.label}</div>
        <div style="font-size:.65rem;color:var(--gray-400)">${total?Math.round(f.count/total*100):0}%</div>
      </div>`;
    }).join('<div style="color:var(--gray-300);font-size:1.2rem;padding-bottom:48px">▶</div>')}
  </div>
</div>

<div class="row g-3 mb-3">
  <div class="col-lg-6">
    <div class="chart-card">
      <div class="chart-head"><div><div class="chart-title"><i class="fas fa-wrench me-2" style="color:var(--secondary);font-size:.75rem"></i>Top Repair Actions</div><div class="chart-sub">วิธีการซ่อมที่ใช้บ่อย</div></div></div>
      ${kpi.actionList.map(([action,cnt]) => `
        <div class="metric-row">
          <span class="metric-name">${action}</span>
          <div class="prog-bar" style="width:120px;flex-shrink:0"><div class="prog-fill" style="width:${UI.pct(cnt,kpi.total)}%;background:var(--secondary)"></div></div>
          <span class="metric-val">${cnt}</span>
        </div>`).join('')}
    </div>
  </div>
  <div class="col-lg-6">
    <div class="chart-card">
      <div class="chart-head"><div><div class="chart-title"><i class="fas fa-triangle-exclamation me-2" style="color:var(--warning);font-size:.75rem"></i>Top Damage Codes</div><div class="chart-sub">สาเหตุความเสียหายที่พบบ่อย</div></div></div>
      ${kpi.pareto.slice(0,6).map(p => `
        <div class="metric-row">
          <span class="metric-name">${p.name}</span>
          <div class="prog-bar" style="width:100px;flex-shrink:0"><div class="prog-fill" style="width:${UI.pct(p.cnt,kpi.total)}%;background:var(--warning)"></div></div>
          <span class="metric-val">${p.cnt}</span>
        </div>`).join('')}
    </div>
  </div>
</div>

<div class="sec-head"><span class="sec-head-label"><i class="fas fa-list me-2"></i>Active Repair Jobs (WIP)</span><div class="sec-head-line"></div></div>
<div class="tbl-card">
  <div class="tbl-head"><span class="tbl-title">งานที่อยู่ระหว่างซ่อม <span class="tbl-cnt">${wipCount} รายการ</span></span></div>
  <div style="overflow-x:auto">
  <table class="etbl">
    <thead><tr><th>Job No.</th><th>Equipment ID</th><th>Damage Code</th><th>Vendor</th><th>Created</th><th>Days Open</th></tr></thead>
    <tbody>
    ${_jobs.filter(j=>j.Status==='SEND_REPAIR').map(j => {
      const days = j.Create_Date ? Math.floor((new Date()-new Date(j.Create_Date))/86400000) : 0;
      const dayColor = days>30?'#DC2626':days>14?'#D97706':'#64748B';
      return `<tr>
        <td><span style="font-family:monospace;font-size:.78rem;font-weight:700;color:var(--primary)">${j.JOB_No||'—'}</span></td>
        <td><span style="font-family:monospace;font-size:.78rem;background:var(--gray-100);padding:2px 7px;border-radius:4px">${j.Equipment_ID||'—'}</span></td>
        <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${j.Damage_Code||'—'}</td>
        <td>${(SAMPLE_VENDORS.find(v=>v.Vendor_ID===j.Vendor_ID)||{}).Vendor_Name?.replace('บริษัท ','').replace(' จำกัด','') || '—'}</td>
        <td>${UI.fmtDate(j.Create_Date)}</td>
        <td><span style="font-weight:700;color:${dayColor}">${days} วัน</span></td>
      </tr>`;
    }).join('')}
    </tbody>
  </table>
  </div>
</div>`;
}

function kpiCard(icon, iconClass, cardClass, value, label, sub) {
  return `<div class="kpi-card ${cardClass}">
    <div class="kpi-icon ${iconClass}"><i class="fas ${icon}"></i></div>
    <div class="kpi-value">${value}</div>
    <div class="kpi-label">${label}</div>
    <div class="kpi-sub">${sub}</div>
  </div>`;
}

/* ── MODULE SWITCH ── */
const MODULES = [
  { id:'executive',  label:'Executive Overview', icon:'fa-gauge-high' },
  { id:'workorders', label:'Work Orders',         icon:'fa-wrench'     },
  { id:'reliability',label:'Reliability',         icon:'fa-chart-line' },
  { id:'inventory',  label:'Inventory',           icon:'fa-boxes-stacking' },
  { id:'vendors',    label:'Vendors',             icon:'fa-building'   },
  { id:'refurb',     label:'Refurbishment',       icon:'fa-recycle'    },
];

function switchModule(id) {
  _activeModule = id;
  document.querySelectorAll('.mod-tab').forEach(t => t.classList.toggle('active', t.dataset.mod === id));
  renderCurrentModule();
}

function renderCurrentModule() {
  const el = document.getElementById('mod-content');
  if (!el) return;
  const kpi = _kpi;
  let html = '';
  if (_activeModule === 'executive')  html = renderExecutive(kpi);
  else if (_activeModule === 'workorders') html = renderWorkOrders(kpi);
  else if (_activeModule === 'reliability') html = renderReliability(kpi);
  else if (_activeModule === 'inventory') html = renderInventory(kpi);
  else if (_activeModule === 'vendors') html = renderVendors(kpi);
  else if (_activeModule === 'refurb') html = renderRefurbishment(kpi);
  el.innerHTML = html;
  // Build charts after DOM update
  requestAnimationFrame(() => {
    if (_activeModule === 'executive')  buildExecCharts(kpi);
    else if (_activeModule === 'workorders') buildWOCharts(kpi);
    else if (_activeModule === 'reliability') buildReliabilityCharts(kpi);
    else if (_activeModule === 'inventory') buildInventoryCharts(kpi);
    else if (_activeModule === 'vendors') buildVendorCharts(kpi);
  });
}

/* ── SIDEBAR ── */
function buildSidebar(user) {
  const nav = NAV_CONFIG.map(item => {
    if (item.sep) return `<div class="nav-section-label">${item.label}</div>`;
    const active = item.active ? ' active' : '';
    const badge = item.badge ? `<span class="nav-badge">${item.badge}</span>` : '';
    return `<a class="nav-item${active}" href="${item.href}"><i class="nav-icon fas ${item.icon}"></i><span>${item.label}</span>${badge}</a>`;
  }).join('');
  const initials = (user.username||'U').substring(0,2).toUpperCase();
  return `
<div class="sidebar-brand">
  <div class="brand-icon"><i class="fas fa-bolt"></i></div>
  <div class="brand-text"><div class="brand-name">EWS Enterprise</div><div class="brand-ver">v${RMS.VERSION}</div></div>
</div>
<div class="sidebar-user">
  <div class="user-avatar">${initials}</div>
  <div class="user-info"><div class="user-name">${user.username||'User'}</div><div class="user-role">${user.role||'user'}</div></div>
</div>
<div class="sidebar-nav">${nav}</div>
<div class="sidebar-footer">
  <div class="sidebar-user">
    <div class="user-avatar" style="background:rgba(255,255,255,.08)"><i class="fas fa-right-from-bracket" style="font-size:.65rem;color:rgba(255,255,255,.5)"></i></div>
    <div class="user-info"><a onclick="Auth.logout()" style="color:rgba(255,255,255,.5);font-size:.75rem;font-weight:600;cursor:pointer;text-decoration:none">Logout</a></div>
  </div>
</div>`;
}

function buildTopbar(kpi) {
  const now = new Date();
  const dateStr = now.toLocaleDateString('th-TH', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  return `
<div style="flex:1;min-width:0">
  <div class="page-title"><i class="fas fa-gauge-high me-2" style="color:var(--primary)"></i>Enterprise Dashboard</div>
  <div class="page-subtitle">${dateStr}</div>
</div>
<div class="topbar-actions">
  <div class="db-live"><div class="live-dot"></div>Live Data</div>
  <button class="btn-refresh" onclick="refreshData()" id="btnRefresh"><i class="fas fa-sync-alt"></i>Refresh</button>
  <a href="reports.html" class="topbar-icon-btn" title="Reports"><i class="fas fa-chart-bar"></i></a>
  <a href="settings.html" class="topbar-icon-btn" title="Settings"><i class="fas fa-gear"></i></a>
</div>`;
}

function buildModTabs() {
  return MODULES.map(m => `<button class="mod-tab${m.id===_activeModule?' active':''}" data-mod="${m.id}" onclick="switchModule('${m.id}')"><i class="fas ${m.icon}"></i><span>${m.label}</span></button>`).join('');
}

/* ── MAIN RENDER ── */
function renderApp(user) {
  const app = document.getElementById('app');
  app.innerHTML = `
<div class="rms-sidebar" id="sidebar">${buildSidebar(user)}</div>
<div class="rms-topbar" id="topbar">${buildTopbar(_kpi)}</div>
<div class="main-content">
  <div class="db-page">
    <div class="mod-tabs">${buildModTabs()}</div>
    <div id="mod-content"></div>
  </div>
</div>`;
  renderCurrentModule();
}

/* ── DATA REFRESH ── */
async function refreshData() {
  const btn = document.getElementById('btnRefresh');
  if (btn) btn.classList.add('loading');
  try {
    _jobs = await DataStore.getJobs();
    _parts = DataStore.getParts();
    _kpi = calcKPIs(_jobs, _parts);
    renderCurrentModule();
    UI.toast('อัปเดตข้อมูลสำเร็จ', 'success');
  } catch(e) {
    UI.toast('ไม่สามารถโหลดข้อมูลได้', 'danger');
  }
  if (btn) btn.classList.remove('loading');
}

/* ── INIT ── */
(async function init() {
  const user = Auth.getUser();
  if (!user) { location.href = 'login.html'; return; }

  try {
    _jobs = await DataStore.getJobs();
    _parts = DataStore.getParts();
    _kpi = calcKPIs(_jobs, _parts);
  } catch(e) {
    _jobs = [...SAMPLE_JOBS];
    _parts = [...SAMPLE_PARTS];
    _kpi = calcKPIs(_jobs, _parts);
  }

  renderApp(user);
  document.getElementById('rms-loader').style.display = 'none';

  // Auto-refresh every 5 minutes
  setInterval(() => { refreshData(); }, 300000);
})();
</script>
</body>
</html>
