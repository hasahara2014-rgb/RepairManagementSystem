}
.parts-tab {
  flex: 1;
  padding: 8px 12px;
  border: none;
  border-radius: 7px;
  background: transparent;
  color: var(--gray-500);
  font-size: .775rem;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all .18s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  white-space: nowrap;
}
.parts-tab:hover { background: #fff; color: var(--gray-700); box-shadow: 0 1px 4px rgba(0,0,0,.06); }
.parts-tab.active {
  background: #fff;
  color: var(--primary);
  box-shadow: 0 2px 8px rgba(0,0,0,.09);
  font-weight: 700;
}
.parts-tab .tab-badge {
  background: var(--danger);
  color: #fff;
  font-size: .58rem;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 20px;
  min-width: 16px;
  text-align: center;
}

/* Stock level indicator */
.stock-bar { height: 5px; border-radius: 3px; background: var(--gray-100); overflow: hidden; margin-top: 4px; }
.stock-bar-fill { height: 100%; border-radius: 3px; transition: width .4s ease; }

/* Part category badge */
.cat-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: .62rem;
  font-weight: 700;
  letter-spacing: .3px;
}
.cat-Mechanical  { background: rgba(15,76,129,.1);  color: var(--primary);   }
.cat-Electronic  { background: rgba(124,58,237,.1); color: var(--purple);    }
.cat-Consumable  { background: rgba(217,119,6,.1);  color: var(--warning);   }
.cat-Other       { background: rgba(100,116,139,.1);color: var(--gray-500);  }

/* Transaction form */
.tx-form-card {
  background: #fff;
  border-radius: var(--radius-lg);
  border: 1px solid var(--gray-100);
  box-shadow: var(--shadow-md);
  overflow: hidden;
}
.tx-form-header {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  padding: 16px 24px;
  color: #fff;
}
.tx-form-header.receive {
  background: linear-gradient(135deg, var(--success), #22c55e);
}
.tx-form-body { padding: 24px; }

/* History item */
.history-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--gray-100);
  transition: background .12s;
}
.history-item:hover { background: var(--gray-50); }
.history-item:last-child { border-bottom: none; }
.history-type-icon {
  width: 34px; height: 34px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: .82rem;
}
.history-type-icon.issue   { background: rgba(27,154,170,.12);  color: var(--secondary); }
.history-type-icon.receive { background: rgba(22,163,74,.12);   color: var(--success);   }

/* Low stock progress */
.low-stock-row { background: rgba(220,38,38,.03) !important; }

/* Quick action buttons in table */
.quick-btn {
  width: 28px; height: 28px;
  border-radius: 6px;
  border: 1px solid;
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: .72rem;
  transition: all .15s;
}
.quick-btn.issue   { border-color: rgba(27,154,170,.3);  background: rgba(27,154,170,.07);  color: var(--secondary); }
.quick-btn.receive { border-color: rgba(22,163,74,.3);   background: rgba(22,163,74,.07);   color: var(--success);   }
.quick-btn.edit    { border-color: rgba(217,119,6,.3);   background: rgba(217,119,6,.07);   color: var(--warning);   }
.quick-btn.del     { border-color: rgba(220,38,38,.3);   background: rgba(220,38,38,.07);   color: var(--danger);    }
.quick-btn:hover   { filter: brightness(.9); transform: scale(1.08); }

/* Dashboard chart card */
.dash-chart-card {
  background: #fff;
  border-radius: var(--radius-lg);
  border: 1px solid var(--gray-100);
  box-shadow: var(--shadow-md);
  padding: 20px;
  height: 100%;
}

/* Empty state mini */
.empty-mini {
  text-align: center;
  padding: 40px 20px;
  color: var(--gray-400);
}
.empty-mini i { font-size: 2rem; opacity: .35; display: block; margin-bottom: 10px; }
.empty-mini p { font-size: .83rem; font-weight: 500; margin: 0; }

/* ─────────────────────────────────────────────────────────────
   4.  LOCAL STATE  (in-memory + localStorage)
   ───────────────────────────────────────────────────────────── */
function _normalizeJob(j) {
  if (!j) return null;

  // ── Normalize Status ──
  if (j.Status) j.Status = String(j.Status).replace(/ /g,'_').toUpperCase();
  if (!j.Priority) j.Priority = 'HIGH';

  // ── Map Sheet v3.3 field names → frontend field names ──
  // Sheet ใช้ Actual_Close แทน Close_Date
  if (!j.Close_Date && j.Actual_Close)   j.Close_Date   = j.Actual_Close;
  // Sheet ใช้ Create_Date ใน col T
  if (!j.Create_Date && j['Create_Date']) j.Create_Date = j['Create_Date'];
  // Legacy field name aliases
  if (!j.JOB_No && j['Job No'])                 j.JOB_No       = j['Job No'];
  if (!j.Equipment_ID && j['Equipment ID'])      j.Equipment_ID = j['Equipment ID'];
  if (!j.Damage_Code && j['Damage Code'])        j.Damage_Code  = j['Damage Code'];
  if (!j.Work_Order && j['Work Order'])          j.Work_Order   = j['Work Order'];
  if (!j.Vendor_ID && j['Vendor ID'])            j.Vendor_ID    = j['Vendor ID'];

  // ── Merge กับ SAMPLE_JOBS_RAW เพื่อเติม field ที่ขาด ──
  if (j.JOB_No && typeof SAMPLE_JOBS_RAW !== 'undefined') {
    var sample = SAMPLE_JOBS_RAW.find(function(s){ return s.JOB_No === j.JOB_No; });
    if (sample) {
      if (!j.Work_Order)          j.Work_Order          = sample.Work_Order          || '';
      if (!j.Refurbishment_Order) j.Refurbishment_Order = sample.Refurbishment_Order || '';
      if (!j.Receive_No)          j.Receive_No          = sample.Receive_No          || '';
      if (!j.Equipment_ID)        j.Equipment_ID        = sample.Equipment_ID        || '';
      if (!j.Damage_Code)         j.Damage_Code         = sample.Damage_Code         || '';
      if (!j.Vendor_ID)           j.Vendor_ID           = sample.Vendor_ID           || 'V001';
      if (!j.Create_Date)         j.Create_Date         = sample.Create_Date         || '';
      if (!j.Close_Date)          j.Close_Date          = sample.Close_Date          || '';
      if (!j.Material_ID)         j.Material_ID         = sample.Material_ID         || '10010041';
      if (!j.Priority)            j.Priority            = sample.Priority            || 'HIGH';
      if (!j.Repair_Action)       j.Repair_Action       = sample.Repair_Action       || '';
    }
  }
  return j;
}

// ── Clear corrupted localStorage cache ──────────────────────────
function clearJobCache() {
  try { localStorage.removeItem('rms_v3_jobs'); } catch(e) {}
  _localJobs = SAMPLE_JOBS_RAW.map(function(j){ return Object.assign({}, j); });
  UI.toast('ล้าง cache งานซ่อมแล้ว กำลังโหลดใหม่...', 'success');
  setTimeout(function(){ window.location.reload(); }, 1200);
}

function _loadJobs() {
  try {
    const raw = localStorage.getItem('rms_v3_jobs');
    if (raw) {
      const parsed = JSON.parse(raw);
      return parsed
        .map(_normalizeJob)
        .filter(function(j) { return j && j.JOB_No && j.JOB_No.trim() !== ''; });
    }
  } catch(e) { console.warn('_loadJobs error:', e); }
  return SAMPLE_JOBS_RAW.map(function(j){ return Object.assign({}, j); });
}

function _saveJobs() {
  try { localStorage.setItem('rms_v3_jobs', JSON.stringify(_localJobs)); } catch(e) {}
}

function _loadParts() {
  try {
    const raw = localStorage.getItem('rms_v3_parts');
    if (raw) {
      const saved = JSON.parse(raw);
      return SAMPLE_PARTS.map(sp => {
        const lp = saved.find(s => s.Part_Code === sp.Part_Code || s.Part_ID === sp.Part_ID);
        return lp ? Object.assign({}, sp, { Current_Stock: parseFloat(lp.Current_Stock ?? sp.Current_Stock), Cost: parseFloat(lp.Cost ?? sp.Cost) }) : Object.assign({}, sp);
      });
    }
  } catch(e) {}
  return SAMPLE_PARTS.map(p => Object.assign({}, p));
}

function _saveParts() {
  try { localStorage.setItem('rms_v3_parts', JSON.stringify(_localParts)); } catch(e) {}
}

var _localJobs  = _loadJobs();
var _localParts = _loadParts();

/* ─────────────────────────────────────────────────────────────
   5.  AUTH
   ───────────────────────────────────────────────────────────── */
const Auth = {
  getUser() {
    try {
      const s = sessionStorage.getItem(SESSION_KEY) || localStorage.getItem(SESSION_KEY);
      return s ? JSON.parse(s) : null;
    } catch(e) { return null; }
  },
  isLoggedIn() {
    const u = this.getUser();
    return u && (Date.now() - (u.loginTime || 0) < 8 * 3600 * 1000);
  },
  isAdmin() {
    const u = this.getUser();
    return u && ['SUPER_ADMIN', 'ADMIN'].includes(u.role);
  },
  isManager() {
    const u = this.getUser();
    return u && ['SUPER_ADMIN', 'ADMIN', 'MANAGER'].includes(u.role);
  },
  hasPermission(perm) {
    const u = this.getUser();
    return u && Array.isArray(u.permissions) && u.permissions.includes(perm);
  },
  guardPage() {
    // ถ้าหน้าไม่ใช่ login แล้วยังไม่ login → redirect
    if (!this.isLoggedIn() && !location.pathname.includes('login')) {
      window.location.href = 'login.html';
      return false;
    }
    return true;
  },
};

/* ─────────────────────────────────────────────────────────────
   6.  GAS HELPER
   ───────────────────────────────────────────────────────────── */
async function callGAS(action, payload) {
  try {
    const user  = Auth.getUser();
    const token = user ? (user.token || '') : '';
    const params = new URLSearchParams({
      action,
      token,
      payload: encodeURIComponent(JSON.stringify(payload || {})),
    });
    const res  = await fetch(RMS.GAS_URL + '?' + params, { redirect: 'follow' });
    return await res.json();
  } catch(e) {
    console.warn('callGAS error:', action, e.message);
    return { success: false, error: e.message };
  }
}

/* ─────────────────────────────────────────────────────────────
   7.  DATASTORE  (local-first, GAS fallback)
   ───────────────────────────────────────────────────────────── */
const DataStore = {

  /* ── JOB NO GENERATOR ── */
  async generateJobNo() {
    const y = new Date().getFullYear();
    const prefix = 'JOB-' + y + '-';
    const existing = _localJobs.filter(j => j.JOB_No && j.JOB_No.startsWith(prefix));
    const nums = existing.map(j => parseInt(j.JOB_No.replace(prefix, ''), 10)).filter(n => !isNaN(n));
    const next = nums.length ? Math.max(...nums) + 1 : 1;
    return prefix + String(next).padStart(3, '0');
  },

  async generateReceiveNo() {
    const d = new Date();
    const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
    return 'RCV-' + y + m + day + '-' + String(Math.floor(Math.random()*900)+100);
  },

  /* ── GET JOBS ── */
  async getJobs(filter) {
    filter = filter || {};
    // refresh from localStorage
    _localJobs = _loadJobs();

    if (RMS.USE_GAS) {
      try {
        const res = await callGAS('getJobs', { filter });
        if (res && res.success && res.data) {
          // Merge GAS data with SAMPLE_JOBS_RAW to fill missing fields
          var gasJobs = res.data.map(function(gasJob) {
            var normalized = _normalizeJob(gasJob);
            if (!normalized || !normalized.JOB_No) return null;
            // Find matching sample job to fill in missing fields
            var sample = SAMPLE_JOBS_RAW.find(function(s){ return s.JOB_No === normalized.JOB_No; });
            if (sample) {
              return Object.assign({}, sample, normalized);
            }
            return normalized;
          }).filter(function(j) { return j && j.JOB_No && j.JOB_No.trim() !== ''; });
          
          // Merge: GAS jobs take priority, add SAMPLE_JOBS not in GAS
          var gasJobNos = new Set(gasJobs.map(function(j){ return j.JOB_No; }));
          var sampleOnly = SAMPLE_JOBS_RAW.filter(function(s){ return !gasJobNos.has(s.JOB_No); });
          _localJobs = [...gasJobs, ...sampleOnly];
          _saveJobs();
        }
      } catch(e) {}
    }

    // Filter out invalid/incomplete jobs
    let jobs = [..._localJobs].filter(function(j) {
      return j && j.JOB_No && j.JOB_No.trim() !== '';
    });
    if (filter.status && filter.status !== 'ALL') {
      if (filter.status === 'REPEAT') {
        const cnt = {};
        _localJobs.forEach(j => { if (j.Equipment_ID) cnt[j.Equipment_ID] = (cnt[j.Equipment_ID]||0) + 1; });
        jobs = jobs.filter(j => cnt[j.Equipment_ID] > 1);
      } else {
        jobs = jobs.filter(j => (j.Status||'') === filter.status);
      }
    }
    if (filter.priority) jobs = jobs.filter(j => j.Priority === filter.priority);
    if (filter.vendor)   jobs = jobs.filter(j => j.Vendor_ID === filter.vendor);
    if (filter.branch)   jobs = jobs.filter(j => j.Branch_ID === filter.branch);
    if (filter.search) {
      const q = filter.search.toLowerCase();
      jobs = jobs.filter(j =>
        (j.JOB_No||'').toLowerCase().includes(q) ||
        (j.Equipment_ID||'').toLowerCase().includes(q) ||
        (j.Work_Order||'').toLowerCase().includes(q) ||
        (j.Damage_Code||'').toLowerCase().includes(q)
      );
    }
    return jobs;
  },  // returns Array directly

  async getJobById(jobNo) {
    _localJobs = _loadJobs();
    return _localJobs.find(j => j.JOB_No === jobNo) || null;
  },

  /* ── CREATE JOB ── */
  async createJob(data) {
    const job = Object.assign({ Created_By: (Auth.getUser()||{}).username || 'admin' }, data);
    _localJobs.unshift(job);
    _saveJobs();

    if (RMS.USE_GAS) {
      try {
        const res = await callGAS('createJob', { data: job });
        if (res && res.success) return { success: true, data: job };
        return { success: true, data: job, gasWarn: res && res.error };
      } catch(e) { return { success: true, data: job, gasWarn: e.message }; }
    }
    return { success: true, data: job };
  },

  /* ── UPDATE JOB ── */
  async updateJob(jobNo, data) {
    const idx = _localJobs.findIndex(j => j.JOB_No === jobNo);
    if (idx < 0) return { success: false, error: 'ไม่พบ Job' };
    _localJobs[idx] = Object.assign({}, _localJobs[idx], data);
    _saveJobs();

    if (RMS.USE_GAS) {
      try { await callGAS('updateJob', { jobNo, data }); } catch(e) {}
    }
    return { success: true, data: _localJobs[idx] };
  },

  /* ── DELETE JOB ── */
  async deleteJob(jobNo) {
    const before = _localJobs.length;
    _localJobs = _localJobs.filter(j => j.JOB_No !== jobNo);
    if (_localJobs.length === before) return { success: false, error: 'ไม่พบ Job' };
    _saveJobs();

    if (RMS.USE_GAS) {
      try { await callGAS('deleteJob', { jobNo }); } catch(e) {}
    }
    return { success: true };
  },

  /* ── UPDATE STATUS ── */
  async updateStatus(jobNo, status, remark) {
    // ✅ ใช้ updateJobStatus (lightweight) แทน updateJob เต็ม
    // เพื่อป้องกัน undefined fields overwrite ใน Google Sheets
    if (RMS.USE_GAS) {
      const res = await callGAS('updateJobStatus', {
        jobNo:  jobNo,
        status: status,
        remark: remark || ''
      });
      if (res && res.success) {
        // อัปเดต local state ด้วย
        const idx = _localJobs.findIndex(j => j.JOB_No === jobNo);
        if (idx >= 0) {
          _localJobs[idx].Status     = status;
          _localJobs[idx].Updated_At = new Date().toISOString().slice(0,10);
          if (status === 'CLOSED') _localJobs[idx].Close_Date = new Date().toISOString().slice(0,10);
          _saveJobs();
        }
        return res;
      }
      // GAS failed → fallback to local only
    }
    // Local update only (offline/demo mode)
    const idx = _localJobs.findIndex(j => j.JOB_No === jobNo);
    if (idx >= 0) {
      _localJobs[idx].Status     = status;
      _localJobs[idx].Updated_At = new Date().toISOString().slice(0,10);
      if (status === 'CLOSED') _localJobs[idx].Close_Date = new Date().toISOString().slice(0,10);
      _saveJobs();
    }
    return { success: true };
  },

  /* ── GET DASHBOARD ── */
  async getDashboard() {
    _localJobs  = _loadJobs();
    _localParts = _loadParts();

    const jobs = [..._localJobs];
    const cnt  = {};
    jobs.forEach(j => { const s = (j.Status||'').replace(/ /g,'_'); cnt[s] = (cnt[s]||0) + 1; });

    // Trend
    const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    const tData  = Array(12).fill(0);
    const y = new Date().getFullYear();
    jobs.forEach(j => { if(j.Create_Date){ const d=new Date(j.Create_Date); if(d.getFullYear()===y) tData[d.getMonth()]++; } });

    // งานซ่อมจริง = ทั้งหมด - ซ่อมซ้ำ
    const eqCount = {};
    jobs.forEach(j => { if(j.Equipment_ID) eqCount[j.Equipment_ID] = (eqCount[j.Equipment_ID]||0)+1; });
    const repeatJobs = jobs.filter(j => eqCount[j.Equipment_ID] > 1);
    const realJobs   = jobs.length - repeatJobs.length; // งานซ่อมจริง (ไม่ซ้ำ)
    const uniqueRepeatEq = Object.values(eqCount).filter(c => c > 1).length;

    // MTTR (เก็บไว้สำหรับ reports.html)
    const closed = jobs.filter(j => j.Status==='CLOSED' && j.Create_Date && j.Close_Date);
    const mttr   = closed.length ? parseFloat((closed.reduce((s,j) => s+(new Date(j.Close_Date)-new Date(j.Create_Date))/86400000, 0)/closed.length).toFixed(1)) : 0;

    // Priority
    const byP = { CRITICAL:0, HIGH:0, MEDIUM:0, LOW:0 };
    jobs.forEach(j => { if(j.Priority && byP[j.Priority]!==undefined) byP[j.Priority]++; });

    // Low stock
    const lowStock = _localParts.filter(p => parseFloat(p.Current_Stock||0) <= parseFloat(p.Min_Stock||0));

    return {
      success: true,
      stats: {
        total:           jobs.length,
        CLOSED:          cnt.CLOSED          || 0,
        IN_PROGRESS:     cnt.SEND_REPAIR     || 0,
        RETURNED:        cnt.RETURNED        || 0,
        WAIT_APPROVAL:   cnt.WAIT_APPROVAL   || 0,
        WAIT_SPARE_PART: cnt.WAIT_SPARE_PART || 0,
        SEND_REPAIR:     cnt.SEND_REPAIR     || 0,
        OPEN:            cnt.OPEN            || 0,
        realJobs:        realJobs,             // งานซ่อมจริง (ไม่ซ้ำ)
        repeatJobs:      repeatJobs.length,    // ซ่อมซ้ำ
        uniqueRepeatEq:  uniqueRepeatEq,       // จำนวนอุปกรณ์ที่ซ่อมซ้ำ
      },
      mttr,
      realJobs,
      repeatCount:    repeatJobs.length,
      uniqueRepeatEq: uniqueRepeatEq,
      pendingApprovals: cnt.WAIT_APPROVAL || 0,
      monthlyTrend: { labels: months, data: tData },
      vendorKPIs: SAMPLE_VENDORS.map(v => ({
        name:   v.Vendor_Name,
        total:  jobs.filter(j => j.Vendor_ID === v.Vendor_ID).length,
        closed: jobs.filter(j => j.Vendor_ID === v.Vendor_ID && j.Status === 'CLOSED').length,
      })),
      byPriority:  byP,
      recentJobs:  jobs.slice().sort((a,b) => (b.Create_Date||'').localeCompare(a.Create_Date||'')).slice(0,10),
      lowStock,
    };
  },

  /* ── PARTS ── */
  async issuePart({ partId, partCode, qty, jobNo, remark }) {
    _localParts = _loadParts();
    const idx = _localParts.findIndex(p => p.Part_ID === partId || p.Part_Code === (partCode || partId));
    if (idx < 0) return { success: false, error: 'ไม่พบ Part' };
    const cur = parseFloat(_localParts[idx].Current_Stock || 0);
    if (cur < qty) return { success: false, error: 'สต๊อกไม่พอ (เหลือ ' + cur + ')' };
    _localParts[idx].Current_Stock = cur - qty;
    _saveParts();

    // log
    try {
      const log = JSON.parse(localStorage.getItem('rms_iss_log') || '[]');
      log.unshift({ date: new Date().toISOString().slice(0,10), partId, qty, jobNo: jobNo||'', remark: remark||'', by: (Auth.getUser()||{}).username||'admin' });
      localStorage.setItem('rms_iss_log', JSON.stringify(log.slice(0,200)));
    } catch(e) {}

    if (RMS.USE_GAS) { try { await callGAS('issuePart', { partId, qty, jobNo, remark }); } catch(e) {} }
    return { success: true, newStock: _localParts[idx].Current_Stock };
  },

  async receivePart({ partId, qty, unitCost }) {
    _localParts = _loadParts();
    const idx = _localParts.findIndex(p => p.Part_ID === partId || p.Part_Code === partId);
    if (idx < 0) return { success: false, error: 'ไม่พบ Part' };
    _localParts[idx].Current_Stock = parseFloat(_localParts[idx].Current_Stock||0) + qty;
    if (unitCost) _localParts[idx].Cost = parseFloat(unitCost);
    _saveParts();

    try {
      const log = JSON.parse(localStorage.getItem('rms_rcv_log') || '[]');
      log.unshift({ date: new Date().toISOString().slice(0,10), partId, qty, unitCost: unitCost||0, by: (Auth.getUser()||{}).username||'admin' });
      localStorage.setItem('rms_rcv_log', JSON.stringify(log.slice(0,200)));
    } catch(e) {}

    if (RMS.USE_GAS) { try { await callGAS('receivePart', { partId, qty, unitCost }); } catch(e) {} }
    return { success: true, newStock: _localParts[idx].Current_Stock };
  },
};

(function autoGuard() {
  const page = location.pathname.split('/').pop() || '';
  const open = ['login.html', 'index.html', ''];
  if (open.includes(page)) return;

  function check() {
    if (!Auth.isLoggedIn()) {
      window.location.href = 'login.html';
      return;
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', check);
  } else {
    check();
  }
})();

/* ── BADGE COUNTERS ─────────────────────────────────────────── */
function _getBadgeCounts() {
  try {
    const waitApprove = (typeof _localJobs !== 'undefined' ? _localJobs : [])
      .filter(j => ['WAIT_APPROVAL','WAIT_APPROVE'].includes((j.Status||'').replace(/ /g,'_')))
      .length;
    const inProgress = (typeof _localJobs !== 'undefined' ? _localJobs : [])
      .filter(j => (j.Status||'') === 'SEND_REPAIR')
      .length;
    return { approve: waitApprove || 0, jobs: inProgress || 0 };
  } catch(e) { return {}; }
}

/* ── BUILD SIDEBAR HTML ─────────────────────────────────────── */
function _buildSidebar() {
  const cur  = location.pathname.split('/').pop() || 'dashboard.html';
  const user = (typeof Auth !== 'undefined') ? Auth.getUser() : null;
  const badges = _getBadgeCounts();
  const isAdmin   = user && ['SUPER_ADMIN','ADMIN'].includes(user.role);
  const isManager = user && ['SUPER_ADMIN','ADMIN','MANAGER'].includes(user.role);
  const initials  = user ? (user.name||user.username||'U').slice(0,2).toUpperCase() : 'U';
  const roleName  = user ? (user.role||'USER') : 'USER';
  const displayName = user ? (user.name||user.username||'User') : 'User';

  let navHTML = '';
  NAV_CONFIG.forEach(item => {
    if (item.section !== undefined) {
      if (item.adminOnly && !isAdmin) return;
      navHTML += `<div class="nav-section-label">${item.section}</div>`;
      return;
    }
    if (item.adminOnly   && !isAdmin)   return;
    if (item.managerOnly && !isManager) return;

    const active  = cur === item.href ? 'active' : '';
    const badgeCnt = item.badgeKey && badges[item.badgeKey] ? badges[item.badgeKey] : 0;
    const badgeHTML = badgeCnt ? `<span class="nav-badge">${badgeCnt}</span>` : '';

    navHTML += `
      <a href="${item.href}" class="nav-item ${active}">
        <span class="nav-icon"><i class="fas ${item.icon}"></i></span>
        <span>${item.label}</span>
        ${badgeHTML}
      </a>`;
  });

  return `
  <aside class="rms-sidebar" id="rmsSidebar">
    <!-- Brand -->
    <div class="sidebar-brand">
      <div class="brand-icon"><i class="fas fa-tools"></i></div>
      <div class="brand-text">
        <div class="brand-name">RMS Enterprise</div>
        <div class="brand-ver">v3.0 · CMMS</div>
      </div>
    </div>

    <!-- Nav -->
    <nav class="sidebar-nav">${navHTML}</nav>

    <!-- Footer -->
    <div class="sidebar-footer">
      <div class="sidebar-user" style="padding:10px 12px 0;border-bottom:none;border-top:none;margin-bottom:8px">
        <div class="user-avatar">${initials}</div>

          <div class="user-name">${displayName}</div>

        <i class="fas fa-sign-out-alt" style="font-size:.7rem"></i>ออกจากระบบ
      </button>

}

/* ── MAIN RENDER FUNCTION ───────────────────────────────────── */
function renderPageShell(title, content, actions) {
  var _lo=document.getElementById('rms-loader');if(_lo)_lo.remove();
  const wrapper = document.getElementById('app');
  if (!wrapper) return;

  // สร้าง sidebar และ main-content ใหม่ทั้งหมด
  wrapper.innerHTML =
    _buildSidebar() +
    '<div class="main-content" id="mainContent"></div>';

  const main = document.getElementById('mainContent');
  if (!main) return;

  main.innerHTML = _buildTopbar(title, actions || '') +
    '<div class="page-content">' + (content || '') + '</div>';

  // Toast container
  if (!document.getElementById('rmsToastContainer')) {
    const tc = document.createElement('div');
    tc.id = 'rmsToastContainer';
    tc.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;';
    document.body.appendChild(tc);
  }
}

/* ── SIDEBAR TOGGLE ─────────────────────────────────────────── */
function toggleSidebar() {
  const sidebar = document.getElementById('rmsSidebar');
  const main    = document.getElementById('mainContent');
  const topbar  = document.getElementById('rmsTopbar');
  if (!sidebar) return;

  const collapsed = sidebar.classList.toggle('collapsed');
  const w = collapsed ? 'var(--sidebar-collapsed)' : 'var(--sidebar-width)';
  sidebar.style.width = w;
  if (main)   main.style.marginLeft = w;
  if (topbar) topbar.style.left = w;
}

  try { sessionStorage.removeItem('rms_v3_session'); } catch(e) {}
  try { localStorage.removeItem('rms_v3_session'); }  catch(e) {}
  window.location.href = 'login.html';
}

/* ── LOAD DATA ── */
async function loadParts() {
  var saved = null;
  try { var raw=localStorage.getItem('rms_v3_parts'); if(raw) saved=JSON.parse(raw); } catch(e){}
  if (saved && Array.isArray(saved) && saved.length > 0) {
    _parts = SAMPLE_PARTS.map(function(sp) {
      var lp = saved.find(function(s){ return s.Part_Code===sp.Part_Code||s.Part_ID===sp.Part_ID; });
      if (!lp) return Object.assign({}, sp);
      return Object.assign({}, sp, {
        Current_Stock: parseFloat(lp.Current_Stock ?? sp.Current_Stock),
        Cost:          parseFloat(lp.Cost ?? sp.Cost)
      });
    });
  } else {
    _parts = SAMPLE_PARTS.map(function(sp){ return Object.assign({}, sp); });
  }
  _localParts = [..._parts];
  renderPage();
}

/* ── PAGE SHELL ── */
function renderPage() {
  var pg = document.getElementById('pg');
  if (!pg) return;

  var low     = _parts.filter(function(p){ return parseFloat(p.Current_Stock||0) > 0 && parseFloat(p.Current_Stock||0) <= parseFloat(p.Min_Stock||0); });
  var outStock= _parts.filter(function(p){ return parseFloat(p.Current_Stock||0) <= 0; });
  var val     = _parts.reduce(function(s,p){ return s + parseFloat(p.Cost||0)*parseFloat(p.Current_Stock||0); }, 0);
  var active  = _parts.filter(function(p){ return (p.Status||'ACTIVE')==='ACTIVE'; }).length;
  var alertCount = low.length + outStock.length;

  pg.innerHTML =
    /* ── KPI Strip ── */
    '<div class="row g-3 mb-4">' +
      _kpi('fa-boxes',              'primary',   _parts.length,                         'อะไหล่ทั้งหมด',      'รายการ') +
      _kpi('fa-check-circle',       'success',   active,                                'Active',              'รายการ') +
      _kpi('fa-coins',              'warning',   '฿'+Math.round(val).toLocaleString('th-TH'), 'มูลค่าคลัง', '') +
      _kpi('fa-exclamation-triangle','danger',   alertCount,                            'Low / Out Stock',     'รายการ', alertCount > 0) +
    '</div>' +

    /* ── Low Stock Banner (conditional) ── */
    (alertCount > 0 ?
      '<div class="alert alert-danger d-flex align-items-start gap-3 mb-4" style="border-radius:var(--radius-md);border:1px solid rgba(220,38,38,.2)">' +
        '<i class="fas fa-exclamation-circle mt-1 flex-shrink-0" style="font-size:1rem"></i>' +
        '<div style="flex:1;min-width:0">' +
          '<div style="font-weight:700;font-size:.82rem;margin-bottom:6px">⚠ Low Stock Alert — ' + alertCount + ' รายการ</div>' +
          '<div class="d-flex flex-wrap gap-2">' +
          [...outStock,...low].slice(0,8).map(function(p){
            var isOut = parseFloat(p.Current_Stock||0) <= 0;
            return '<span style="background:rgba(255,255,255,.7);padding:2px 10px;border-radius:20px;font-size:.72rem;font-weight:600;color:'+(isOut?'var(--danger)':'var(--warning)')+';border:1px solid '+(isOut?'rgba(220,38,38,.3)':'rgba(217,119,6,.3)')+'">' +
              (p.Part_Name||p.Part_Code) + ' ' + (isOut?'(หมด)':'('+p.Current_Stock+')') +
            '</span>';
          }).join('') +
          '</div>' +
        '</div>' +
      '</div>'
    : '') +

    /* ── Tabs ── */
    '<div class="parts-tabs" id="partsTabBar">' +
      _tabBtn('list',      'fa-list',      'รายการอะไหล่') +
      _tabBtn('issue',     'fa-arrow-up',  'เบิกอะไหล่') +
      _tabBtn('receive',   'fa-arrow-down','รับเข้าคลัง') +
      _tabBtn('history',   'fa-history',   'ประวัติ') +
      _tabBtn('dashboard', 'fa-chart-bar', 'วิเคราะห์') +
    '</div>' +

    '<div id="tabContent"></div>';

  /* Tab click */
  var tabBar = document.getElementById('partsTabBar');
  if (tabBar) {
    tabBar.addEventListener('click', function(e) {
      var btn = e.target.closest('[data-tab]');
      if (!btn) return;
      _curTab = btn.dataset.tab;
      document.querySelectorAll('.parts-tab').forEach(function(b){ b.classList.toggle('active', b.dataset.tab === _curTab); });
      renderTab(_curTab);
    });
  }

  renderTab(_curTab);
}

function _kpi(icon, cls, val, label, unit, warn) {
  return '<div class="col-md-3 col-6">' +
    '<div class="stat-card" style="' + (warn ? 'border-left:3px solid var(--danger)' : '') + '">' +
      '<div class="stat-icon ' + cls + '"><i class="fas ' + icon + '"></i></div>' +
      '<div style="min-width:0">' +
        '<div class="stat-value" style="' + (warn ? 'color:var(--danger)' : '') + '">' + val + '</div>' +
        '<div class="stat-label">' + label + (unit ? ' <span style="font-size:.6rem;color:var(--gray-400)">' + unit + '</span>' : '') + '</div>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function _tabBtn(tab, icon, label) {
  return '<button class="parts-tab' + (_curTab === tab ? ' active' : '') + '" data-tab="' + tab + '">' +
    '<i class="fas ' + icon + '"></i>' + label +
  '</button>';
}

function renderTab(tab) {
  var el = document.getElementById('tabContent');
  if (!el) return;
  if (tab === 'list')      renderList(el);
  else if (tab === 'issue')    renderIssueTab(el);
  else if (tab === 'receive')  renderReceiveTab(el);
  else if (tab === 'history')  renderHistory(el);
  else if (tab === 'dashboard') renderDashboard(el);
}

async function doIssue() {
  try {

  var iv = (document.getElementById('iss_p')||{}).value.trim();
  var pt = _parts.find(function(p){ return (p.Part_Name||'').toLowerCase()===iv.toLowerCase()||(p.Part_Code||'')===iv; });
  if (!pt) return UI.toast('กรุณาเลือกอะไหล่ให้ถูกต้อง','warning');
  var qty = parseInt((document.getElementById('iss_q')||{}).value||'0');
  if (!qty||qty<1) return UI.toast('กรุณาระบุจำนวน','warning');
  var cur = parseFloat(pt.Current_Stock||0);
  if (cur < qty) return UI.toast('สต๊อกไม่พอ (เหลือ '+cur+')','danger');

  var idx = _parts.findIndex(function(p){ return p.Part_ID===pt.Part_ID||p.Part_Code===pt.Part_Code; });
  _parts[idx].Current_Stock = cur - qty;
  _saveParts();

  var jobNo = (document.getElementById('iss_j')||{}).value||'';
  var rem   = (document.getElementById('iss_rem')||{}).value||'';
  _issLog.unshift({ name:pt.Part_Name, qty:qty, jobNo:jobNo, rem:rem,
    t:new Date().toLocaleTimeString('th-TH'), date:new Date().toISOString().slice(0,10) });
  _saveLog('rms_iss_log', _issLog);

  if (RMS.USE_GAS) {
    DataStore.issuePart({partId:pt.Part_ID||pt.Part_Code, partCode:pt.Part_Code, qty:qty, jobNo:jobNo, remark:rem})
      .catch(function(e){ console.warn('GAS issuePart:', e); });
  }
  UI.toast('เบิก "' + pt.Part_Name + '" ' + qty + ' ' + (pt.Unit||'PC') + ' สำเร็จ','success');

    setTimeout(function(){ UI.toast('⚠ "' + pt.Part_Name + '" สต๊อกต่ำกว่า Min!','warning'); }, 800);

  var lp = document.getElementById('issLogPanel');

  } catch(err) {

function rcvSelChanged() {
  var rv = (document.getElementById('rcv_p')||{}).value.trim();
  var pt = _parts.find(function(p){ return (p.Part_Name||'').toLowerCase()===rv.toLowerCase()||(p.Part_Code||'')===rv; });
  var d = document.getElementById('rcv_disp');
  if (d) d.value = pt ? (parseFloat(pt.Current_Stock||0) + ' ' + (pt.Unit||'PC')) : '';
}

async function doReceive() {
  try {

  var rv = (document.getElementById('rcv_p')||{}).value.trim();
  var pt = _parts.find(function(p){ return (p.Part_Name||'').toLowerCase()===rv.toLowerCase()||(p.Part_Code||'')===rv; });
  if (!pt) return UI.toast('กรุณาเลือกอะไหล่ให้ถูกต้อง','warning');
  var qty = parseInt((document.getElementById('rcv_q')||{}).value||'0');
  if (!qty||qty<1) return UI.toast('กรุณาระบุจำนวน','warning');

  var idx = _parts.findIndex(function(p){ return p.Part_ID===pt.Part_ID||p.Part_Code===pt.Part_Code; });
  _parts[idx].Current_Stock = parseFloat(_parts[idx].Current_Stock||0) + qty;
  var uc = parseFloat((document.getElementById('rcv_c')||{}).value||'0');
  _saveParts();

  _rcvLog.unshift({ name:pt.Part_Name, qty:qty, unitCost:uc,
    t:new Date().toLocaleTimeString('th-TH'), date:new Date().toISOString().slice(0,10) });
  _saveLog('rms_rcv_log', _rcvLog);

  if (RMS.USE_GAS) {
    DataStore.receivePart({partId:pt.Part_ID||pt.Part_Code, qty:qty, unitCost:uc})
      .catch(function(e){ console.warn('GAS receivePart:', e); });
  }
  UI.toast('รับ "' + pt.Part_Name + '" ' + qty + ' ' + (pt.Unit||'PC') + ' สำเร็จ','success');

  var lp = document.getElementById('rcvLogPanel');
  if (lp) lp.innerHTML = _renderRcvLogItems();
  rcvSelChanged();

  } catch(err) {
    console.error("doReceive:", err);
    UI.toast("เกิดข้อผิดพลาด: " + err.message, "danger");
  }
}

function clearRcv() {
  ['rcv_p','rcv_po','rcv_sup','rcv_rem'].forEach(function(id){ var e=document.getElementById(id); if(e) e.value=''; });
  var q=document.getElementById('rcv_q'); if(q) q.value='1';
  var c=document.getElementById('rcv_c'); if(c) c.value='0';
  var d=document.getElementById('rcv_disp'); if(d) d.value='';
}

   TAB: DASHBOARD / ANALYTICS
════════════════════════════════════════ */
function renderDashboard(el) {
  ['jobIss','trend7','stockPie','stockVsIss'].forEach(function(k){
    if (_RC[k]) { try{_RC[k].destroy();}catch(e){} _RC[k]=null; }
  });
  _issLog = _loadLog('rms_iss_log');
  _rcvLog = _loadLog('rms_rcv_log');

  var allP    = _parts.length ? _parts : SAMPLE_PARTS;
  var low     = allP.filter(function(p){ return parseFloat(p.Current_Stock||0)>0&&parseFloat(p.Current_Stock||0)<=parseFloat(p.Min_Stock||0); });
  var outSt   = allP.filter(function(p){ return parseFloat(p.Current_Stock||0)<=0; });
  var healthy = allP.filter(function(p){ return parseFloat(p.Current_Stock||0)>parseFloat(p.Min_Stock||0); });
  var val     = allP.reduce(function(s,p){ return s+parseFloat(p.Cost||0)*parseFloat(p.Current_Stock||0); },0);
  var issTot  = _issLog.reduce(function(s,l){ return s+(l.qty||0); },0);
  var rcvTot  = _rcvLog.reduce(function(s,l){ return s+(l.qty||0); },0);

  /* Top issued parts */
  var issMap = {};
  _issLog.forEach(function(l){ if(l.name) issMap[l.name]=(issMap[l.name]||0)+(l.qty||0); });
  var topIss = Object.entries(issMap).sort(function(a,b){return b[1]-a[1];}).slice(0,8);

  /* 7-day trend */
  var days7 = {}, now = new Date();
  for (var d2=6;d2>=0;d2--) {
    var dt=new Date(now); dt.setDate(dt.getDate()-d2);
    var dk=dt.toISOString().slice(0,10); days7[dk]=0;
  }
  _issLog.forEach(function(l){ if(l.date && days7.hasOwnProperty(l.date)) days7[l.date]+=(l.qty||0); });

  /* JOB breakdown */
  var jobMap = {};
  _issLog.forEach(function(l){
    if(!l.jobNo)return;
    if(!jobMap[l.jobNo]) jobMap[l.jobNo]={jobNo:l.jobNo,items:[],totalQty:0,date:l.date||''};
    jobMap[l.jobNo].items.push({name:l.name,qty:l.qty||0});
    jobMap[l.jobNo].totalQty+=(l.qty||0);
  });
  var jobArr = Object.values(jobMap).sort(function(a,b){return b.totalQty-a.totalQty;}).slice(0,10);

  el.innerHTML =
    /* KPI row */
    '<div class="row g-3 mb-4">' +
      _dashKpi('fa-boxes',          'primary',   allP.length,                     'รายการทั้งหมด') +
      _dashKpi('fa-arrow-up',       'warning',   issTot,                          'เบิกรวม (ชิ้น)') +
      _dashKpi('fa-arrow-down',     'success',   rcvTot,                          'รับเข้ารวม (ชิ้น)') +
      _dashKpi('fa-exclamation-triangle','danger',low.length+outSt.length,        'Low/Out Stock') +
      _dashKpi('fa-coins',          'secondary', '฿'+Math.round(val).toLocaleString('th-TH'),'มูลค่าคลัง') +
    '</div>' +

    /* Charts row 1 */
    '<div class="row g-3 mb-3">' +
      '<div class="col-xl-8">' +
        '<div class="dash-chart-card">' +
          '<div class="chart-title"><i class="fas fa-chart-bar me-2" style="color:var(--warning)"></i>แนวโน้มการเบิก 7 วัน</div>' +
          '<div class="chart-sub">จำนวนชิ้นที่เบิกรายวัน</div>' +
          '<canvas id="trendChart7" height="90"></canvas>' +
        '</div>' +
      '</div>' +
      '<div class="col-xl-4">' +
        '<div class="dash-chart-card">' +
          '<div class="chart-title"><i class="fas fa-chart-pie me-2" style="color:var(--secondary)"></i>สถานะ Stock</div>' +
          '<div class="chart-sub">ภาพรวมสต๊อกทั้งคลัง</div>' +
          '<canvas id="stockPieChart" height="120"></canvas>' +
          '<div class="d-flex flex-wrap justify-content-center gap-3 mt-2" style="font-size:.72rem">' +
            '<span style="display:flex;align-items:center;gap:5px"><span style="width:9px;height:9px;border-radius:50%;background:#16A34A;display:inline-block"></span>ปกติ (' + healthy.length + ')</span>' +
            '<span style="display:flex;align-items:center;gap:5px"><span style="width:9px;height:9px;border-radius:50%;background:#D97706;display:inline-block"></span>ใกล้หมด (' + low.length + ')</span>' +
            '<span style="display:flex;align-items:center;gap:5px"><span style="width:9px;height:9px;border-radius:50%;background:#DC2626;display:inline-block"></span>หมด (' + outSt.length + ')</span>' +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>' +

    /* Charts row 2 - Top issued */
    (topIss.length ?
      '<div class="row g-3 mb-3">' +
        '<div class="col-12">' +
          '<div class="dash-chart-card">' +
            '<div class="chart-title"><i class="fas fa-ranking-star me-2" style="color:var(--primary)"></i>อะไหล่ที่เบิกบ่อยที่สุด (Top ' + topIss.length + ')</div>' +
            '<div class="chart-sub">เรียงตามจำนวนที่เบิกสะสม</div>' +
            '<canvas id="topIssChart" height="90"></canvas>' +
          '</div>' +
        '</div>' +
      '</div>'
    : '') +

    /* JOB breakdown table */
    (jobArr.length ?
      '<div class="table-card">' +
        '<div class="table-header">' +
          '<div class="table-title"><i class="fas fa-briefcase me-2" style="color:var(--primary)"></i>การเบิกอะไหล่แยกตาม JOB No</div>' +
        '</div>' +
        '<div class="table-responsive"><table class="table table-hover mb-0 align-middle" style="font-size:.8rem">' +
          '<thead><tr>' +
            '<th style="padding:10px 14px">JOB No</th>' +
            '<th style="padding:10px 12px;text-align:center">รวมเบิก</th>' +
            '<th style="padding:10px 12px">อะไหล่ที่เบิก</th>' +

            var itemStr = job.items.map(function(it){
              var pt2 = allP.find(function(p){ return (p.Part_Name||p.Part_Code)===it.name; });
              var stk = pt2 ? parseFloat(pt2.Current_Stock||0) : null;
              var sC  = stk===null?'var(--gray-400)':_stockColor(stk, parseFloat((pt2&&pt2.Min_Stock)||0));

  setTimeout(function(){

    if (ctx1 && window.Chart) {
      if (_RC.trend7) { try{_RC.trend7.destroy();}catch(e){} }
      _RC.trend7 = new Chart(ctx1, {
        type:'bar',
        data:{ labels:Object.keys(days7).map(function(d){return d.slice(5);}),
               datasets:[{label:'เบิก (ชิ้น)',data:Object.values(days7),
                 backgroundColor:'rgba(27,154,170,.2)',borderColor:'#1B9AAA',borderWidth:2,borderRadius:6}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
          scales:{y:{beginAtZero:true,ticks:{stepSize:1,font:{size:10}},grid:{color:'rgba(0,0,0,.04)'}},
                  x:{grid:{display:false},ticks:{font:{size:10}}}}}
      });
    }
    var ctx2 = document.getElementById('stockPieChart');
    if (ctx2 && window.Chart) {
      if (_RC.stockPie) { try{_RC.stockPie.destroy();}catch(e){} }
      _RC.stockPie = new Chart(ctx2, {
        type:'doughnut',
        data:{labels:['ปกติ','ใกล้หมด','หมด'],
              datasets:[{data:[healthy.length,low.length,outSt.length],
                backgroundColor:['#16A34A','#D97706','#DC2626'],borderWidth:3,borderColor:'#fff',hoverOffset:5}]},
        options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{display:false}}}
      });
    }
    var ctx3 = document.getElementById('topIssChart');
    if (ctx3 && window.Chart && topIss.length) {
      if (_RC.topIss) { try{_RC.topIss.destroy();}catch(e){} }
      _RC.topIss = new Chart(ctx3, {
        type:'bar',
        data:{labels:topIss.map(function(x){return x[0].length>20?x[0].slice(0,19)+'…':x[0];}),
              datasets:[{label:'ชิ้น',data:topIss.map(function(x){return x[1];}),
                backgroundColor:topIss.map(function(_,i){return ['#3B82F6','#0F4C81','#1B9AAA','#16A34A','#D97706','#DC2626','#7C3AED','#F59E0B'][i%8]+'cc';}),
                borderRadius:6,barThickness:20}]},
        options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',
          plugins:{legend:{display:false}},
          scales:{y:{grid:{display:false},ticks:{font:{size:10}}},x:{beginAtZero:true,grid:{color:'rgba(0,0,0,.04)'},ticks:{font:{size:10}}}}}
      });
    }
  }, 50);
}

function _dashKpi(icon, cls, val, label) {
  return '<div class="col-md col-6">' +
    '<div class="stat-card">' +
      '<div class="stat-icon ' + cls + '"><i class="fas ' + icon + '"></i></div>' +
      '<div><div class="stat-value">' + val + '</div><div class="stat-label">' + label + '</div></div>' +
    '</div>' +
  '</div>';
}

/* ════════════════════════════════════════
   QUICK MODALS (from table row)
════════════════════════════════════════ */
function quickIssue(id, name) {
  _txPartId = id; _txMode = 'issue';
  var p = _parts.find(function(x){ return x.Part_ID===id; });
  var cur = p ? parseFloat(p.Current_Stock||0) : 0;
  var unit = p ? (p.Unit||'PC') : 'PC';
  var title = document.getElementById('txTitle');
  var body  = document.getElementById('txBody');
  if (title) title.innerHTML = '<i class="fas fa-arrow-up me-2"></i>เบิกอะไหล่ — ' + name;
  if (body) body.innerHTML =
    '<div class="p-3 rounded mb-3" style="background:rgba(27,154,170,.07);border:1px solid rgba(27,154,170,.2)">' +
      '<span style="font-size:.8rem;color:var(--gray-600)">คงเหลือ: </span>' +
      '<strong style="font-size:.95rem;color:' + _stockColor(cur, p?parseFloat(p.Min_Stock||0):0) + '">' + cur + ' ' + unit + '</strong>' +
    '</div>' +
    '<div class="mb-3"><label class="form-label">JOB No (อ้างอิง)</label>' +
      '<input class="form-control" id="tx_j" list="tx_j_list" placeholder="เลือกหรือพิมพ์ JOB No...">' +
      '<datalist id="tx_j_list">' + _localJobs.slice(0,30).map(function(j){ return '<option value="'+j.JOB_No+'">'+j.JOB_No+'</option>'; }).join('') + '</datalist>' +
    '</div>' +
    '<div><label class="form-label">จำนวน <span class="required-star">*</span></label>' +
      '<input type="number" class="form-control" id="tx_q" value="1" min="1" max="' + cur + '">' +
    '</div>';
  document.getElementById('txBtn').onclick = confirmTx;
  _showModal('txModal');
}

function quickReceive(id, name) {
  _txPartId = id; _txMode = 'receive';
  var p = _parts.find(function(x){ return x.Part_ID===id; });
  var cur = p ? parseFloat(p.Current_Stock||0) : 0;
  var unit = p ? (p.Unit||'PC') : 'PC';
  var title = document.getElementById('txTitle');
  var body  = document.getElementById('txBody');
  if (title) title.innerHTML = '<i class="fas fa-arrow-down me-2"></i>รับเข้า — ' + name;
  if (body) body.innerHTML =
    '<div class="p-3 rounded mb-3" style="background:rgba(22,163,74,.07);border:1px solid rgba(22,163,74,.2)">' +
      '<span style="font-size:.8rem;color:var(--gray-600)">คงเหลือ: </span>' +
      '<strong style="font-size:.95rem;color:var(--success)">' + cur + ' ' + unit + '</strong>' +
    '</div>' +
    '<div class="mb-3"><label class="form-label">จำนวนที่รับ <span class="required-star">*</span></label>' +
      '<input type="number" class="form-control" id="tx_q" value="1" min="1">' +
    '</div>' +
    '<div><label class="form-label">ต้นทุน/หน่วย (฿)</label>' +
      '<input type="number" class="form-control" id="tx_c" value="' + (p?parseFloat(p.Cost||0):0) + '" min="0">' +
    '</div>';
  document.getElementById('txBtn').onclick = confirmTx;
  _showModal('txModal');
}

async function confirmTx() {
  try {

  var qty = parseInt((document.getElementById('tx_q')||{}).value||'0');
  if (!qty||qty<1) return UI.toast('กรุณาระบุจำนวน','warning');
  var p = _parts.find(function(x){ return x.Part_ID===_txPartId; });
  if (!p) return;
  var idx = _parts.findIndex(function(x){ return x.Part_ID===_txPartId; });

  if (_txMode === 'issue') {
    if (parseFloat(p.Current_Stock||0) < qty) return UI.toast('สต๊อกไม่พอ (เหลือ ' + p.Current_Stock + ')','danger');
    var jn = (document.getElementById('tx_j')||{}).value||'';
    _parts[idx].Current_Stock = parseFloat(_parts[idx].Current_Stock||0) - qty;
    _issLog.unshift({name:p.Part_Name,qty:qty,jobNo:jn,t:new Date().toLocaleTimeString('th-TH'),date:new Date().toISOString().slice(0,10)});
    _saveLog('rms_iss_log',_issLog);
    UI.toast('เบิก ' + qty + ' ' + (p.Unit||'PC') + ' สำเร็จ','success');
  } else {
    var uc = parseFloat((document.getElementById('tx_c')||{}).value||'0');
    _parts[idx].Current_Stock = parseFloat(_parts[idx].Current_Stock||0) + qty;
    _rcvLog.unshift({name:p.Part_Name,qty:qty,unitCost:uc,t:new Date().toLocaleTimeString('th-TH'),date:new Date().toISOString().slice(0,10)});
    _saveLog('rms_rcv_log',_rcvLog);
    UI.toast('รับเข้า ' + qty + ' ' + (p.Unit||'PC') + ' สำเร็จ','success');
  }
  _saveParts();
  _hideModal('txModal');
  renderPage();

  } catch(err) {
    console.error("confirmTx:", err);
    UI.toast("เกิดข้อผิดพลาด: " + err.message, "danger");
  }
}

/* ════════════════════════════════════════
   PART CRUD
════════════════════════════════════════ */
function openCreate() {
  _editId = null;
  var title = document.getElementById('partModalTitle');
  if (title) title.innerHTML = '<i class="fas fa-plus me-2"></i>เพิ่มอะไหล่ใหม่';
  var ids = ['f_pCode','f_pName','f_pLoc'];
  ids.forEach(function(id){ var e=document.getElementById(id); if(e) e.value=''; });
  var defs = {f_pUnit:'PC',f_pCat:'Mechanical',f_pWH:'WH-EWS',f_pStatus:'ACTIVE',f_pCost:'0',f_pMin:'0',f_pStock:'0'};
  Object.keys(defs).forEach(function(id){ var e=document.getElementById(id); if(e) e.value=defs[id]; });
  _showModal('partModal');
}

function openEdit(id) {
  _editId = id;
  var p = _parts.find(function(x){ return x.Part_ID===id; });
  if (!p) return UI.toast('ไม่พบอะไหล่','danger');
  var title = document.getElementById('partModalTitle');
  if (title) title.innerHTML = '<i class="fas fa-edit me-2"></i>แก้ไข — ' + p.Part_Name;
  var map = {f_pCode:p.Part_Code, f_pName:p.Part_Name, f_pCat:p.Category||'Mechanical',
    f_pUnit:p.Unit||'PC', f_pCost:p.Cost||0, f_pMin:p.Min_Stock||0,
    f_pStock:p.Current_Stock||0, f_pWH:p.Warehouse_ID||'WH-EWS',
    f_pLoc:p.Location||'', f_pStatus:p.Status||'ACTIVE'};
  Object.keys(map).forEach(function(id){ var e=document.getElementById(id); if(e) e.value=map[id]; });
  _showModal('partModal');
}

function savePart() {
  var code = (document.getElementById('f_pCode')||{}).value.trim();
  var name = (document.getElementById('f_pName')||{}).value.trim();
  if (!code) return UI.toast('กรุณาระบุ Part Code','warning');
  if (!name) return UI.toast('กรุณาระบุชื่ออะไหล่','warning');
  function gv(id){ var e=document.getElementById(id); return e?e.value:''; }
  var data = {
    Part_Code: code, Part_Name: name,
    Category:      gv('f_pCat')||'Mechanical',
    Unit:          gv('f_pUnit')||'PC',
    Cost:          parseFloat(gv('f_pCost')||'0'),
    Min_Stock:     parseFloat(gv('f_pMin')||'0'),
    Current_Stock: parseFloat(gv('f_pStock')||'0'),
    Warehouse_ID:  gv('f_pWH')||'WH-EWS',
    Location:      gv('f_pLoc')||'',
    Status:        gv('f_pStatus')||'ACTIVE',
  };
  if (_editId) {
    var idx = _parts.findIndex(function(p){ return p.Part_ID===_editId; });
    if (idx>=0) _parts[idx] = Object.assign({}, _parts[idx], data);
    UI.toast('แก้ไข "' + name + '" สำเร็จ','success');
  } else {
    if (_parts.find(function(p){ return p.Part_Code===code; }))
      return UI.toast('Part Code "'+code+'" มีอยู่แล้ว','warning');
    _parts.unshift(Object.assign({ Part_ID: 'P'+Date.now() }, data));
    UI.toast('เพิ่ม "' + name + '" สำเร็จ','success');
  }
  _saveParts();
  _hideModal('partModal');
  renderPage();
  renderTab(_curTab);
}

function delPart(id) {
  var p = _parts.find(function(x){ return x.Part_ID===id; });
  UI.confirm('ลบอะไหล่ "' + (p?p.Part_Name:id) + '"?\nการลบไม่สามารถย้อนกลับได้', function() {
    _parts = _parts.filter(function(x){ return x.Part_ID!==id; });
    _saveParts();
    UI.toast('ลบสำเร็จ','success');
    renderPage(); renderTab(_curTab);
  });
}
</script>
