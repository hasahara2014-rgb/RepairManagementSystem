<style id="ds-v4">
/* ═══════════════════════════════════════════════════════════════
   EWS Enterprise Design System v4.0 — World-Class Override
   SAP Fiori / Fluent Design inspired
   ═══════════════════════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap');

:root{
  --font-sans:'Inter','Sarabun','Noto Sans Thai',system-ui,sans-serif;
  /* Refined Primary — Fiori Blue */
  --primary:#1264A3;--primary-dark:#0C4F84;--primary-light:#1976C8;
  --primary-50:#EBF4FC;--primary-100:#C9E2F7;
  /* Secondary — Deep Teal */
  --secondary:#0E8A8A;--secondary-dark:#0A6B6B;--secondary-light:#11ACAC;
  /* Semantic */
  --success:#107C10;--success-bg:#DFF6DD;
  --warning:#C45911;--warning-bg:#FFF4CE;
  --danger:#A4262C;--danger-bg:#FDE7E9;
  --info:#0078D4;--info-bg:#E8F4FE;
  --purple:#7B52C3;--purple-bg:#F4EEF9;
  /* Neutral — Slate Gray (cooler) */
  --gray-50:#F9FAFB;--gray-100:#F3F4F6;--gray-200:#E5E7EB;
  --gray-300:#D1D5DB;--gray-400:#9CA3AF;--gray-500:#6B7280;
  --gray-600:#4B5563;--gray-700:#374151;--gray-800:#1F2937;--gray-900:#111827;
  /* Sidebar */
  --sidebar-width:252px;--sidebar-collapsed:64px;
  /* Surfaces */
  --surface:#FFFFFF;--bg-page:#EEF2F7;
  /* Shadows — Refined */
  --shadow-xs:0 1px 2px rgba(0,0,0,0.04);
  --shadow-sm:0 1px 3px rgba(0,0,0,0.07),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 12px rgba(0,0,0,0.08),0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg:0 12px 28px rgba(0,0,0,0.10),0 4px 8px rgba(0,0,0,0.04);
  --shadow-xl:0 24px 56px rgba(0,0,0,0.12),0 8px 16px rgba(0,0,0,0.06);
  /* Card */
  --card-shadow:var(--shadow-sm);
  --card-radius:12px;
  --card-border:1px solid var(--gray-200);
}

/* ── GLOBAL ── */
body{font-family:var(--font-sans);background:var(--bg-page);-webkit-font-smoothing:antialiased;color:var(--gray-800);}

/* ── SIDEBAR v4 ── */
.rms-sidebar{background:#0B1927;}
.sidebar-brand{background:linear-gradient(180deg,rgba(18,100,163,.12) 0%,transparent 100%);border-bottom:1px solid rgba(255,255,255,.07);}

.brand-ver{font-size:.6rem;letter-spacing:.8px;color:rgba(255,255,255,.3);}
.nav-item{border-radius:8px;font-size:.795rem;padding:8px 11px;transition:background .12s,color .12s;}
.nav-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.95);}
.nav-item.active{background:rgba(14,138,138,.18);color:#fff;}
.nav-item.active::before{background:#0E8A8A;width:3px;border-radius:0 3px 3px 0;}
.nav-item.active .nav-icon{color:#0E8A8A;}
.nav-section-label{font-size:.555rem;letter-spacing:1.6px;color:rgba(255,255,255,.2);padding:16px 11px 5px;}
.nav-badge{font-size:.58rem;padding:1px 6px;border-radius:20px;}

.user-name{font-size:.79rem;font-weight:600;}
.user-role{font-size:.61rem;letter-spacing:.6px;}

/* ── TOPBAR v4 ── */
.rms-topbar{border-bottom:1px solid var(--gray-200);border-top:3px solid var(--primary);box-shadow:0 2px 8px rgba(0,0,0,.05);background:#fff;}
.page-title{font-size:.92rem;font-weight:700;color:var(--gray-900);letter-spacing:-.1px;}
.page-subtitle{font-size:.68rem;color:var(--gray-400);font-weight:400;}
.topbar-icon-btn{border-radius:8px;width:34px;height:34px;border:1px solid var(--gray-200);transition:all .15s;}
.topbar-icon-btn:hover{background:var(--primary-50);border-color:var(--primary-100);color:var(--primary);}

.main-content{background:var(--bg-page);}
.page-content{padding:22px 24px 40px;max-width:1760px;}

/* ── STAT CARDS v4 ── */
.stat-card{
  background:#fff;border-radius:12px;
  border:1px solid var(--gray-200);border-left:4px solid transparent;

.stat-card:has(.stat-icon.primary)  {border-left-color:var(--primary);}
.stat-card:has(.stat-icon.secondary){border-left-color:var(--secondary);}
.stat-card:has(.stat-icon.success)  {border-left-color:var(--success);}
.stat-card:has(.stat-icon.warning)  {border-left-color:var(--warning);}
.stat-card:has(.stat-icon.danger)   {border-left-color:var(--danger);}
.stat-card:has(.stat-icon.purple)   {border-left-color:var(--purple);}
.stat-card:has(.stat-icon.info)     {border-left-color:var(--info);}
.stat-icon{width:44px;height:44px;border-radius:10px;font-size:.95rem;}
.stat-icon.primary  {background:var(--primary-50);color:var(--primary);}
.stat-icon.secondary{background:rgba(14,138,138,.08);color:var(--secondary);}
.stat-icon.success  {background:var(--success-bg);color:var(--success);}
.stat-icon.warning  {background:var(--warning-bg);color:var(--warning);}
.stat-icon.danger   {background:var(--danger-bg);color:var(--danger);}
.stat-icon.purple   {background:var(--purple-bg);color:var(--purple);}
.stat-icon.info     {background:var(--info-bg);color:var(--info);}
.stat-value{font-size:1.75rem;font-weight:800;color:var(--gray-900);line-height:1;letter-spacing:-1px;font-variant-numeric:tabular-nums;}
.stat-label{font-size:.735rem;font-weight:600;color:var(--gray-700);line-height:1.3;margin-top:3px;}
.stat-sub{font-size:.685rem;color:var(--gray-400);margin-top:2px;}
.stat-delta{font-size:.72rem;font-weight:600;margin-top:4px;display:flex;align-items:center;gap:3px;}

.table-card{background:#fff;border-radius:12px;border:var(--card-border);box-shadow:var(--shadow-xs);overflow:hidden;}
.table-header{display:flex;align-items:center;justify-content:space-between;padding:15px 20px;border-bottom:1px solid var(--gray-100);gap:12px;flex-wrap:wrap;}

.filter-card{

  padding:16px 20px;box-shadow:var(--shadow-xs);

.badge-CLOSED        {background:rgba(16,124,16,.09);color:#15803d;}
.badge-SEND_REPAIR   {background:rgba(14,138,138,.09);color:#0e7490;}
.badge-RETURNED      {background:rgba(18,100,163,.09);color:#1264A3;}
.badge-WAIT_APPROVAL {background:rgba(196,89,17,.09);color:#C45911;}
.badge-WAIT_SPARE_PART{background:rgba(123,82,195,.09);color:#7B52C3;}
.badge-REJECTED      {background:rgba(164,38,44,.09);color:#A4262C;}
.badge-APPROVED      {background:rgba(16,124,16,.09);color:#15803d;}
.badge-OPEN          {background:rgba(107,114,128,.09);color:#6B7280;}
.badge-IN_PROGRESS   {background:rgba(0,120,212,.09);color:#0078D4;}

/* ── ACTION BUTTONS ── */
.btn-action{
  width:30px;height:30px;border-radius:7px;
  border:1px solid var(--gray-200);background:var(--gray-50);
  display:inline-flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:.75rem;color:var(--gray-500);transition:all .15s;
}
.btn-action:hover{background:var(--gray-100);border-color:var(--gray-300);color:var(--gray-700);}

.modal-content{border:none;border-radius:16px;box-shadow:var(--shadow-xl);overflow:hidden;}

}
.modal-header-rms .modal-title{font-size:.95rem;font-weight:700;color:#fff;}
.modal-body{padding:24px;}
.modal-footer{background:var(--gray-50);border-top:1px solid var(--gray-100);padding:14px 20px;gap:8px;}

}
.rms-toast.success{border-left-color:var(--success);}
.rms-toast.danger{border-left-color:var(--danger);}
.rms-toast.warning{border-left-color:var(--warning);}

.nav-tabs .nav-link{
  font-size:.8rem;font-weight:600;color:var(--gray-500);

.nav-tabs .nav-link.active{color:var(--primary);border-bottom-color:var(--primary);}

.alert{font-size:.82rem;border-radius:10px;border:none;padding:12px 16px;}
.alert-info{background:var(--info-bg);color:#005A9E;}
.alert-success{background:var(--success-bg);color:#057005;}
.alert-warning{background:var(--warning-bg);color:#8A3A00;}
.alert-danger{background:var(--danger-bg);color:#750B1C;}

/* ── CONFIRM DIALOG ── */
#rmsConfirm .confirm-box{background:#fff;border-radius:16px;padding:28px;max-width:380px;width:100%;box-shadow:var(--shadow-xl);}
#rmsConfirm .confirm-icon{width:50px;height:50px;border-radius:50%;background:var(--warning-bg);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
#rmsConfirm .confirm-icon i{color:var(--warning);font-size:1.3rem;}
#rmsConfirm h6{text-align:center;font-size:.92rem;font-weight:700;margin-bottom:6px;color:var(--gray-900);}
#rmsConfirm p{text-align:center;font-size:.82rem;color:var(--gray-500);margin-bottom:20px;}

/* ── RESPONSIVE ── */
@media(max-width:992px){
  :root{--sidebar-width:var(--sidebar-collapsed);}
  .rms-sidebar{width:var(--sidebar-collapsed);}
  .brand-text,.nav-item span,.nav-section-label,.sidebar-user .user-info,.nav-badge{display:none!important;}
  .nav-item{justify-content:center;padding:10px;}
  .nav-icon{width:auto;font-size:1rem;}
  .page-content{padding:14px;}
}
@media(max-width:576px){
  .stat-card{padding:14px 16px;}
  .stat-value{font-size:1.5rem;}
  .filter-card,.table-header{padding:12px 14px;}
  .page-content{padding:10px;}
  .topbar-actions .topbar-icon-btn:not(:last-child):not(:nth-last-child(2)){display:none;}
}
@media print{
  .rms-sidebar,.rms-topbar{display:none!important;}
  .main-content{margin:0!important;padding:0!important;}
  .table-card,.chart-card{box-shadow:none;border:1px solid #ddd;}
}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--gray-400);}
/* ── TBLE HELPER CLASSES (used in Unified Design block) ── */
.tbl-hd{font-size:.65rem!important;font-weight:700!important;color:var(--gray-500)!important;letter-spacing:.5px;text-transform:uppercase;background:var(--gray-50)!important;padding:11px 14px!important;border-bottom:2px solid var(--gray-200)!important;white-space:nowrap;}
.tbl-td{padding:11px 14px!important;font-size:.815rem;color:var(--gray-700);vertical-align:middle;}
.stat-label{font-size:.72rem;font-weight:700;color:var(--gray-700);margin-bottom:2px;line-height:1.3;}
.stat-sub{font-size:.68rem;color:var(--gray-400);line-height:1.4;}
</style>

/* ─────────────────────────────────────────────────────────────
   4.  LOCAL STATE  (in-memory + localStorage)
   ───────────────────────────────────────────────────────────── */
function _normalizeJob(j) {
  if (!j) return null;

  // ── Normalize Status ──
  if (j.Status) j.Status = String(j.Status).replace(/ /g,'_').toUpperCase();
  if (!j.Priority) j.Priority = 'HIGH';

  // ── Map Sheet v3.3 field names → frontend field names ──
  // Sheet ใช้ Actual_Close แทน Close_Date
  if (!j.Close_Date && j.Actual_Close)   j.Close_Date   = j.Actual_Close;
  // Sheet ใช้ Create_Date ใน col T
  if (!j.Create_Date && j['Create_Date']) j.Create_Date = j['Create_Date'];
  // Legacy field name aliases
  if (!j.JOB_No && j['Job No'])                 j.JOB_No       = j['Job No'];
  if (!j.Equipment_ID && j['Equipment ID'])      j.Equipment_ID = j['Equipment ID'];
  if (!j.Damage_Code && j['Damage Code'])        j.Damage_Code  = j['Damage Code'];
  if (!j.Work_Order && j['Work Order'])          j.Work_Order   = j['Work Order'];
  if (!j.Vendor_ID && j['Vendor ID'])            j.Vendor_ID    = j['Vendor ID'];

  // ── Merge กับ SAMPLE_JOBS_RAW เพื่อเติม field ที่ขาด ──
  if (j.JOB_No && typeof SAMPLE_JOBS_RAW !== 'undefined') {
    var sample = SAMPLE_JOBS_RAW.find(function(s){ return s.JOB_No === j.JOB_No; });
    if (sample) {
      if (!j.Work_Order)          j.Work_Order          = sample.Work_Order          || '';
      if (!j.Refurbishment_Order) j.Refurbishment_Order = sample.Refurbishment_Order || '';
      if (!j.Receive_No)          j.Receive_No          = sample.Receive_No          || '';
      if (!j.Equipment_ID)        j.Equipment_ID        = sample.Equipment_ID        || '';
      if (!j.Damage_Code)         j.Damage_Code         = sample.Damage_Code         || '';
      if (!j.Vendor_ID)           j.Vendor_ID           = sample.Vendor_ID           || 'V001';
      if (!j.Create_Date)         j.Create_Date         = sample.Create_Date         || '';
      if (!j.Close_Date)          j.Close_Date          = sample.Close_Date          || '';
      if (!j.Material_ID)         j.Material_ID         = sample.Material_ID         || '10010041';
      if (!j.Priority)            j.Priority            = sample.Priority            || 'HIGH';
      if (!j.Repair_Action)       j.Repair_Action       = sample.Repair_Action       || '';
    }
  }
  return j;
}

// ── Clear corrupted localStorage cache ──────────────────────────
function clearJobCache() {
  try { localStorage.removeItem('rms_v3_jobs'); } catch(e) {}
  _localJobs = SAMPLE_JOBS_RAW.map(function(j){ return Object.assign({}, j); });
  UI.toast('ล้าง cache งานซ่อมแล้ว กำลังโหลดใหม่...', 'success');
  setTimeout(function(){ window.location.reload(); }, 1200);
}

function _loadJobs() {
  try {
    const raw = localStorage.getItem('rms_v3_jobs');
    if (raw) {
      const parsed = JSON.parse(raw);
      return parsed
        .map(_normalizeJob)
        .filter(function(j) { return j && j.JOB_No && j.JOB_No.trim() !== ''; });
    }
  } catch(e) { console.warn('_loadJobs error:', e); }
  return SAMPLE_JOBS_RAW.map(function(j){ return Object.assign({}, j); });
}

function _saveJobs() {
  try { localStorage.setItem('rms_v3_jobs', JSON.stringify(_localJobs)); } catch(e) {}
}

function _loadParts() {
  try {
    const raw = localStorage.getItem('rms_v3_parts');
    if (raw) {
      const saved = JSON.parse(raw);
      return SAMPLE_PARTS.map(sp => {
        const lp = saved.find(s => s.Part_Code === sp.Part_Code || s.Part_ID === sp.Part_ID);
        return lp ? Object.assign({}, sp, { Current_Stock: parseFloat(lp.Current_Stock ?? sp.Current_Stock), Cost: parseFloat(lp.Cost ?? sp.Cost) }) : Object.assign({}, sp);
      });
    }
  } catch(e) {}
  return SAMPLE_PARTS.map(p => Object.assign({}, p));
}

function _saveParts() {
  try { localStorage.setItem('rms_v3_parts', JSON.stringify(_localParts)); } catch(e) {}
}

var _localJobs  = _loadJobs();
var _localParts = _loadParts();

/* ─────────────────────────────────────────────────────────────
   5.  AUTH
   ───────────────────────────────────────────────────────────── */
const Auth = {
  getUser() {
    try {
      const s = sessionStorage.getItem(SESSION_KEY) || localStorage.getItem(SESSION_KEY);
      return s ? JSON.parse(s) : null;
    } catch(e) { return null; }
  },
  isLoggedIn() {
    const u = this.getUser();
    return u && (Date.now() - (u.loginTime || 0) < 8 * 3600 * 1000);
  },
  isAdmin() {
    const u = this.getUser();
    return u && ['SUPER_ADMIN', 'ADMIN'].includes(u.role);
  },
  isManager() {
    const u = this.getUser();
    return u && ['SUPER_ADMIN', 'ADMIN', 'MANAGER'].includes(u.role);
  },
  hasPermission(perm) {
    const u = this.getUser();
    return u && Array.isArray(u.permissions) && u.permissions.includes(perm);
  },
  guardPage() {
    // ถ้าหน้าไม่ใช่ login แล้วยังไม่ login → redirect
    if (!this.isLoggedIn() && !location.pathname.includes('login')) {
      window.location.href = 'login.html';
      return false;
    }
    return true;
  },
};

/* ─────────────────────────────────────────────────────────────
   6.  GAS HELPER
   ───────────────────────────────────────────────────────────── */
async function callGAS(action, payload) {
  try {
    const user  = Auth.getUser();
    const token = user ? (user.token || '') : '';
    const params = new URLSearchParams({
      action,
      token,
      payload: encodeURIComponent(JSON.stringify(payload || {})),
    });
    const res  = await fetch(RMS.GAS_URL + '?' + params, { redirect: 'follow' });
    return await res.json();
  } catch(e) {
    console.warn('callGAS error:', action, e.message);
    return { success: false, error: e.message };
  }
}

/* ─────────────────────────────────────────────────────────────
   7.  DATASTORE  (local-first, GAS fallback)
   ───────────────────────────────────────────────────────────── */
const DataStore = {

  /* ── JOB NO GENERATOR ── */
  async generateJobNo() {
    const y = new Date().getFullYear();
    const prefix = 'JOB-' + y + '-';
    const existing = _localJobs.filter(j => j.JOB_No && j.JOB_No.startsWith(prefix));
    const nums = existing.map(j => parseInt(j.JOB_No.replace(prefix, ''), 10)).filter(n => !isNaN(n));
    const next = nums.length ? Math.max(...nums) + 1 : 1;
    return prefix + String(next).padStart(3, '0');
  },

  async generateReceiveNo() {
    const d = new Date();
    const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
    return 'RCV-' + y + m + day + '-' + String(Math.floor(Math.random()*900)+100);
  },

  /* ── GET JOBS ── */
  async getJobs(filter) {
    filter = filter || {};
    // refresh from localStorage
    _localJobs = _loadJobs();

    if (RMS.USE_GAS) {
      try {
        const res = await callGAS('getJobs', { filter });
        if (res && res.success && res.data) {
          // Merge GAS data with SAMPLE_JOBS_RAW to fill missing fields
          var gasJobs = res.data.map(function(gasJob) {
            var normalized = _normalizeJob(gasJob);
            if (!normalized || !normalized.JOB_No) return null;
            // Find matching sample job to fill in missing fields
            var sample = SAMPLE_JOBS_RAW.find(function(s){ return s.JOB_No === normalized.JOB_No; });
            if (sample) {
              return Object.assign({}, sample, normalized);
            }
            return normalized;
          }).filter(function(j) { return j && j.JOB_No && j.JOB_No.trim() !== ''; });
          
          // Merge: GAS jobs take priority, add SAMPLE_JOBS not in GAS
          var gasJobNos = new Set(gasJobs.map(function(j){ return j.JOB_No; }));
          var sampleOnly = SAMPLE_JOBS_RAW.filter(function(s){ return !gasJobNos.has(s.JOB_No); });
          _localJobs = [...gasJobs, ...sampleOnly];
          _saveJobs();
        }
      } catch(e) {}
    }

    // Filter out invalid/incomplete jobs
    let jobs = [..._localJobs].filter(function(j) {
      return j && j.JOB_No && j.JOB_No.trim() !== '';
    });
    if (filter.status && filter.status !== 'ALL') {
      if (filter.status === 'REPEAT') {
        const cnt = {};
        _localJobs.forEach(j => { if (j.Equipment_ID) cnt[j.Equipment_ID] = (cnt[j.Equipment_ID]||0) + 1; });
        jobs = jobs.filter(j => cnt[j.Equipment_ID] > 1);
      } else {
        jobs = jobs.filter(j => (j.Status||'') === filter.status);
      }
    }
    if (filter.priority) jobs = jobs.filter(j => j.Priority === filter.priority);
    if (filter.vendor)   jobs = jobs.filter(j => j.Vendor_ID === filter.vendor);
    if (filter.branch)   jobs = jobs.filter(j => j.Branch_ID === filter.branch);
    if (filter.search) {
      const q = filter.search.toLowerCase();
      jobs = jobs.filter(j =>
        (j.JOB_No||'').toLowerCase().includes(q) ||
        (j.Equipment_ID||'').toLowerCase().includes(q) ||
        (j.Work_Order||'').toLowerCase().includes(q) ||
        (j.Damage_Code||'').toLowerCase().includes(q)
      );
    }
    return jobs;
  },  // returns Array directly

  async getJobById(jobNo) {
    _localJobs = _loadJobs();
    return _localJobs.find(j => j.JOB_No === jobNo) || null;
  },

  /* ── CREATE JOB ── */
  async createJob(data) {
    const job = Object.assign({ Created_By: (Auth.getUser()||{}).username || 'admin' }, data);
    _localJobs.unshift(job);
    _saveJobs();

    if (RMS.USE_GAS) {
      try {
        const res = await callGAS('createJob', { data: job });
        if (res && res.success) return { success: true, data: job };
        return { success: true, data: job, gasWarn: res && res.error };
      } catch(e) { return { success: true, data: job, gasWarn: e.message }; }
    }
    return { success: true, data: job };
  },

  /* ── UPDATE JOB ── */
  async updateJob(jobNo, data) {
    const idx = _localJobs.findIndex(j => j.JOB_No === jobNo);
    if (idx < 0) return { success: false, error: 'ไม่พบ Job' };
    _localJobs[idx] = Object.assign({}, _localJobs[idx], data);
    _saveJobs();

    if (RMS.USE_GAS) {
      try { await callGAS('updateJob', { jobNo, data }); } catch(e) {}
    }
    return { success: true, data: _localJobs[idx] };
  },

  /* ── DELETE JOB ── */
  async deleteJob(jobNo) {
    const before = _localJobs.length;
    _localJobs = _localJobs.filter(j => j.JOB_No !== jobNo);
    if (_localJobs.length === before) return { success: false, error: 'ไม่พบ Job' };
    _saveJobs();

    if (RMS.USE_GAS) {
      try { await callGAS('deleteJob', { jobNo }); } catch(e) {}
    }
    return { success: true };
  },

  /* ── UPDATE STATUS ── */
  async updateStatus(jobNo, status, remark) {
    // ✅ ใช้ updateJobStatus (lightweight) แทน updateJob เต็ม
    // เพื่อป้องกัน undefined fields overwrite ใน Google Sheets
    if (RMS.USE_GAS) {
      const res = await callGAS('updateJobStatus', {
        jobNo:  jobNo,
        status: status,
        remark: remark || ''
      });
      if (res && res.success) {
        // อัปเดต local state ด้วย
        const idx = _localJobs.findIndex(j => j.JOB_No === jobNo);
        if (idx >= 0) {
          _localJobs[idx].Status     = status;
          _localJobs[idx].Updated_At = new Date().toISOString().slice(0,10);
          if (status === 'CLOSED') _localJobs[idx].Close_Date = new Date().toISOString().slice(0,10);
          _saveJobs();
        }
        return res;
      }
      // GAS failed → fallback to local only
    }
    // Local update only (offline/demo mode)
    const idx = _localJobs.findIndex(j => j.JOB_No === jobNo);
    if (idx >= 0) {
      _localJobs[idx].Status     = status;
      _localJobs[idx].Updated_At = new Date().toISOString().slice(0,10);
      if (status === 'CLOSED') _localJobs[idx].Close_Date = new Date().toISOString().slice(0,10);
      _saveJobs();
    }
    return { success: true };
  },

  /* ── GET DASHBOARD ── */
  async getDashboard() {
    _localJobs  = _loadJobs();
    _localParts = _loadParts();

    const jobs = [..._localJobs];
    const cnt  = {};
    jobs.forEach(j => { const s = (j.Status||'').replace(/ /g,'_'); cnt[s] = (cnt[s]||0) + 1; });

    // Trend
    const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    const tData  = Array(12).fill(0);
    const y = new Date().getFullYear();
    jobs.forEach(j => { if(j.Create_Date){ const d=new Date(j.Create_Date); if(d.getFullYear()===y) tData[d.getMonth()]++; } });

    // งานซ่อมจริง = ทั้งหมด - ซ่อมซ้ำ
    const eqCount = {};
    jobs.forEach(j => { if(j.Equipment_ID) eqCount[j.Equipment_ID] = (eqCount[j.Equipment_ID]||0)+1; });
    const repeatJobs = jobs.filter(j => eqCount[j.Equipment_ID] > 1);
    const realJobs   = jobs.length - repeatJobs.length; // งานซ่อมจริง (ไม่ซ้ำ)
    const uniqueRepeatEq = Object.values(eqCount).filter(c => c > 1).length;

    // MTTR (เก็บไว้สำหรับ reports.html)
    const closed = jobs.filter(j => j.Status==='CLOSED' && j.Create_Date && j.Close_Date);
    const mttr   = closed.length ? parseFloat((closed.reduce((s,j) => s+(new Date(j.Close_Date)-new Date(j.Create_Date))/86400000, 0)/closed.length).toFixed(1)) : 0;

    // Priority
    const byP = { CRITICAL:0, HIGH:0, MEDIUM:0, LOW:0 };
    jobs.forEach(j => { if(j.Priority && byP[j.Priority]!==undefined) byP[j.Priority]++; });

    // Low stock
    const lowStock = _localParts.filter(p => parseFloat(p.Current_Stock||0) <= parseFloat(p.Min_Stock||0));

    return {
      success: true,
      stats: {
        total:           jobs.length,
        CLOSED:          cnt.CLOSED          || 0,
        IN_PROGRESS:     cnt.SEND_REPAIR     || 0,
        RETURNED:        cnt.RETURNED        || 0,
        WAIT_APPROVAL:   cnt.WAIT_APPROVAL   || 0,
        WAIT_SPARE_PART: cnt.WAIT_SPARE_PART || 0,
        SEND_REPAIR:     cnt.SEND_REPAIR     || 0,
        OPEN:            cnt.OPEN            || 0,
        realJobs:        realJobs,             // งานซ่อมจริง (ไม่ซ้ำ)
        repeatJobs:      repeatJobs.length,    // ซ่อมซ้ำ
        uniqueRepeatEq:  uniqueRepeatEq,       // จำนวนอุปกรณ์ที่ซ่อมซ้ำ
      },
      mttr,
      realJobs,
      repeatCount:    repeatJobs.length,
      uniqueRepeatEq: uniqueRepeatEq,
      pendingApprovals: cnt.WAIT_APPROVAL || 0,
      monthlyTrend: { labels: months, data: tData },
      vendorKPIs: SAMPLE_VENDORS.map(v => ({
        name:   v.Vendor_Name,
        total:  jobs.filter(j => j.Vendor_ID === v.Vendor_ID).length,
        closed: jobs.filter(j => j.Vendor_ID === v.Vendor_ID && j.Status === 'CLOSED').length,
      })),
      byPriority:  byP,
      recentJobs:  jobs.slice().sort((a,b) => (b.Create_Date||'').localeCompare(a.Create_Date||'')).slice(0,10),
      lowStock,
    };
  },

  /* ── PARTS ── */
  async issuePart({ partId, partCode, qty, jobNo, remark }) {
    _localParts = _loadParts();
    const idx = _localParts.findIndex(p => p.Part_ID === partId || p.Part_Code === (partCode || partId));
    if (idx < 0) return { success: false, error: 'ไม่พบ Part' };
    const cur = parseFloat(_localParts[idx].Current_Stock || 0);
    if (cur < qty) return { success: false, error: 'สต๊อกไม่พอ (เหลือ ' + cur + ')' };
    _localParts[idx].Current_Stock = cur - qty;
    _saveParts();

    // log
    try {
      const log = JSON.parse(localStorage.getItem('rms_iss_log') || '[]');
      log.unshift({ date: new Date().toISOString().slice(0,10), partId, qty, jobNo: jobNo||'', remark: remark||'', by: (Auth.getUser()||{}).username||'admin' });
      localStorage.setItem('rms_iss_log', JSON.stringify(log.slice(0,200)));
    } catch(e) {}

    if (RMS.USE_GAS) { try { await callGAS('issuePart', { partId, qty, jobNo, remark }); } catch(e) {} }
    return { success: true, newStock: _localParts[idx].Current_Stock };
  },

  async receivePart({ partId, qty, unitCost }) {
    _localParts = _loadParts();
    const idx = _localParts.findIndex(p => p.Part_ID === partId || p.Part_Code === partId);
    if (idx < 0) return { success: false, error: 'ไม่พบ Part' };
    _localParts[idx].Current_Stock = parseFloat(_localParts[idx].Current_Stock||0) + qty;
    if (unitCost) _localParts[idx].Cost = parseFloat(unitCost);
    _saveParts();

    try {
      const log = JSON.parse(localStorage.getItem('rms_rcv_log') || '[]');
      log.unshift({ date: new Date().toISOString().slice(0,10), partId, qty, unitCost: unitCost||0, by: (Auth.getUser()||{}).username||'admin' });
      localStorage.setItem('rms_rcv_log', JSON.stringify(log.slice(0,200)));
    } catch(e) {}

    if (RMS.USE_GAS) { try { await callGAS('receivePart', { partId, qty, unitCost }); } catch(e) {} }
    return { success: true, newStock: _localParts[idx].Current_Stock };
  },
};

  priorityBadge(p) {
    const M = {
      CRITICAL: { bg:'rgba(153,27,27,.1)',  color:'#991B1B', border:'rgba(153,27,27,.2)',  icon:'fa-fire'      },
      HIGH:     { bg:'rgba(180,83,9,.1)',   color:'#B45309', border:'rgba(180,83,9,.2)',   icon:'fa-arrow-up'  },
      MEDIUM:   { bg:'rgba(146,64,14,.1)',  color:'#92400E', border:'rgba(146,64,14,.2)',  icon:'fa-minus'     },
      LOW:      { bg:'rgba(22,163,74,.1)',  color:'#166534', border:'rgba(22,163,74,.2)',  icon:'fa-arrow-down'},
    };
    const c = M[p] || M.MEDIUM;
    return `<span style="display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:.63rem;font-weight:700;letter-spacing:.2px;background:${c.bg};color:${c.color};border:1px solid ${c.border}"><i class="fas ${c.icon}" style="font-size:.55rem"></i>${p||'MEDIUM'}</span>`;
  },

  statusBadge(s) {
    const st = (s||'').replace(/ /g,'_').toUpperCase();
    const M = {
      IN_PROGRESS:     { bg:'rgba(2,132,199,.1)',   color:'#0369a1', label:'IN PROGRESS'      },
      CLOSED:          { bg:'rgba(22,163,74,.1)',   color:'#15803d', label:'CLOSED'            },
      RETURNED:        { bg:'rgba(15,76,129,.1)',   color:'#0F4C81', label:'RETURNED'          },
      WAIT_APPROVAL:   { bg:'rgba(217,119,6,.1)',   color:'#b45309', label:'WAIT APPROVAL'     },
      WAIT_APPROVE:    { bg:'rgba(217,119,6,.1)',   color:'#b45309', label:'WAIT APPROVE'      },
      WAIT_SPARE_PART: { bg:'rgba(124,58,237,.1)',  color:'#6d28d9', label:'WAIT SPARE PART'   },
      SEND_REPAIR:     { bg:'rgba(27,154,170,.1)',  color:'#0e7490', label:'SEND REPAIR'       },
      REJECTED:        { bg:'rgba(220,38,38,.1)',   color:'#dc2626', label:'REJECTED'          },
      APPROVED:        { bg:'rgba(22,163,74,.1)',   color:'#16a34a', label:'APPROVED'          },
      OPEN:            { bg:'rgba(100,116,139,.1)', color:'#475569', label:'OPEN'              },
      REPEAT:          { bg:'rgba(194,65,12,.1)',   color:'#c2410c', label:'REPEAT'            },
    };
    const c = M[st] || { bg:'rgba(100,116,139,.1)', color:'#475569', label: st };
    return `<span style="display:inline-block;padding:3px 10px;border-radius:20px;font-size:.62rem;font-weight:700;letter-spacing:.2px;background:${c.bg};color:${c.color}">${c.label}</span>`;
  },

  toast(msg, type, duration) {
    duration = duration || 3200;
    const ICONS   = { success:'fa-check-circle', danger:'fa-times-circle', warning:'fa-exclamation-triangle', info:'fa-info-circle' };
    const COLORS  = { success:'#16a34a', danger:'#dc2626', warning:'#d97706', info:'#0284c7' };
    const icon    = ICONS[type]  || ICONS.info;
    const color   = COLORS[type] || COLORS.info;

    let tc = document.getElementById('rmsToastContainer');
    if (!tc) {
      tc = document.createElement('div');
      tc.id = 'rmsToastContainer';
      tc.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;';
      document.body.appendChild(tc);
    }

    // inject keyframes once
    if (!document.getElementById('_rmsKF')) {
      const s = document.createElement('style');
      s.id = '_rmsKF';
      s.textContent = '@keyframes _rmsIn{from{opacity:0;transform:translateX(18px) scale(.96)}to{opacity:1;transform:none}}@keyframes _rmsOut{from{opacity:1;transform:none}to{opacity:0;transform:translateX(18px) scale(.96)}}';
      document.head.appendChild(s);
    }

    const t = document.createElement('div');
    t.style.cssText = `background:#1e293b;color:#f1f5f9;padding:11px 16px;border-radius:9px;font-size:.8rem;font-weight:500;box-shadow:0 16px 40px rgba(0,0,0,.22);display:flex;align-items:center;gap:10px;animation:_rmsIn .22s cubic-bezier(0.16,1,0.3,1) forwards;pointer-events:all;max-width:320px;border-left:3px solid ${color};font-family:'Inter','Noto Sans Thai',sans-serif;line-height:1.4;`;
    t.innerHTML = `<i class="fas ${icon}" style="color:${color};font-size:.8rem;flex-shrink:0"></i><span>${msg}</span>`;
    tc.appendChild(t);

    setTimeout(() => {
      t.style.animation = '_rmsOut .18s ease forwards';
      setTimeout(() => { try { t.remove(); } catch(e) {} }, 200);
    }, duration);
  },

  confirm(msg, onConfirm) {
    const ex = document.getElementById('_rmsConfirm');
    if (ex) ex.remove();

    if (!document.getElementById('_rmsCF')) {
      const s = document.createElement('style');
      s.id = '_rmsCF';
      s.textContent = '@keyframes _rmsCFIn{from{opacity:0}to{opacity:1}}@keyframes _rmsCFBoxIn{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:none}}';
      document.head.appendChild(s);
    }

    const ov = document.createElement('div');
    ov.id = '_rmsConfirm';
    ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:10999;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px);animation:_rmsCFIn .15s ease both;';
    ov.innerHTML = `
      <div style="background:#fff;border-radius:16px;padding:26px 24px;max-width:360px;width:100%;box-shadow:0 20px 56px rgba(0,0,0,.2);animation:_rmsCFBoxIn .18s cubic-bezier(0.16,1,0.3,1) both;font-family:'Inter','Noto Sans Thai',sans-serif;">
        <div style="width:44px;height:44px;border-radius:50%;background:rgba(217,119,6,.1);display:flex;align-items:center;justify-content:center;margin:0 auto 14px">
          <i class="fas fa-exclamation-triangle" style="color:#d97706;font-size:1rem"></i>
        </div>
        <p style="text-align:center;font-size:.84rem;color:#334155;font-weight:500;margin-bottom:20px;line-height:1.5">${msg}</p>
        <div style="display:flex;gap:8px">
          <button id="_rmsCC" style="flex:1;padding:8px;border:1.5px solid #e2e8f0;border-radius:7px;background:#f8fafc;color:#64748b;font-size:.8rem;font-weight:600;cursor:pointer;font-family:inherit;transition:background .12s" onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background='#f8fafc'">ยกเลิก</button>
          <button id="_rmsCO" style="flex:1;padding:8px;border:none;border-radius:7px;background:linear-gradient(135deg,#0F4C81,#1a5f9e);color:#fff;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .12s" onmouseover="this.style.opacity='.88'" onmouseout="this.style.opacity='1'">ยืนยัน</button>
        </div>
      </div>`;
    document.body.appendChild(ov);

    document.getElementById('_rmsCC').onclick = () => ov.remove();
    document.getElementById('_rmsCO').onclick = () => { ov.remove(); if (onConfirm) onConfirm(); };
    ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
  },
};

   ───────────────────────────────────────────────────────────── */
(function autoGuard() {
  const page = location.pathname.split('/').pop() || '';
  const open = ['login.html', 'index.html', ''];
  if (open.includes(page)) return;

  function check() {
    if (!Auth.isLoggedIn()) {
      window.location.href = 'login.html';
      return;
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', check);
  } else {
    check();
  }
})();

function _getBadgeCounts() {
  try {
    const jobs = typeof _localJobs !== 'undefined' ? _localJobs : [];
    const approve = jobs.filter(j=>['WAIT_APPROVAL','WAIT_APPROVE'].includes((j.Status||'').replace(/ /g,'_'))).length;
    const inProg  = jobs.filter(j=>(j.Status||'')==='SEND_REPAIR').length;
    return { approve: approve||0, jobs: inProg||0 };
  } catch(e) { return {}; }
}

function _buildSidebar() {
  const cur    = location.pathname.split('/').pop() || 'dashboard.html';
  const user   = (typeof Auth !== 'undefined') ? Auth.getUser() : null;
  const badges = _getBadgeCounts();
  const isAdmin   = user && ['SUPER_ADMIN','ADMIN'].includes(user.role);
  const isManager = user && ['SUPER_ADMIN','ADMIN','MANAGER'].includes(user.role);
  const initials  = user ? (user.name||user.username||'U').slice(0,2).toUpperCase() : 'U';
  const roleName  = user ? (user.role||'USER') : 'USER';
  const displayName = user ? (user.name||user.username||'User') : 'User';

  let navHTML = '';
  NAV_CONFIG.forEach(item => {
    if (item.section !== undefined) {
      if (item.adminOnly && !isAdmin) return;
      navHTML += `<div class="nav-section-label">${item.section}</div>`;
      return;
    }
    if (item.adminOnly   && !isAdmin)   return;
    if (item.managerOnly && !isManager) return;
    const active    = cur === item.href ? ' active' : '';
    const badgeCnt  = item.badgeKey && badges[item.badgeKey] ? badges[item.badgeKey] : 0;
    const badgeHTML = badgeCnt ? `<span class="nav-badge">${badgeCnt}</span>` : '';
    navHTML += `<a href="${item.href}" class="nav-item${active}"><span class="nav-icon"><i class="fas ${item.icon}"></i></span><span>${item.label}</span>${badgeHTML}</a>`;

function toggleSidebar() {

  const main    = document.getElementById('mainContent');
  const topbar  = document.getElementById('rmsTopbar');
  if (!sidebar) return;

  const collapsed = sidebar.classList.toggle('collapsed');

  if (topbar) topbar.style.left = w;
}

/* ── LOAD JOBS ── */
async function loadJobs(resetPage) {
  if (resetPage !== false) _currentPage = 1;  // reset หน้าทุกครั้งที่ filter เปลี่ยน

  try {
    var saved = localStorage.getItem('rms_v3_jobs');
    if (saved) _localJobs = JSON.parse(saved);
  } catch(e) {}

  var tb = document.getElementById('jobsTbody');
  if (tb) tb.innerHTML = '<tr><td colspan="10" class="text-center py-4"><div class="spinner-border spinner-border-sm" style="color:var(--secondary)"></div><span class="ms-2" style="color:var(--gray-400);font-size:.85rem">กำลังโหลด...</span></td></tr>';

  try {
    var jobs = await DataStore.getJobs(_currentFilter);
    if (!Array.isArray(jobs)) jobs = [];
    _allFilteredJobs = jobs;  // เก็บผลลัพธ์ทั้งหมดสำหรับ pagination
    updateKPIs(jobs);
    var cnt = document.getElementById('jobCount');
    if (cnt) cnt.textContent = jobs.length + ' รายการ';
    renderRows(jobs);
  } catch(err) {
    console.error('loadJobs:', err);
    if (tb) tb.innerHTML = '<tr><td colspan="10" class="text-center py-4 text-danger"><i class="fas fa-exclamation-circle me-2"></i>' + err.message + '</td></tr>';
  }
}

function updateKPIs(jobs) {
  if (!Array.isArray(jobs)) return;

  /* Status count (normalized) */
  var cnt = {};
  jobs.forEach(function(j) {
    var st = (j.Status||'').trim().replace(/ /g,'_').toUpperCase();
    cnt[st] = (cnt[st]||0) + 1;
  });

  /* Equipment ซ่อมซ้ำ */
  var eqM = {};
  jobs.forEach(function(j){ if(j.Equipment_ID) eqM[j.Equipment_ID]=(eqM[j.Equipment_ID]||0)+1; });
  var repeatEqCnt  = Object.values(eqM).filter(function(c){ return c>1; }).length;  /* นับ Equipment */
  var repeatJobCnt = jobs.filter(function(j){ return eqM[j.Equipment_ID]>1; }).length;
  var realJobs     = jobs.length - repeatJobCnt;

  function _s(id,v){ var e=document.getElementById(id); if(e) e.textContent=v; }
  _s('k_total', jobs.length);
  _s('k_ip',    cnt['SEND_REPAIR']     || 0);
  _s('k_sr',    cnt['SEND_REPAIR']     || 0);
  _s('k_ret',   cnt['RETURNED']        || 0);
  _s('k_cl',    cnt['CLOSED']          || 0);
  _s('k_wap',   cnt['WAIT_APPROVAL']   || 0);
  _s('k_wsp',   cnt['WAIT_SPARE_PART'] || 0);
  _s('k_rep',   repeatEqCnt);   /* ซ่อมซ้ำ = นับ Equipment */
  _s('k_real',  realJobs);      /* งานซ่อมจริง */
}

/* ── RENDER ROWS ── */
function renderRows(jobs) {
  var tb = document.getElementById('jobsTbody');
  if (!tb) return;
  // Extra safety: filter out invalid jobs before rendering
  jobs = jobs.filter(function(j) {
    return j && j.JOB_No && j.JOB_No.trim() !== '';
  });

  if (!Array.isArray(jobs) || !jobs.length) {
    tb.innerHTML = '<tr><td colspan="10"><div class="empty-state"><i class="fas fa-inbox"></i><p>ไม่พบงานซ่อม</p></div></td></tr>';
    renderPagination(0);
    return;
  }

  // ── Pagination: แบ่ง jobs ตามหน้าปัจจุบัน ──
  var totalJobs  = jobs.length;
  var totalPages = Math.ceil(totalJobs / PAGE_SIZE);
  _currentPage   = Math.min(_currentPage, Math.max(1, totalPages));
  var start = (_currentPage - 1) * PAGE_SIZE;
  var end   = Math.min(start + PAGE_SIZE, totalJobs);
  var pagedJobs = jobs.slice(start, end);

  var isAdm = Auth.isAdmin();
  var eqM = {};
  _localJobs.forEach(function(j){ if(j.Equipment_ID) eqM[j.Equipment_ID]=(eqM[j.Equipment_ID]||0)+1; });

  var ST_BORDER = {IN_PROGRESS:'#3B82F6',SEND_REPAIR:'#1B9AAA',RETURNED:'#0F4C81',CLOSED:'#16A34A',WAIT_APPROVAL:'#D97706',WAIT_SPARE_PART:'#7C3AED'};

  tb.innerHTML = pagedJobs.map(function(j) {
    var v    = SAMPLE_VENDORS.find(function(x){return x.Vendor_ID===j.Vendor_ID;})||{};
    var vN   = (v.Vendor_Name||j.Vendor_ID||'—').replace('บริษัท ','').replace(' จำกัด','');
    var st   = (j.Status||'OPEN').replace(/ /g,'_').toUpperCase();
    var pr   = j.Priority||'MEDIUM';
    var jn   = j.JOB_No||'';
    var eq   = j.Equipment_ID||'—';
    var dmg  = j.Damage_Code||'—';
    var cd   = j.Create_Date||'—';
    var cld  = j.Close_Date||'—';
    var cost = (j.Total_Cost && j.Total_Cost>0) ? ('฿'+parseFloat(j.Total_Cost).toLocaleString('th-TH',{maximumFractionDigits:0})) : '—';
    var isRep = eqM[eq] > 1;
    var border = ST_BORDER[st]||'transparent';

    return '<tr data-jno="' + jn + '" class="job-row" style="cursor:pointer;border-left:3px solid ' + border + '">' +
      '<td style="padding:10px 14px">' +
        '<div style="font-family:monospace;font-weight:700;font-size:.85rem;color:var(--primary)">' + jn + '</div>' +
        '<div style="font-size:.7rem;color:var(--gray-400);font-family:monospace;margin-top:2px">WO: ' + (j.Work_Order||'—') + '</div>' +
        (isRep?'<span style="font-size:.6rem;background:rgba(220,38,38,.1);color:var(--danger);padding:1px 5px;border-radius:4px;font-weight:700">REPEAT</span>':'') +
      '</td>' +
      '<td style="padding:10px 12px"><span style="font-family:monospace;font-weight:700;font-size:.85rem;background:var(--gray-100);padding:3px 9px;border-radius:5px;border:1px solid var(--gray-200)">' + eq + '</span></td>' +
      '<td style="padding:10px 12px;max-width:200px"><span style="display:block;font-size:.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--gray-700)" title="' + dmg + '">' + dmg + '</span></td>' +
      '<td style="padding:10px 12px;font-size:.78rem;color:var(--gray-600);white-space:nowrap">' + vN + '</td>' +
      '<td style="padding:10px 12px">' + UI.statusBadge(st) + '</td>' +
      '<td style="padding:10px 12px">' + UI.priorityBadge(pr) + '</td>' +
      '<td style="padding:10px 12px;font-size:.75rem;color:var(--gray-500)">' + cd + '</td>' +
      '<td style="padding:10px 12px;font-size:.75rem;color:var(--gray-500)">' + cld + '</td>' +
      '<td style="padding:10px 12px;text-align:right;font-size:.8rem;font-weight:600;color:var(--gray-700)">' + cost + '</td>' +
      '<td style="padding:10px 10px;text-align:center">' +
        '<div class="d-inline-flex gap-1">' +
          '<button class="btn-action btn-view"   data-act="view"   data-jno="'+jn+'" title="ดูรายละเอียด"><i class="fas fa-eye"></i></button>' +
          '<button class="btn-action btn-edit"   data-act="edit"   data-jno="'+jn+'" title="แก้ไข"><i class="fas fa-pen"></i></button>' +
          '<button class="btn-action"            data-act="status" data-jno="'+jn+'" data-cur="'+st+'" title="เปลี่ยนสถานะ" style="color:var(--secondary);background:rgba(27,154,170,.07);border-color:rgba(27,154,170,.2)"><i class="fas fa-exchange-alt"></i></button>' +
          (isAdm?'<button class="btn-action btn-delete" data-act="delete" data-jno="'+jn+'" title="ลบ"><i class="fas fa-trash"></i></button>':'') +
        '</div>' +
      '</td>' +
    '</tr>';
  }).join('');

  /* Event delegation — ไม่มี inline onclick */
  var tbl = document.getElementById('jobsTable');
  if (tbl) {
    tbl.onclick = function(e) {
      var btn = e.target.closest('[data-act][data-jno]');
      if (btn) {
        var act = btn.dataset.act;
        var jno = btn.dataset.jno;
        if (act==='view')   { e.stopPropagation(); viewJob(jno); return; }
        if (act==='edit')   { e.stopPropagation(); editJob(jno); return; }
        if (act==='status') { e.stopPropagation(); openStatusModal(jno, btn.dataset.cur); return; }
        if (act==='delete') { e.stopPropagation(); deleteJob(jno); return; }
      }
      var tr = e.target.closest('tr[data-jno]');
      if (tr) viewJob(tr.dataset.jno);
    };
  }

  renderPagination(totalJobs);
}

/* ── PAGINATION ── */
function renderPagination(totalJobs) {
  var container = document.getElementById('jobsPagination');
  if (!container) return;

  var totalPages = Math.ceil(totalJobs / PAGE_SIZE);
  if (totalPages <= 1) { container.innerHTML = ''; return; }

  var start = (_currentPage - 1) * PAGE_SIZE + 1;
  var end   = Math.min(_currentPage * PAGE_SIZE, totalJobs);

  // สร้างปุ่มหน้า (max 7 ปุ่ม)
  var pages = [];
  if (totalPages <= 7) {
    for (var i = 1; i <= totalPages; i++) pages.push(i);
  } else {
    pages.push(1);
    if (_currentPage > 3) pages.push('...');
    for (var p = Math.max(2, _currentPage-1); p <= Math.min(totalPages-1, _currentPage+1); p++) pages.push(p);
    if (_currentPage < totalPages - 2) pages.push('...');
    pages.push(totalPages);
  }

  var btnStyle = 'min-width:32px;height:30px;border:1.5px solid var(--gray-200);border-radius:6px;background:var(--gray-50);color:var(--gray-600);font-size:.75rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;padding:0 6px;';
  var activeStyle = 'background:var(--primary);border-color:var(--primary);color:#fff;';
  var disabledStyle = 'opacity:.4;cursor:not-allowed;';

  var html = '<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-top:1px solid var(--gray-100);background:var(--gray-50)">'
    + '<span style="font-size:.72rem;color:var(--gray-500)">แสดง ' + start + '–' + end + ' จาก ' + totalJobs + ' รายการ</span>'
    + '<div style="display:flex;gap:4px;align-items:center">';

  // ปุ่มย้อนกลับ
  html += '<button style="' + btnStyle + (_currentPage<=1?disabledStyle:'') + '" onclick="goPage(' + (_currentPage-1) + ')" ' + (_currentPage<=1?'disabled':'') + '><i class="fas fa-chevron-left" style="font-size:.65rem"></i></button>';

  pages.forEach(function(p) {
    if (p === '...') {
      html += '<span style="padding:0 4px;color:var(--gray-400);font-size:.75rem">···</span>';
    } else {
      html += '<button style="' + btnStyle + (p===_currentPage?activeStyle:'') + '" onclick="goPage(' + p + ')">' + p + '</button>';
    }
  });

  // ปุ่มถัดไป
  html += '<button style="' + btnStyle + (_currentPage>=totalPages?disabledStyle:'') + '" onclick="goPage(' + (_currentPage+1) + ')" ' + (_currentPage>=totalPages?'disabled':'') + '><i class="fas fa-chevron-right" style="font-size:.65rem"></i></button>';

  html += '</div></div>';
  container.innerHTML = html;
}

function goPage(page) {
  var totalPages = Math.ceil(_allFilteredJobs.length / PAGE_SIZE);
  if (page < 1 || page > totalPages) return;
  _currentPage = page;
  renderRows(_allFilteredJobs);
  // scroll กลับขึ้นบนตาราง
  var tbl = document.getElementById('jobsTable');
  if (tbl) tbl.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ── FILTERS ── */
function setupFilters() {
  var sel = document.getElementById('filterVendor');
  if (sel) SAMPLE_VENDORS.forEach(function(v) {
    var o = document.createElement('option');
    o.value = v.Vendor_ID;
    o.textContent = (v.Vendor_Name||'').replace('บริษัท ','').replace(' จำกัด','');
    sel.appendChild(o);
  });

  document.addEventListener('click', function(e) {
    var btn = e.target.closest('.status-btn');
    if (!btn) return;
    document.querySelectorAll('.status-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    _currentFilter.status = btn.dataset.st || 'ALL';
    loadJobs();
  });

  var fp = document.getElementById('filterPriority');
  if (fp) fp.addEventListener('change', function(){ _currentFilter.priority=this.value; loadJobs(); });
  var fv = document.getElementById('filterVendor');
  if (fv) fv.addEventListener('change', function(){ _currentFilter.vendorId=this.value; loadJobs(); });
  var fb = document.getElementById('filterBranch');
  if (fb) fb.addEventListener('change', function(){ _currentFilter.branch=this.value; loadJobs(); });
  var sb = document.getElementById('searchBox');
  if (sb) sb.addEventListener('input', function(){
    clearTimeout(_searchTimer);
    var q = this.value;
    _searchTimer = setTimeout(function(){ _currentFilter.search=q; loadJobs(); }, 320);
  });
}

function clearFilters() {
  _currentFilter = { status:'ALL' };
  document.querySelectorAll('.status-btn').forEach(function(b){ b.classList.toggle('active',b.dataset.st==='ALL'); });
  ['filterPriority','filterVendor','filterBranch','searchBox'].forEach(function(id){
    var e=document.getElementById(id); if(e) e.value='';
  });
  loadJobs();
}

    if (body) body.innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-circle me-2"></i>' + err.message + '</div>';
  }
}

/* ── BUILD FORM ── */
function buildForm(v) {
  v = v || {};
  var vOpts   = SAMPLE_VENDORS.map(function(x){ return '<option value="'+x.Vendor_ID+'"'+(x.Vendor_ID===(v.Vendor_ID||'V001')?' selected':'')+'>'+x.Vendor_Name+'</option>'; }).join('');
  var dmgOpts = DAMAGE_CODES.map(function(d){ return '<option value="'+d+'"'+(d===v.Damage_Code?' selected':'')+'>'+d+'</option>'; }).join('');
  var stOpts  = Object.keys(STATUS_CFG).map(function(s){ var c=(v.Status||'OPEN').replace(/ /g,'_').toUpperCase(); return '<option value="'+s+'"'+(s===c?' selected':'')+'>'+(STATUS_CFG[s].label||s)+'</option>'; }).join('');
  var prOpts  = ['CRITICAL','HIGH','MEDIUM','LOW'].map(function(p){ return '<option value="'+p+'"'+(p===(v.Priority||'MEDIUM')?' selected':'')+'>'+p+'</option>'; }).join('');
  var brOpts  = BRANCHES.map(function(b){ return '<option value="'+b.id+'"'+(b.id===(v.Branch_ID||'HQ')?' selected':'')+'>'+b.name+'</option>'; }).join('');
  var eqList  = EQUIPMENT_IDS.map(function(e){ return '<option value="'+e+'">'; }).join('');

  return (
    '<div class="row g-3">' +
    '<div class="col-12"><div class="form-section-title"><i class="fas fa-info-circle me-2"></i>ข้อมูลงานซ่อม</div></div>' +
    '<div class="col-md-3"><label class="form-label">JOB No</label><input class="form-control" id="f_jobNo" value="'+(v.JOB_No||'')+'" readonly style="background:var(--gray-50);font-weight:700;color:var(--primary);font-family:monospace"></div>' +
    '<div class="col-md-3"><label class="form-label">Work Order</label><input class="form-control" id="f_wo" value="'+(v.Work_Order||'')+'" placeholder="90XXXXXXXX"></div>' +
    '<div class="col-md-3"><label class="form-label">Refurbishment Order</label><input class="form-control" id="f_rfo" value="'+(v.Refurbishment_Order||'')+'"></div>' +
    '<div class="col-md-3"><label class="form-label">Receive No</label><input class="form-control" id="f_rcv" value="'+(v.Receive_No||'')+'" style="font-size:.78rem;font-family:monospace"></div>' +
    '<div class="col-md-3"><label class="form-label">Equipment ID <span class="required-star">*</span></label><input class="form-control" id="f_eq" value="'+(v.Equipment_ID||'')+'" list="eqDl" placeholder="เช่น 287536" style="font-family:monospace;font-weight:700"><datalist id="eqDl">'+eqList+'</datalist></div>' +
    '<div class="col-md-3"><label class="form-label">Serial No</label><input class="form-control" id="f_serial" value="'+(v.Serial_No||'')+'"></div>' +
    '<div class="col-md-3"><label class="form-label">Asset Tag</label><input class="form-control" id="f_asset" value="'+(v.Asset_Tag||'')+'"></div>' +
    '<div class="col-md-3"><label class="form-label">Material ID</label><input class="form-control" id="f_mat" value="'+(v.Material_ID||'10010041')+'" style="font-family:monospace"></div>' +
    '<div class="col-12"><div class="form-section-title mt-1"><i class="fas fa-wrench me-2"></i>ปัญหาและการซ่อม</div></div>' +
    '<div class="col-md-6"><label class="form-label">Damage Code</label><select class="form-select" id="f_dmg"><option value="">-- เลือก --</option>'+dmgOpts+'</select></div>' +
    '<div class="col-md-6"><label class="form-label">สาเหตุ</label><input class="form-control" id="f_cause" value="'+(v.Cause||'')+'"></div>' +
    '<div class="col-12"><label class="form-label">Repair Action / วิธีซ่อม</label><textarea class="form-control" id="f_action" rows="2">'+(v.Repair_Action||'')+'</textarea></div>' +
    '<div class="col-12"><div class="form-section-title mt-1"><i class="fas fa-cogs me-2"></i>การจัดการ</div></div>' +
    '<div class="col-md-3"><label class="form-label">Vendor <span class="required-star">*</span></label><select class="form-select" id="f_vendor">'+vOpts+'</select></div>' +
    '<div class="col-md-3"><label class="form-label">สถานะ</label><select class="form-select" id="f_status">'+stOpts+'</select></div>' +
    '<div class="col-md-3"><label class="form-label">Priority</label><select class="form-select" id="f_priority">'+prOpts+'</select></div>' +
    '<div class="col-md-3"><label class="form-label">Department</label><select class="form-select" id="f_branch">'+brOpts+'</select></div>' +
    '<div class="col-md-3"><label class="form-label">วันที่รับ</label><input type="date" class="form-control" id="f_cd" value="'+(v.Create_Date||'')+'"></div>' +
    '<div class="col-md-3"><label class="form-label">วันที่ปิด</label><input type="date" class="form-control" id="f_cld" value="'+(v.Close_Date||'')+'"></div>' +
    '<div class="col-md-3"><label class="form-label">Labor Cost (฿)</label><input type="number" class="form-control" id="f_labor" value="'+(v.Labor_Cost||0)+'" min="0"></div>' +
    '<div class="col-md-3"><label class="form-label">Parts Cost (฿)</label><input type="number" class="form-control" id="f_parts" value="'+(v.Parts_Cost||0)+'" min="0"></div>' +
    '<div class="col-12"><label class="form-label">หมายเหตุ</label><textarea class="form-control" id="f_remark" rows="2">'+(v.Remark||'')+'</textarea></div>' +
    '</div>'
  );
}

/* ── SAVE JOB ── */
async function saveJob() {
  var btn = document.getElementById('saveJobBtn');
  if (!btn) return;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1" style="width:.8rem;height:.8rem"></span>บันทึก...';
  function resetBtn(){ btn.disabled=false; btn.innerHTML='<i class="fas fa-save me-1"></i>บันทึก'; }
  try {
    function val(id){ var e=document.getElementById(id); return e?e.value:''; }
    function num(id){ var e=document.getElementById(id); return e?parseFloat(e.value)||0:0; }
    var eq = val('f_eq').trim();
    if (!eq) { UI.toast('กรุณาระบุ Equipment ID','warning'); resetBtn(); return; }
    var data = {
      JOB_No:val('f_jobNo'), Work_Order:val('f_wo'), Refurbishment_Order:val('f_rfo'),
      Receive_No:val('f_rcv'), Equipment_ID:eq, Serial_No:val('f_serial'),
      Asset_Tag:val('f_asset'), Material_ID:val('f_mat')||'10010041',
      Damage_Code:val('f_dmg'), Cause:val('f_cause'), Repair_Action:val('f_action'),
      Vendor_ID:val('f_vendor'), Status:val('f_status'), Priority:val('f_priority'),
      Branch_ID:val('f_branch'), Create_Date:val('f_cd'), Close_Date:val('f_cld'),
      Labor_Cost:num('f_labor'), Parts_Cost:num('f_parts'),
      Total_Cost:num('f_labor')+num('f_parts'), Remark:val('f_remark'),
    };
    var res = _editJobNo ? await DataStore.updateJob(_editJobNo,data) : await DataStore.createJob(data);
    resetBtn();
    if (res && res.success !== false) {
      UI.toast(_editJobNo ? 'แก้ไขงานสำเร็จ' : 'สร้างงาน '+data.JOB_No+' สำเร็จ', 'success');
      _hideModal('jobModal');
      loadJobs();
    } else {
      UI.toast((res&&res.error)||'เกิดข้อผิดพลาด', 'danger');
    }
  } catch(err) {
    UI.toast('Error: '+err.message, 'danger');
    resetBtn();
  }
}

/* ── VIEW JOB ── */
async function viewJob(id) {
  if (!id) return;
  _viewJobNo = id;
  var title = document.getElementById('viewModalTitle');
  var body  = document.getElementById('viewBody');
  if (title) title.innerHTML = '<i class="fas fa-bolt me-2"></i>' + id;
  if (body)  body.innerHTML  = '<div class="text-center py-4"><div class="spinner-border" style="color:var(--secondary)"></div></div>';
  _showModal('viewModal');
  try {
    var j = await DataStore.getJobById(id);
    if (!j) { if(body) body.innerHTML='<div class="alert alert-danger">ไม่พบงาน '+id+'</div>'; return; }
    var vName = (SAMPLE_VENDORS.find(function(v){return v.Vendor_ID===j.Vendor_ID;})||{}).Vendor_Name||j.Vendor_ID||'—';
    var sameEq = _localJobs.filter(function(x){return x.Equipment_ID===j.Equipment_ID&&x.JOB_No!==j.JOB_No;});

    var rows = [
      ['JOB No',j.JOB_No,true],['Work Order',j.Work_Order,true],['Refurb. Order',j.Refurbishment_Order,true],
      ['Receive No',j.Receive_No,true],['Equipment ID',j.Equipment_ID,true],['Material ID',j.Material_ID,true],
      ['Serial No',j.Serial_No,false],['Asset Tag',j.Asset_Tag,false],
      ['Damage Code',j.Damage_Code,false],['สาเหตุ',j.Cause,false],
      ['Repair Action',j.Repair_Action,false,true],
      ['Vendor',vName,false],['Department',j.Branch_ID,false],
      ['วันที่รับ',j.Create_Date,false],['วันที่ปิด',j.Close_Date,false],
      ['Labor Cost','฿'+(j.Labor_Cost?parseFloat(j.Labor_Cost).toLocaleString():'0'),false],
      ['Parts Cost','฿'+(j.Parts_Cost?parseFloat(j.Parts_Cost).toLocaleString():'0'),false],
      ['Total Cost','฿'+(j.Total_Cost?parseFloat(j.Total_Cost).toLocaleString():'0'),false,false,true],
      ['หมายเหตุ',j.Remark,false,true],
    ];

    var html = '<div class="d-flex gap-2 flex-wrap mb-3 p-3" style="background:var(--gray-50);border-radius:var(--radius-md)">' +
      UI.statusBadge(j.Status) + ' ' + UI.priorityBadge(j.Priority||'MEDIUM') +
      (sameEq.length?'<span style="background:rgba(220,38,38,.1);color:var(--danger);font-size:.72rem;padding:3px 10px;border-radius:20px;font-weight:700"><i class="fas fa-arrows-rotate me-1"></i>ซ่อมซ้ำ '+sameEq.length+' ครั้ง</span>':'') +
    '</div><div class="row g-2">';

    rows.forEach(function(r) {
      var cls = r[3]?'col-12':'col-md-6';
      var bold = r[4]?';font-weight:700;color:var(--primary)':'';
      html += '<div class="'+cls+'"><label class="form-label">'+r[0]+'</label>' +
        '<div style="padding:7px 11px;background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-size:.82rem;min-height:34px;color:var(--gray-700)'+(r[2]?';font-family:monospace':'')+bold+'">'+(r[1]||'—')+'</div></div>';
    });

    if (sameEq.length) {
      html += '<div class="col-12"><label class="form-label">งานซ่อมอื่นของ Equipment นี้ (' + j.Equipment_ID + ')</label>' +
        '<div style="padding:10px 12px;background:rgba(220,38,38,.04);border:1px solid rgba(220,38,38,.15);border-radius:var(--radius-sm)">';
      sameEq.forEach(function(x) {
        html += '<span class="view-related-job" data-jno="'+x.JOB_No+'" style="display:inline-block;margin:3px;font-family:monospace;font-size:.75rem;font-weight:600;color:var(--primary);background:var(--gray-100);padding:3px 9px;border-radius:4px;cursor:pointer;border:1px solid var(--gray-200)">' + x.JOB_No + ' (' + (x.Status||'') + ')</span>';
      });
      html += '</div></div>';
    }

    html += '</div>';
    if (body) {
      body.innerHTML = html;
      body.addEventListener('click', function(e) {
        var s = e.target.closest('.view-related-job[data-jno]');
        if (s) { _hideModal('viewModal'); setTimeout(function(){ viewJob(s.dataset.jno); },200); }
      });
    }
  } catch(err) {
    if (body) body.innerHTML = '<div class="alert alert-danger">'+err.message+'</div>';
  }
}

/* ── STATUS MODAL ── */
function openStatusModal(id, curStatus) {
  var el = document.getElementById('statusJobNo');
  if (el) el.value = id;
  var cur  = (curStatus||'').replace(/ /g,'_').toUpperCase();
  var next = STATUS_FLOW[cur] || Object.keys(STATUS_CFG);
  var sel  = document.getElementById('newStatusSel');
  if (sel) sel.innerHTML = next.map(function(s){
    return '<option value="'+s+'">'+(STATUS_CFG[s]?STATUS_CFG[s].label:s)+'</option>';
  }).join('');
  var rm = document.getElementById('statusRemark');
  if (rm) rm.value = '';
  var lbl = document.getElementById('statusJobLabel');
  if (lbl) lbl.textContent = id;
  _showModal('statusModal');
}

async function confirmStatus() {
  var id     = (document.getElementById('statusJobNo')||{}).value;
  var status = (document.getElementById('newStatusSel')||{}).value;
  var remark = (document.getElementById('statusRemark')||{}).value;
  if (!id||!status) return;
  try {
    var res = await DataStore.updateStatus(id, status, remark);
    if (res&&res.success!==false) {
      UI.toast('อัปเดตสถานะ '+id+' สำเร็จ','success');
      _hideModal('statusModal');
      loadJobs();
    } else {
      UI.toast((res&&res.error)||'เกิดข้อผิดพลาด','danger');
    }
  } catch(err) { UI.toast('Error: '+err.message,'danger'); }
}

/* ── DELETE ── */
async function deleteJob(id) {
  UI.confirm('ยืนยันลบงาน ' + id + '?\nการลบไม่สามารถย้อนกลับได้', async function() {
    try {
      var res = await DataStore.deleteJob(id);
      if (res&&res.success!==false) { UI.toast('ลบงาน '+id+' สำเร็จ','success'); loadJobs(); }
      else UI.toast((res&&res.error)||'เกิดข้อผิดพลาด','danger');
    } catch(err) { UI.toast('Error: '+err.message,'danger'); }
  });
}

/* ── EXPORT CSV ── */
async function exportCSV() {
  try {
    var jobs = await DataStore.getJobs(_currentFilter);
    if (!jobs || !jobs.length) { UI.toast('ไม่มีข้อมูลสำหรับ Export','warning'); return; }
    var headers = ['JOB_No','Work_Order','Refurbishment_Order','Receive_No','Equipment_ID',
      'Material_ID','Serial_No','Asset_Tag','Status','Priority','Branch_ID',
      'Vendor_ID','Damage_Code','Cause','Repair_Action','Create_Date','Close_Date',
      'Labor_Cost','Parts_Cost','Total_Cost','Remark'];
    var csv = headers.join(',') + '\n';
    jobs.forEach(function(j) {
      csv += headers.map(function(h){
        var v = j[h] != null ? String(j[h]) : '';
        return '"' + v.replace(/"/g,'""') + '"';
      }).join(',') + '\n';
    });
    var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = 'RMS_Jobs_' + new Date().toISOString().slice(0,10) + '.csv';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
    UI.toast('Export CSV สำเร็จ (' + jobs.length + ' รายการ)', 'success');
  } catch(err) { UI.toast('Export Error: ' + err.message, 'danger'); }
}
