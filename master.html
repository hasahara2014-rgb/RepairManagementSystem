/* ─────────────────────────────────────────────────────────────
   4.  LOCAL STATE  (in-memory + localStorage)
   ───────────────────────────────────────────────────────────── */
function _normalizeJob(j) {
  if (!j) return null;

  // ── Normalize Status ──
  if (j.Status) j.Status = String(j.Status).replace(/ /g,'_').toUpperCase();
  if (!j.Priority) j.Priority = 'HIGH';

  // ── Map Sheet v3.3 field names → frontend field names ──
  // Sheet ใช้ Actual_Close แทน Close_Date
  if (!j.Close_Date && j.Actual_Close)   j.Close_Date   = j.Actual_Close;
  // Sheet ใช้ Create_Date ใน col T
  if (!j.Create_Date && j['Create_Date']) j.Create_Date = j['Create_Date'];
  // Legacy field name aliases
  if (!j.JOB_No && j['Job No'])                 j.JOB_No       = j['Job No'];
  if (!j.Equipment_ID && j['Equipment ID'])      j.Equipment_ID = j['Equipment ID'];
  if (!j.Damage_Code && j['Damage Code'])        j.Damage_Code  = j['Damage Code'];
  if (!j.Work_Order && j['Work Order'])          j.Work_Order   = j['Work Order'];
  if (!j.Vendor_ID && j['Vendor ID'])            j.Vendor_ID    = j['Vendor ID'];

  // ── Merge กับ SAMPLE_JOBS_RAW เพื่อเติม field ที่ขาด ──
  if (j.JOB_No && typeof SAMPLE_JOBS_RAW !== 'undefined') {
    var sample = SAMPLE_JOBS_RAW.find(function(s){ return s.JOB_No === j.JOB_No; });
    if (sample) {
      if (!j.Work_Order)          j.Work_Order          = sample.Work_Order          || '';
      if (!j.Refurbishment_Order) j.Refurbishment_Order = sample.Refurbishment_Order || '';
      if (!j.Receive_No)          j.Receive_No          = sample.Receive_No          || '';
      if (!j.Equipment_ID)        j.Equipment_ID        = sample.Equipment_ID        || '';
      if (!j.Damage_Code)         j.Damage_Code         = sample.Damage_Code         || '';
      if (!j.Vendor_ID)           j.Vendor_ID           = sample.Vendor_ID           || 'V001';
      if (!j.Create_Date)         j.Create_Date         = sample.Create_Date         || '';
      if (!j.Close_Date)          j.Close_Date          = sample.Close_Date          || '';
      if (!j.Material_ID)         j.Material_ID         = sample.Material_ID         || '10010041';
      if (!j.Priority)            j.Priority            = sample.Priority            || 'HIGH';
      if (!j.Repair_Action)       j.Repair_Action       = sample.Repair_Action       || '';
    }
  }
  return j;
}

// ── Clear corrupted localStorage cache ──────────────────────────
function clearJobCache() {
  try { localStorage.removeItem('rms_v3_jobs'); } catch(e) {}
  _localJobs = SAMPLE_JOBS_RAW.map(function(j){ return Object.assign({}, j); });
  UI.toast('ล้าง cache งานซ่อมแล้ว กำลังโหลดใหม่...', 'success');
  setTimeout(function(){ window.location.reload(); }, 1200);
}

function _loadJobs() {
  try {
    const raw = localStorage.getItem('rms_v3_jobs');
    if (raw) {
      const parsed = JSON.parse(raw);
      return parsed
        .map(_normalizeJob)
        .filter(function(j) { return j && j.JOB_No && j.JOB_No.trim() !== ''; });
    }
  } catch(e) { console.warn('_loadJobs error:', e); }
  return SAMPLE_JOBS_RAW.map(function(j){ return Object.assign({}, j); });
}

function _saveJobs() {
  try { localStorage.setItem('rms_v3_jobs', JSON.stringify(_localJobs)); } catch(e) {}
}

function _loadParts() {
  try {
    const raw = localStorage.getItem('rms_v3_parts');
    if (raw) {
      const saved = JSON.parse(raw);
      return SAMPLE_PARTS.map(sp => {
        const lp = saved.find(s => s.Part_Code === sp.Part_Code || s.Part_ID === sp.Part_ID);
        return lp ? Object.assign({}, sp, { Current_Stock: parseFloat(lp.Current_Stock ?? sp.Current_Stock), Cost: parseFloat(lp.Cost ?? sp.Cost) }) : Object.assign({}, sp);
      });
    }
  } catch(e) {}
  return SAMPLE_PARTS.map(p => Object.assign({}, p));
}

function _saveParts() {
  try { localStorage.setItem('rms_v3_parts', JSON.stringify(_localParts)); } catch(e) {}
}

var _localJobs  = _loadJobs();
var _localParts = _loadParts();

/* ─────────────────────────────────────────────────────────────
   5.  AUTH
   ───────────────────────────────────────────────────────────── */
const Auth = {
  getUser() {
    try {
      const s = sessionStorage.getItem(SESSION_KEY) || localStorage.getItem(SESSION_KEY);
      return s ? JSON.parse(s) : null;
    } catch(e) { return null; }
  },
  isLoggedIn() {
    const u = this.getUser();
    return u && (Date.now() - (u.loginTime || 0) < 8 * 3600 * 1000);
  },
  isAdmin() {
    const u = this.getUser();
    return u && ['SUPER_ADMIN', 'ADMIN'].includes(u.role);
  },
  isManager() {
    const u = this.getUser();
    return u && ['SUPER_ADMIN', 'ADMIN', 'MANAGER'].includes(u.role);
  },
  hasPermission(perm) {
    const u = this.getUser();
    return u && Array.isArray(u.permissions) && u.permissions.includes(perm);
  },
  guardPage() {
    // ถ้าหน้าไม่ใช่ login แล้วยังไม่ login → redirect
    if (!this.isLoggedIn() && !location.pathname.includes('login')) {
      window.location.href = 'login.html';
      return false;
    }
    return true;
  },
};

/* ─────────────────────────────────────────────────────────────
   6.  GAS HELPER
   ───────────────────────────────────────────────────────────── */
async function callGAS(action, payload) {
  try {
    const user  = Auth.getUser();
    const token = user ? (user.token || '') : '';
    const params = new URLSearchParams({
      action,
      token,
      payload: encodeURIComponent(JSON.stringify(payload || {})),
    });
    const res  = await fetch(RMS.GAS_URL + '?' + params, { redirect: 'follow' });
    return await res.json();
  } catch(e) {
    console.warn('callGAS error:', action, e.message);
    return { success: false, error: e.message };
  }
}

/* ─────────────────────────────────────────────────────────────
   7.  DATASTORE  (local-first, GAS fallback)
   ───────────────────────────────────────────────────────────── */
const DataStore = {

  /* ── JOB NO GENERATOR ── */
  async generateJobNo() {
    const y = new Date().getFullYear();
    const prefix = 'JOB-' + y + '-';
    const existing = _localJobs.filter(j => j.JOB_No && j.JOB_No.startsWith(prefix));
    const nums = existing.map(j => parseInt(j.JOB_No.replace(prefix, ''), 10)).filter(n => !isNaN(n));
    const next = nums.length ? Math.max(...nums) + 1 : 1;
    return prefix + String(next).padStart(3, '0');
  },

  async generateReceiveNo() {
    const d = new Date();
    const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
    return 'RCV-' + y + m + day + '-' + String(Math.floor(Math.random()*900)+100);
  },

  /* ── GET JOBS ── */
  async getJobs(filter) {
    filter = filter || {};
    // refresh from localStorage
    _localJobs = _loadJobs();

    if (RMS.USE_GAS) {
      try {
        const res = await callGAS('getJobs', { filter });
        if (res && res.success && res.data) {
          // Merge GAS data with SAMPLE_JOBS_RAW to fill missing fields
          var gasJobs = res.data.map(function(gasJob) {
            var normalized = _normalizeJob(gasJob);
            if (!normalized || !normalized.JOB_No) return null;
            // Find matching sample job to fill in missing fields
            var sample = SAMPLE_JOBS_RAW.find(function(s){ return s.JOB_No === normalized.JOB_No; });
            if (sample) {
              return Object.assign({}, sample, normalized);
            }
            return normalized;
          }).filter(function(j) { return j && j.JOB_No && j.JOB_No.trim() !== ''; });
          
          // Merge: GAS jobs take priority, add SAMPLE_JOBS not in GAS
          var gasJobNos = new Set(gasJobs.map(function(j){ return j.JOB_No; }));
          var sampleOnly = SAMPLE_JOBS_RAW.filter(function(s){ return !gasJobNos.has(s.JOB_No); });
          _localJobs = [...gasJobs, ...sampleOnly];
          _saveJobs();
        }
      } catch(e) {}
    }

    // Filter out invalid/incomplete jobs
    let jobs = [..._localJobs].filter(function(j) {
      return j && j.JOB_No && j.JOB_No.trim() !== '';
    });
    if (filter.status && filter.status !== 'ALL') {
      if (filter.status === 'REPEAT') {
        const cnt = {};
        _localJobs.forEach(j => { if (j.Equipment_ID) cnt[j.Equipment_ID] = (cnt[j.Equipment_ID]||0) + 1; });
        jobs = jobs.filter(j => cnt[j.Equipment_ID] > 1);
      } else {
        jobs = jobs.filter(j => (j.Status||'') === filter.status);
      }
    }
    if (filter.priority) jobs = jobs.filter(j => j.Priority === filter.priority);
    if (filter.vendor)   jobs = jobs.filter(j => j.Vendor_ID === filter.vendor);
    if (filter.branch)   jobs = jobs.filter(j => j.Branch_ID === filter.branch);
    if (filter.search) {
      const q = filter.search.toLowerCase();
      jobs = jobs.filter(j =>
        (j.JOB_No||'').toLowerCase().includes(q) ||
        (j.Equipment_ID||'').toLowerCase().includes(q) ||
        (j.Work_Order||'').toLowerCase().includes(q) ||
        (j.Damage_Code||'').toLowerCase().includes(q)
      );
    }
    return jobs;
  },  // returns Array directly

  async getJobById(jobNo) {
    _localJobs = _loadJobs();
    return _localJobs.find(j => j.JOB_No === jobNo) || null;
  },

  /* ── CREATE JOB ── */
  async createJob(data) {
    const job = Object.assign({ Created_By: (Auth.getUser()||{}).username || 'admin' }, data);
    _localJobs.unshift(job);
    _saveJobs();

    if (RMS.USE_GAS) {
      try {
        const res = await callGAS('createJob', { data: job });
        if (res && res.success) return { success: true, data: job };
        return { success: true, data: job, gasWarn: res && res.error };
      } catch(e) { return { success: true, data: job, gasWarn: e.message }; }
    }
    return { success: true, data: job };
  },

  /* ── UPDATE JOB ── */
  async updateJob(jobNo, data) {
    const idx = _localJobs.findIndex(j => j.JOB_No === jobNo);
    if (idx < 0) return { success: false, error: 'ไม่พบ Job' };
    _localJobs[idx] = Object.assign({}, _localJobs[idx], data);
    _saveJobs();

    if (RMS.USE_GAS) {
      try { await callGAS('updateJob', { jobNo, data }); } catch(e) {}
    }
    return { success: true, data: _localJobs[idx] };
  },

  /* ── DELETE JOB ── */
  async deleteJob(jobNo) {
    const before = _localJobs.length;
    _localJobs = _localJobs.filter(j => j.JOB_No !== jobNo);
    if (_localJobs.length === before) return { success: false, error: 'ไม่พบ Job' };
    _saveJobs();

    if (RMS.USE_GAS) {
      try { await callGAS('deleteJob', { jobNo }); } catch(e) {}
    }
    return { success: true };
  },

  /* ── UPDATE STATUS ── */
  async updateStatus(jobNo, status, remark) {
    // ✅ ใช้ updateJobStatus (lightweight) แทน updateJob เต็ม
    // เพื่อป้องกัน undefined fields overwrite ใน Google Sheets
    if (RMS.USE_GAS) {
      const res = await callGAS('updateJobStatus', {
        jobNo:  jobNo,
        status: status,
        remark: remark || ''
      });
      if (res && res.success) {
        // อัปเดต local state ด้วย
        const idx = _localJobs.findIndex(j => j.JOB_No === jobNo);
        if (idx >= 0) {
          _localJobs[idx].Status     = status;
          _localJobs[idx].Updated_At = new Date().toISOString().slice(0,10);
          if (status === 'CLOSED') _localJobs[idx].Close_Date = new Date().toISOString().slice(0,10);
          _saveJobs();
        }
        return res;
      }
      // GAS failed → fallback to local only
    }
    // Local update only (offline/demo mode)
    const idx = _localJobs.findIndex(j => j.JOB_No === jobNo);
    if (idx >= 0) {
      _localJobs[idx].Status     = status;
      _localJobs[idx].Updated_At = new Date().toISOString().slice(0,10);
      if (status === 'CLOSED') _localJobs[idx].Close_Date = new Date().toISOString().slice(0,10);
      _saveJobs();
    }
    return { success: true };
  },

  /* ── GET DASHBOARD ── */
  async getDashboard() {
    _localJobs  = _loadJobs();
    _localParts = _loadParts();

    const jobs = [..._localJobs];
    const cnt  = {};
    jobs.forEach(j => { const s = (j.Status||'').replace(/ /g,'_'); cnt[s] = (cnt[s]||0) + 1; });

    // Trend
    const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    const tData  = Array(12).fill(0);
    const y = new Date().getFullYear();
    jobs.forEach(j => { if(j.Create_Date){ const d=new Date(j.Create_Date); if(d.getFullYear()===y) tData[d.getMonth()]++; } });

    // งานซ่อมจริง = ทั้งหมด - ซ่อมซ้ำ
    const eqCount = {};
    jobs.forEach(j => { if(j.Equipment_ID) eqCount[j.Equipment_ID] = (eqCount[j.Equipment_ID]||0)+1; });
    const repeatJobs = jobs.filter(j => eqCount[j.Equipment_ID] > 1);
    const realJobs   = jobs.length - repeatJobs.length; // งานซ่อมจริง (ไม่ซ้ำ)
    const uniqueRepeatEq = Object.values(eqCount).filter(c => c > 1).length;

    // MTTR (เก็บไว้สำหรับ reports.html)
    const closed = jobs.filter(j => j.Status==='CLOSED' && j.Create_Date && j.Close_Date);
    const mttr   = closed.length ? parseFloat((closed.reduce((s,j) => s+(new Date(j.Close_Date)-new Date(j.Create_Date))/86400000, 0)/closed.length).toFixed(1)) : 0;

    // Priority
    const byP = { CRITICAL:0, HIGH:0, MEDIUM:0, LOW:0 };
    jobs.forEach(j => { if(j.Priority && byP[j.Priority]!==undefined) byP[j.Priority]++; });

    // Low stock
    const lowStock = _localParts.filter(p => parseFloat(p.Current_Stock||0) <= parseFloat(p.Min_Stock||0));

    return {
      success: true,
      stats: {
        total:           jobs.length,
        CLOSED:          cnt.CLOSED          || 0,
        IN_PROGRESS:     cnt.SEND_REPAIR     || 0,
        RETURNED:        cnt.RETURNED        || 0,
        WAIT_APPROVAL:   cnt.WAIT_APPROVAL   || 0,
        WAIT_SPARE_PART: cnt.WAIT_SPARE_PART || 0,
        SEND_REPAIR:     cnt.SEND_REPAIR     || 0,
        OPEN:            cnt.OPEN            || 0,
        realJobs:        realJobs,             // งานซ่อมจริง (ไม่ซ้ำ)
        repeatJobs:      repeatJobs.length,    // ซ่อมซ้ำ
        uniqueRepeatEq:  uniqueRepeatEq,       // จำนวนอุปกรณ์ที่ซ่อมซ้ำ
      },
      mttr,
      realJobs,
      repeatCount:    repeatJobs.length,
      uniqueRepeatEq: uniqueRepeatEq,
      pendingApprovals: cnt.WAIT_APPROVAL || 0,
      monthlyTrend: { labels: months, data: tData },
      vendorKPIs: SAMPLE_VENDORS.map(v => ({
        name:   v.Vendor_Name,
        total:  jobs.filter(j => j.Vendor_ID === v.Vendor_ID).length,
        closed: jobs.filter(j => j.Vendor_ID === v.Vendor_ID && j.Status === 'CLOSED').length,
      })),
      byPriority:  byP,
      recentJobs:  jobs.slice().sort((a,b) => (b.Create_Date||'').localeCompare(a.Create_Date||'')).slice(0,10),
      lowStock,
    };
  },

  /* ── PARTS ── */
  async issuePart({ partId, partCode, qty, jobNo, remark }) {
    _localParts = _loadParts();
    const idx = _localParts.findIndex(p => p.Part_ID === partId || p.Part_Code === (partCode || partId));
    if (idx < 0) return { success: false, error: 'ไม่พบ Part' };
    const cur = parseFloat(_localParts[idx].Current_Stock || 0);
    if (cur < qty) return { success: false, error: 'สต๊อกไม่พอ (เหลือ ' + cur + ')' };
    _localParts[idx].Current_Stock = cur - qty;
    _saveParts();

    // log
    try {
      const log = JSON.parse(localStorage.getItem('rms_iss_log') || '[]');
      log.unshift({ date: new Date().toISOString().slice(0,10), partId, qty, jobNo: jobNo||'', remark: remark||'', by: (Auth.getUser()||{}).username||'admin' });
      localStorage.setItem('rms_iss_log', JSON.stringify(log.slice(0,200)));
    } catch(e) {}

    if (RMS.USE_GAS) { try { await callGAS('issuePart', { partId, qty, jobNo, remark }); } catch(e) {} }
    return { success: true, newStock: _localParts[idx].Current_Stock };
  },

  async receivePart({ partId, qty, unitCost }) {
    _localParts = _loadParts();
    const idx = _localParts.findIndex(p => p.Part_ID === partId || p.Part_Code === partId);
    if (idx < 0) return { success: false, error: 'ไม่พบ Part' };
    _localParts[idx].Current_Stock = parseFloat(_localParts[idx].Current_Stock||0) + qty;
    if (unitCost) _localParts[idx].Cost = parseFloat(unitCost);
    _saveParts();

    try {
      const log = JSON.parse(localStorage.getItem('rms_rcv_log') || '[]');
      log.unshift({ date: new Date().toISOString().slice(0,10), partId, qty, unitCost: unitCost||0, by: (Auth.getUser()||{}).username||'admin' });
      localStorage.setItem('rms_rcv_log', JSON.stringify(log.slice(0,200)));
    } catch(e) {}

    if (RMS.USE_GAS) { try { await callGAS('receivePart', { partId, qty, unitCost }); } catch(e) {} }
    return { success: true, newStock: _localParts[idx].Current_Stock };
  },
};

(function autoGuard() {
  const page = location.pathname.split('/').pop() || '';
  const open = ['login.html', 'index.html', ''];
  if (open.includes(page)) return;

  function check() {
    if (!Auth.isLoggedIn()) {
      window.location.href = 'login.html';
      return;
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', check);
  } else {
    check();
  }
})();

/* ── BADGE COUNTERS ─────────────────────────────────────────── */
function _getBadgeCounts() {
  try {
    const waitApprove = (typeof _localJobs !== 'undefined' ? _localJobs : [])
      .filter(j => ['WAIT_APPROVAL','WAIT_APPROVE'].includes((j.Status||'').replace(/ /g,'_')))
      .length;
    const inProgress = (typeof _localJobs !== 'undefined' ? _localJobs : [])
      .filter(j => (j.Status||'') === 'SEND_REPAIR')
      .length;
    return { approve: waitApprove || 0, jobs: inProgress || 0 };
  } catch(e) { return {}; }
}

/* ── BUILD SIDEBAR HTML ─────────────────────────────────────── */
function _buildSidebar() {
  const cur  = location.pathname.split('/').pop() || 'dashboard.html';
  const user = (typeof Auth !== 'undefined') ? Auth.getUser() : null;
  const badges = _getBadgeCounts();
  const isAdmin   = user && ['SUPER_ADMIN','ADMIN'].includes(user.role);
  const isManager = user && ['SUPER_ADMIN','ADMIN','MANAGER'].includes(user.role);
  const initials  = user ? (user.name||user.username||'U').slice(0,2).toUpperCase() : 'U';
  const roleName  = user ? (user.role||'USER') : 'USER';
  const displayName = user ? (user.name||user.username||'User') : 'User';

  let navHTML = '';
  NAV_CONFIG.forEach(item => {
    if (item.section !== undefined) {
      if (item.adminOnly && !isAdmin) return;
      navHTML += `<div class="nav-section-label">${item.section}</div>`;
      return;
    }
    if (item.adminOnly   && !isAdmin)   return;
    if (item.managerOnly && !isManager) return;

    const active  = cur === item.href ? 'active' : '';
    const badgeCnt = item.badgeKey && badges[item.badgeKey] ? badges[item.badgeKey] : 0;
    const badgeHTML = badgeCnt ? `<span class="nav-badge">${badgeCnt}</span>` : '';

    navHTML += `
      <a href="${item.href}" class="nav-item ${active}">
        <span class="nav-icon"><i class="fas ${item.icon}"></i></span>
        <span>${item.label}</span>
        ${badgeHTML}
      </a>`;
  });

  return `
  <aside class="rms-sidebar" id="rmsSidebar">
    <!-- Brand -->
    <div class="sidebar-brand">
      <div class="brand-icon"><i class="fas fa-tools"></i></div>
      <div class="brand-text">
        <div class="brand-name">EWS Enterprise</div>
        <div class="brand-ver">v3.0 · CMMS</div>
      </div>
    </div>

    <!-- Nav -->
    <nav class="sidebar-nav">${navHTML}</nav>

    <!-- Footer -->
    <div class="sidebar-footer">
      <div class="sidebar-user" style="padding:10px 12px 0;border-bottom:none;border-top:none;margin-bottom:8px">
        <div class="user-avatar">${initials}</div>
        <div class="user-info">
          <div class="user-name">${displayName}</div>
          <div class="user-role">${roleName}</div>
        </div>
      </div>
      <button onclick="doLogout()" style="width:100%;display:flex;align-items:center;justify-content:center;gap:7px;padding:8px 12px;border-radius:7px;border:1px solid rgba(220,38,38,0.25);background:rgba(220,38,38,0.08);color:rgba(248,113,113,0.9);font-size:.72rem;font-weight:600;cursor:pointer;font-family:inherit;letter-spacing:.2px;transition:all .15s ease" onmouseover="this.style.background='rgba(220,38,38,0.15)'" onmouseout="this.style.background='rgba(220,38,38,0.08)'">
        <i class="fas fa-sign-out-alt" style="font-size:.7rem"></i>ออกจากระบบ
      </button>
    </div>
  </aside>`;
}

/* ── BUILD TOPBAR HTML ──────────────────────────────────────── */
function _buildTopbar(title, actions) {
  const now = new Date();
  const dateStr = now.toLocaleDateString('th-TH', { weekday:'short', year:'numeric', month:'short', day:'numeric' });
  const waitCnt = (typeof _getBadgeCounts === 'function') ? (_getBadgeCounts().approve || 0) : 0;
  const bellDot = waitCnt > 0 ? '<span class="rms-bell-dot" title="'+waitCnt+' รายการรออนุมัติ"></span>' : '<span class="rms-bell-dot rms-bell-hidden"></span>';

  return `

      <div class="page-subtitle"><span class="tb-brand">EWS Enterprise</span><span class="tb-sep">›</span><span>${dateStr}</span></div>

/* ── MAIN RENDER FUNCTION ───────────────────────────────────── */
function renderPageShell(title, content, actions) {
  var _lo=document.getElementById('rms-loader');if(_lo)_lo.remove();
  const wrapper = document.getElementById('app');
  if (!wrapper) return;

  // สร้าง sidebar และ main-content ใหม่ทั้งหมด
  wrapper.innerHTML =
    _buildSidebar() +
    '<div class="main-content" id="mainContent"></div>';

  const main = document.getElementById('mainContent');
  if (!main) return;

  main.innerHTML = _buildTopbar(title, actions || '') +
    '<div class="page-content">' + (content || '') + '</div>';

  // Toast container
  if (!document.getElementById('rmsToastContainer')) {
    const tc = document.createElement('div');
    tc.id = 'rmsToastContainer';
    tc.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;';
    document.body.appendChild(tc);
  }
}

/* ── SIDEBAR TOGGLE ─────────────────────────────────────────── */
function toggleSidebar() {
  const sidebar = document.getElementById('rmsSidebar');
  const main    = document.getElementById('mainContent');
  const topbar  = document.getElementById('rmsTopbar');
  if (!sidebar) return;

  const collapsed = sidebar.classList.toggle('collapsed');
  const w = collapsed ? 'var(--sidebar-collapsed)' : 'var(--sidebar-width)';
  sidebar.style.width = w;
  if (main)   main.style.marginLeft = w;
  if (topbar) topbar.style.left = w;
}

function doLogout() {
  try { sessionStorage.removeItem('rms_v3_session'); } catch(e) {}
  try { localStorage.removeItem('rms_v3_session'); }  catch(e) {}
  window.location.href = 'login.html';
}

      <thead class="table-light"><tr><th style="padding:10px 12px">Warehouse ID</th><th style="padding:10px 12px">ชื่อ</th><th style="padding:10px 12px">Location</th><th style="padding:10px 12px">สถานะ</th></tr></thead>
      <tbody>${WAREHOUSES.map(w=>`<tr>
        <td style="font-family:monospace;font-weight:700;color:var(--primary)">${w.id}</td>
        <td>${w.name}</td><td>HQ</td>
        <td><span class="badge bg-success" style="font-size:.68rem">ACTIVE</span></td>
      </tr>`).join("")}</tbody></table></div></div>`;
  }else{
    el2.innerHTML=`<div class="table-card"><div class="table-header"><div class="table-title"><i class="fas fa-hdd me-2"></i>Equipment IDs (${EQUIPMENT_IDS.length})</div></div>
      <div class="p-3"><div class="row g-2">${EQUIPMENT_IDS.map(e=>`<div class="col-md-2 col-4">
        <div style="background:#f8f9fa;border-radius:6px;padding:5px 10px;font-family:monospace;font-size:.8rem;color:var(--primary)">${e}</div></div>`).join("")}</div></div></div>`;
  }
  return false;
}
</script></body></html>
